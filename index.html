<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Assistant Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --restev-blue: #3d7cc0; --restev-violet: #a74b9e; 
            --restev-orange: #f29c2b; --restev-bg: #f5f8fc;
        }
        body { background-color: var(--restev-bg); font-family: sans-serif; padding-bottom: 70px; }
        
        /* Header & Nav */
        .header-restev { background: white; border-bottom: 4px solid var(--restev-blue); padding: 10px; }
        .nav-tabs { border: none; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-link { color: #666; font-weight: bold; border: none !important; }
        .nav-link.active { color: var(--restev-blue) !important; border-bottom: 3px solid var(--restev-blue) !important; }

        /* Scanner */
        #reader { border: 3px solid var(--restev-blue); border-radius: 15px; overflow: hidden; background: white; }
        
        /* Cartes & Styles */
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 20px; }
        .border-cmr { border-left: 8px solid var(--restev-violet); }
        .border-safe { border-left: 8px solid #5cb85c; }
        .btn-restev { background-color: var(--restev-blue); color: white; font-weight: bold; }
        .badge-cmr { background-color: var(--restev-violet); color: white; }

        /* Fiches Conseils */
        .fiche-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .list-group-item:hover { background-color: #f0f7ff; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header-restev text-center">
        <div class="container">
            <h5 class="mb-0" style="color: var(--restev-blue);">RESTEV 85 - PRÉVENTION</h5>
        </div>
    </header>

    <ul class="nav nav-tabs sticky-top justify-content-center mb-3" id="mainTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="scan-tab" data-bs-toggle="tab" data-bs-target="#scan-content" type="button">🔍 Scanner</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="duerp-tab" data-bs-toggle="tab" data-bs-target="#duerp-content" type="button">📝 Mon DUERP</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="prev-tab" data-bs-toggle="tab" data-bs-target="#prev-content" type="button">🛡️ Conseils</button>
        </li>
    </ul>

    <div class="container tab-content">
        
        <div class="tab-pane fade show active" id="scan-content">
            <div class="text-center">
                <p class="text-muted small">Contrôlez vos produits chimiques instantanément</p>
                <div id="reader"></div>
                <div id="result-container" class="d-none">
                    <div id="product-info" class="card card-custom p-4 text-start"></div>
                    <button class="btn btn-outline-secondary w-100 mt-3" onclick="resetScanner()">Réinitialiser le scanner</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="duerp-content">
            <div class="card card-custom p-3">
                <h6 style="color: var(--restev-blue);">Traçabilité des Expositions</h6>
                <div class="table-responsive">
                    <table class="table align-middle mt-2">
                        <thead class="table-light">
                            <tr><th>Produit</th><th>Danger</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="duerp-list">
                            </tbody>
                    </table>
                </div>
                <button class="btn btn-sm btn-outline-danger mt-2" onclick="viderTout()">Effacer tout l'historique</button>
            </div>
        </div>

        <div class="tab-pane fade" id="prev-content">
            <h6 class="mb-3 text-center">Fiches de Prévention RESTEV</h6>
            <div class="row g-3">
                <div class="col-6">
                    <div class="card card-custom p-3 text-center h-100" onclick="alert('Bientôt disponible : Guide sur le travail sur écran.')">
                        <span class="fiche-icon">💻</span>
                        <small class="fw-bold">Travail sur Écran</small>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card card-custom p-3 text-center h-100" onclick="alert('Bientôt disponible : Guide sur la manutention manuelle.')">
                        <span class="fiche-icon">📦</span>
                        <small class="fw-bold">Manutention</small>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card card-custom p-3 text-center h-100" onclick="alert('Bientôt disponible : Guide sur la gestion du stress.')">
                        <span class="fiche-icon">🧘</span>
                        <small class="fw-bold">Santé Mentale</small>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card card-custom p-3 text-center h-100" onclick="alert('Bientôt disponible : Guide sur les addictions.')">
                        <span class="fiche-icon">🚫</span>
                        <small class="fw-bold">Addictions</small>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <footer class="text-center p-3 mt-4 text-muted small border-top bg-white fixed-bottom">
        Association RESTEV 85 | Prévenir pour Protéger
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        let databaseProduits = [];
        let inventaireLocal = JSON.parse(localStorage.getItem('restev_duerp')) || [];

        fetch('produits.json').then(r => r.json()).then(d => {
            databaseProduits = d.produits;
            afficherInventaire();
        });

        function onScanSuccess(decodedText) {
            const container = document.getElementById('result-container');
            const info = document.getElementById('product-info');
            document.getElementById('reader').classList.add('d-none');
            container.classList.remove('d-none');

            const produit = databaseProduits.find(p => p.code === decodedText);

            if (produit) {
                const isCmr = produit.cmr;
                info.className = `card card-custom p-4 text-start ${isCmr ? 'border-cmr' : 'border-safe'}`;
                info.innerHTML = `
                    <h5 class="${isCmr ? 'text-danger' : 'text-success'}">${isCmr ? '⚠️ ALERTE CMR' : '✅ PRODUIT RÉFÉRENCÉ'}</h5>
                    <p class="mb-1"><strong>Nom :</strong> ${produit.nom}</p>
                    <p class="mb-3 small">${produit.conseil}</p>
                    <button class="btn btn-restev w-100" onclick="ajouterAuDuerp('${produit.nom}', '${produit.classement}', '${produit.conseil}', ${isCmr})">Ajouter au suivi DUERP</button>
                `;
            } else {
                info.innerHTML = `<h5>Produit Inconnu</h5><p>Code ${decodedText}</p>`;
            }
        }

        function ajouterAuDuerp(nom, risque, conseil, isCmr) {
            const nouvelItem = { nom, risque, conseil, isCmr, date: new Date().toLocaleDateString() };
            inventaireLocal.push(nouvelItem);
            localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal));
            afficherInventaire();
            alert("Ajouté avec succès !");
            resetScanner();
        }

        function afficherInventaire() {
            const list = document.getElementById('duerp-list');
            list.innerHTML = inventaireLocal.length ? "" : "<tr><td colspan='3' class='text-center muted'>Aucune donnée.</td></tr>";
            inventaireLocal.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${item.nom}</strong></td>
                    <td><span class="badge ${item.isCmr ? 'badge-cmr' : 'bg-success'}">${item.isCmr ? 'CMR' : 'Sûr'}</span></td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="supprimerItem(${index})">🗑️</button></td>
                `;
                list.appendChild(row);
            });
        }

        function supprimerItem(index) {
            inventaireLocal.splice(index, 1);
            localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal));
            afficherInventaire();
        }

        function viderTout() {
            if(confirm("Tout supprimer ?")) {
                localStorage.removeItem('restev_duerp');
                inventaireLocal = [];
                afficherInventaire();
            }
        }

        function resetScanner() {
            document.getElementById('result-container').classList.add('d-none');
            document.getElementById('reader').classList.remove('d-none');
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
