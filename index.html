<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Accompagnement prévention</title>

<style>
/* Base */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
}

/* Container app mobile */
.app{
  max-width:480px;
  margin:auto;
  padding:16px;
}

/* Header */
.header{
  text-align:center;
  margin-bottom:24px;
}

.logo{
  width:220px;
  max-width:90%;
  height:auto;
  margin-bottom:8px;
}

.subtitle{
  font-size:14px;
  color:#475569;
}

/* Card */
.card{
  background:#ffffff;
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 28px rgba(0,0,0,0.12);
}

/* Text */
h2,h3{
  color:#1e3a8a;
  margin-top:0;
}

.info{
  background:#eef2ff;
  padding:14px;
  border-radius:16px;
  font-size:14px;
  margin-bottom:22px;
}

/* Buttons */
.btn{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:12px;
}

.btn-main{background:#2563eb;color:white;}
.btn-back{background:#e5e7eb;}

/* States */
.hidden{display:none;}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" alt="RESTEV" class="logo">
    <div class="subtitle">
      Prévention santé au travail – Accompagnement EPST RESTEV
    </div>
  </div>

  <!-- ACCUEIL -->
  <div class="card">
    <div class="info">
      Cette application est un <strong>outil d’accompagnement prévention</strong>,
      conçu pour s’adapter à tous les supports
      (smartphone, tablette, ordinateur).
    </div>
