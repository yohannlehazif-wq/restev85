<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Prévention</title>

<style>
/* ===== RESET & BASE ===== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

/* ===== APP CONTAINER ===== */
.app {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

/* ===== HEADER / LOGO ===== */
.header {
  text-align: center;
  padding: 24px 16px 16px;
}

.logo {
  width: 120px;
  height: auto;
  margin-bottom: 12px;
}

.app-title {
  font-size: 24px;
  font-weight: 700;
  color: #1e3a8a;
  margin: 0;
}

.app-subtitle {
  font-size: 14px;
  color: #475569;
  margin-top: 4px;
}

/* ===== CARD ===== */
.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}

/* ===== TEXT ===== */
h2 {
  margin-top: 0;
  text-align: center;
  color: #1e3a8a;
}

.info {
  background: #eef2ff;
  color: #1e3a8a;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  margin: 14px 0;
}

/* ===== BUTTONS ===== */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary {
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
}

.btn-secondary {
  background: #e5e7eb;
  color: #111827;
}

.btn-action {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
}

.btn-good {
  background: linear-gradient(135deg, #22c55e, #15803d);
  color: white;
}

/* ===== PRIORITY ===== */
.priority {
  padding: 12px;
  border-radius: 12px;
  font-weight: 700;
  text-align: center;
  margin: 14px 0;
}

.low { background: #dcfce7; color: #166534; }
.mid { background: #fef9c3; color: #854d0e; }
.high { background: #ffedd5; color: #9a3412; }
.critical { background: #fee2e2; color: #991b1b; }

/* ===== STEPS ===== */
.step {
  background: #f8fafc;
  padding: 10px;
  border-radius: 10px;
  border-left: 4px solid #2563eb;
  margin-top: 8px;
  font-size: 14px;
}

/* ===== HIDE ===== */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="logo-restev.png" alt="Logo RESTEV" class="logo"
      onerror="this.style.display='none'">
    <h1 class="app-title">RESTEV</h1>
    <div class="app-subtitle">Prévention des risques professionnels</div>
  </div>

  <!-- ACCUEIL -->
  <div id="accueil" class="card">
    <div class="info">
      Identifier, prioriser et agir  
      en prévention, simplement et progressivement.
    </div>
    <button class="btn btn-primary" onclick="entrer()">🚀 Entrer dans l’application</button>
  </div>

  <!-- ACTIVITÉS -->
  <div id="activites" class="card hidden">
    <h2>Votre activité</h2>

    <button class="btn btn-primary" onclick="afficherMetiers('btp')">BTP / Chantier</button>
    <button class="btn btn-primary" onclick="afficherMetiers('services')">Commerce & Services</button>
    <button class="btn btn-primary" onclick="afficherMetiers('logistique')">Logistique / Transport</button>

    <button class="btn btn-secondary" onclick="afficherSyntheseEntreprise()">🏢 Synthèse entreprise</button>
  </div>

  <!-- CONTENUS DYNAMIQUES -->
  <div id="metiers" class="card hidden"></div>
  <div id="risques" class="card hidden"></div>
  <div id="detail" class="card hidden"></div>

</div>

<script>
/* === UTILITAIRE AFFICHAGE === */
function show(id){
  ["accueil","activites","metiers","risques","detail"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

/* === NAVIGATION === */
function entrer(){ show("activites"); }

/* === DEMO SIMPLE (à brancher sur ton data existant) === */
function afficherMetiers(){ show("metiers"); document.getElementById("metiers").innerHTML =
  "<h2>Métiers</h2><div class='info'>Raccordement à ta base métier existante</div>";}

function afficherSyntheseEntreprise(){
  show("detail");
  document.getElementById("detail").innerHTML =
    "<h2>Synthèse globale</h2><div class='info'>Vue entreprise rassurante et positive</div>";
}
</script>

</body>
</html>
``
