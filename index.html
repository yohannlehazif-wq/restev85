<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 450px;
  margin: auto;
  padding: 20px;
  background: #f3f4f6;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-top: 20px;
}

h1, h2 {
  color: #2563eb;
  text-align: center;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-main { background: #2563eb; color: white; }
.btn-risk { background: #f97316; color: white; }
.btn-back { background: #d1d5db; }
.info {
  background: #e0f2fe;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- ✅ ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center;">Application d’aide à la prévention des risques</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ✅ ACTIVITÉS -->
<div id="activites" class="card" style="display:none;">
  <h2>Votre activité</h2>
  <div class="info">
    Identifier les risques permet d’agir progressivement et en sécurité.
  </div>

  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
