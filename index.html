<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 450px;
  margin: auto;
  padding: 20px;
  background: #f3f4f6;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-top: 20px;
}

h1, h2 {
  color: #2563eb;
  text-align: center;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-main { background: #2563eb; color: white; }
.btn-risk { background: #f97316; color: white; }
.btn-back { background: #d1d5db; }

.info {
  background: #e0f2fe;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center;">Application d’aide à la prévention des risques</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ACTIVITÉS -->
<div id="activites" class="card" style="display:none;">
  <h2>Votre activité</h2>

  <div class="info">
    Identifier les risques permet de mieux protéger les salariés et l’entreprise.
  </div>

  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="afficherMetiers('logistique')">Logistique / Transport</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

<!-- METIERS -->
<div id="metiers" class="card" style="display:none;"></div>

<!-- RISQUES -->
<div id="risques" class="card" style="display:none;"></div>

<script>
const data = {
  btp: ["Ouvrier du bâtiment", "Maçon", "Couvreur"],
  services: ["Commercial itinérant", "Coiffeur / Coiffeuse", "Boucher"],
  logistique: ["Conducteur / Livreur", "Cariste"]
};

const risquesMetier = {
  "Ouvrier du bâtiment": ["Chute de hauteur", "Manutentions", "Bruit", "Poussières"],
  "Maçon": ["Silice", "Charges lourdes", "Postures pénibles"],
  "Commercial itinérant": ["Risque routier", "Stress"],
  "Coiffeur / Coiffeuse": ["Produits chimiques", "Postures prolongées"],
  "Conducteur / Livreur": ["Risque routier", "Manutention de colis"]
};

/* Navigation */
function cacherTout() {
  ["accueil","activites","metiers","risques"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function entrer(){
  cacherTout();
  document.getElementById("activites").style.display="block";
}

function retourAccueil(){
  cacherTout();
  document.getElementById("accueil").style.display="block";
}

/* Métiers */
function afficherMetiers(secteur){
  cacherTout();
  const zone = document.getElementById("metiers");
  zone.style.display="block";

  let html = "<h2>Métiers</h2>";
  data[secteur].forEach(m=>{
    html += `<button class="btn btn-main" onclick="afficherRisques('${m}')">${m}</button>`;
  });

  html += `<button class="btn btn-back" onclick="entrer()">← Retour activités</button>`;
  zone.innerHTML = html;
}

/* Risques */
function afficherRisques(metier){
  cacherTout();
  const zone = document.getElementById("risques");
  zone.style.display="block";

  let html = `<h2>Risques – ${metier}</h2>`;
  (risquesMetier[metier] || []).forEach(r=>{
    html += `<button class="btn btn-risk">${r}</button>`;
  });

  html += `<button class="btn btn-back" onclick="retourAccueil()">← Accueil</button>`;
  zone.innerHTML = html;
}
</script>

</body>
</html>
