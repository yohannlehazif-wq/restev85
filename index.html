<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', sans-serif; margin-bottom: 100px; overflow-x: hidden; }
        
        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.6rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: var(--r-blue); }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-fds { padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-center text-white">
            <h2 class="fw-bold mt-3">RESTEV 85</h2>
            <p>Inventaire & FDS Adhérents</p>
            <button class="btn-enter" onclick="dismissSplash()">DÉMARRER</button>
        </div>
    </div>

    <div class="app-header">
        <h4 class="fw-bold mb-0" style="color: var(--r-blue)">RESTEV 85</h4>
    </div>

    <!-- PAGE ACCUEIL -->
    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
            <h5 class="fw-bold">Tableau de Bord</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Connexion Cloud...</p>
        </div>
        <div class="row g-2 mt-3">
            <div class="col-12" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-4" style="background-color: #e3f2fd;"><i class="fa-solid fa-camera fa-2x mb-2 text-primary"></i><br><b>SCANNER UN PRODUIT</b></div>
            </div>
            <div class="col-12" onclick="nav('page-list', 'nav-list')">
                <div class="card-custom text-center py-3"><i class="fa-solid fa-file-medical fa-lg mb-2 text-success"></i><br><small class="fw-bold">INVENTAIRE & FDS</small></div>
            </div>
        </div>
    </div>

    <!-- PAGE SCANNER -->
    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3">Nouvelle Entrée</h5>
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 250px;"></div>
            <div class="d-flex gap-2 mt-3 mb-4">
                <button id="btn-start-scan" class="btn btn-dark flex-grow-1" onclick="startScanner()">OUVRIR CAMÉRA</button>
                <button id="btn-stop-scan" class="btn btn-danger" onclick="stopScanner()" style="display:none;">FERMER</button>
            </div>
            <label class="small fw-bold text-muted">NOM DU PRODUIT</label>
            <input type="text" id="prod-name" class="form-control mb-2" placeholder="Ex: Acétone">
            
            <label class="small fw-bold text-muted">CODE-BARRES</label>
            <input type="text" id="prod-code" class="form-control mb-2" placeholder="Scanné ou manuel">
            
            <label class="small fw-bold text-muted">LIEN FDS (URL)</label>
            <input type="text" id="prod-fds" class="form-control mb-3" placeholder="https://lien-de-la-fds.pdf">
            
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">ENREGISTRER</button>
        </div>
    </div>

    <!-- PAGE LISTE -->
    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Inventaire de l'adhérent</h5>
        <div id="inventory-container"></div>
    </div>

    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus-circle"></i>AJOUTER</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-clipboard-list"></i>LISTE</button>
    </nav>

    <script>
        const SUPABASE_URL = 'https://khhktchihkyojiuewyva.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hXeBEfzyVMM5PxwdZPlnjw_6xTwlP3T';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let inventory = [];
        let html5QrCode = null;

        async function loadInventory() {
            try {
                const { data, error } = await _supabase.from('produits').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                inventory = data || [];
                renderInventory();
                updateStats();
            } catch (e) {
                console.error(e);
                document.getElementById('inv-stats').innerText = "Erreur de connexion";
            }
        }

        async function saveProduct() {
            const name = document.getElementById('prod-name').value;
            const code = document.getElementById('prod-code').value;
            const fds = document.getElementById('prod-fds').value;

            if(!name) return alert("Veuillez saisir au moins le nom du produit.");

            const { error } = await _supabase.from('produits').insert([{ 
                name: name, 
                code: code, 
                fds_url: fds 
            }]);

            if (!error) {
                // Reset formulaire
                document.getElementById('prod-name').value = '';
                document.getElementById('prod-code').value = '';
                document.getElementById('prod-fds').value = '';
                await loadInventory();
                nav('page-list', 'nav-list');
            } else {
                alert("Erreur Supabase : " + error.message);
            }
        }

        async function deleteItem(id) {
            if(!confirm("Supprimer ce produit ?")) return;
            const { error } = await _supabase.from('produits').delete().eq('id', id);
            if(!error) await loadInventory();
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = inventory.length ? '' : '<p class="text-center text-muted mt-4">Aucun produit.</p>';
            
            inventory.forEach(item => {
                const fdsBtn = item.fds_url 
                    ? `<a href="${item.fds_url}" target="_blank" class="btn-fds btn-primary text-white"><i class="fa-solid fa-file-pdf"></i> FDS</a>`
                    : `<span class="btn-fds bg-light text-muted"><i class="fa-solid fa-times"></i> Pas de FDS</span>`;

                container.innerHTML += `
                <div class="card-custom">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h6 class="fw-bold mb-0">${item.name}</h6>
                            <small class="text-muted">Code : ${item.code || '-'}</small>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="btn btn-sm text-danger"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        ${fdsBtn}
                        <small class="text-muted" style="font-size:0.7rem;">${new Date(item.created_at).toLocaleDateString()}</small>
                    </div>
                </div>`;
            });
        }

        function nav(id, el) {
            if (html5QrCode && html5QrCode.isScanning) stopScanner();
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(el) (typeof el === 'string' ? document.getElementById(el) : el).classList.add('active');
            if(id === 'page-list') loadInventory();
        }

        async function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            document.getElementById('btn-start-scan').style.display = 'none';
            document.getElementById('btn-stop-scan').style.display = 'block';

            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('prod-code').value = text;
                stopScanner();
            }).catch(() => {
                alert("Caméra indisponible.");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('btn-start-scan').style.display = 'block';
                    document.getElementById('btn-stop-scan').style.display = 'none';
                });
            }
        }

        function updateStats() {
            document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) en base Cloud`;
        }

        function dismissSplash() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
