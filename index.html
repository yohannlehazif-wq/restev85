<div id='scanPage' class='card' style='display:none;'>
<h2>Scanner</h2>
<video id='video' playsinline></video>
<div id='scanResult' style='margin-top:15px;'></div>
<button class='btn' onclick='arreterScanner()'>Retour</button>
</div>

<script>
let codeReader=null;
const produitsCMR={"3254567890123":{nom:"Degraissant X",cmr:"H350",epi:"Gants"}};

function afficherMetier(){
 let m=document.getElementById('metierSelect').value;
 let box=document.getElementById('result');
 if(!m){alert('Choisis un métier');return;}
 box.style.display='block';
 box.innerHTML='<h3>'+m+'</h3><p>Données métier complètes intégrées côté serveur final.</p>';
}

function ouvrirScanner(){
 document.getElementById('scanPage').style.display='block';
 codeReader=new ZXing.BrowserMultiFormatReader();
 codeReader.decodeFromVideoDevice(null,'video',(res,err)=>{
   if(res){afficherProduit(res.text);}  }); }

function afficherProduit(ean){ let r=document.getElementById('scanResult');
 if(produitsCMR[ean]){ let p=produitsCMR[ean]; r.innerHTML='<b>'+p.nom+'</b><br>CMR:'+p.cmr;} else { r.innerHTML='Non trouvé: '+ean; } }

function arreterScanner(){ try{codeReader.reset();}catch(e){} document.getElementById('scanPage').style.display='none'; }
</script>
