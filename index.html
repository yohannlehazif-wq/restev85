<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', sans-serif; margin-bottom: 100px; overflow-x: hidden; }
        
        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.6rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: var(--r-blue); }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-fds { padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; text-decoration: none; display: inline-block; }
        
        /* Bouton Google très visible */
        .btn-google { background-color: #fbbc05; color: #000; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(251, 188, 5, 0.3); }
        .btn-google:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-center text-white">
            <h2 class="fw-bold mt-3">RESTEV 85</h2>
            <p>Inventaire Intelligent</p>
            <button class="btn-enter" onclick="dismissSplash()">DÉMARRER</button>
        </div>
    </div>

    <div class="app-header">
        <h4 class="fw-bold mb-0" style="color: var(--r-blue)">RESTEV 85</h4>
    </div>

    <!-- PAGE ACCUEIL -->
    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
            <h5 class="fw-bold">Tableau de Bord</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Connexion Cloud...</p>
        </div>
        <div class="row g-2 mt-3">
            <div class="col-12" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-4" style="background-color: #e3f2fd; cursor: pointer;">
                    <i class="fa-solid fa-camera fa-2x mb-2 text-primary"></i><br><b>SCANNER UN PRODUIT</b>
                </div>
            </div>
            <div class="col-12" onclick="nav('page-list', 'nav-list')">
                <div class="card-custom text-center py-3" style="cursor: pointer;">
                    <i class="fa-solid fa-file-medical fa-lg mb-2 text-success"></i><br><small class="fw-bold">INVENTAIRE & FDS</small>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE SCANNER -->
    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-plus-circle text-primary"></i> Nouvelle Entrée</h5>
        <div class="card-custom border-0 shadow-sm">
            
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #1e293b; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                <span class="text-white opacity-50 small" id="cam-placeholder">La caméra s'affichera ici</span>
            </div>
            
            <div class="d-flex gap-2 mt-3 mb-4">
                <button id="btn-start-scan" class="btn btn-dark flex-grow-1 py-3 fw-bold rounded-3" onclick="startScanner()"><i class="fa-solid fa-camera"></i> OUVRIR CAMÉRA</button>
                <button id="btn-stop-scan" class="btn btn-danger py-3 rounded-3" onclick="stopScanner()" style="display:none;"><i class="fa-solid fa-times"></i> FERMER</button>
            </div>
            
            <div id="form-saisie" style="background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0;">
                <label class="small fw-bold text-muted mb-1"><i class="fa-solid fa-barcode"></i> CODE-BARRES</label>
                <input type="text" id="prod-code" class="form-control form-control-lg mb-3" placeholder="Scannez ou tapez..." oninput="checkIfProductExists(this.value)">

                <label class="small fw-bold text-muted mb-1"><i class="fa-solid fa-tag"></i> NOM DU PRODUIT</label>
                <input type="text" id="prod-name" class="form-control form-control-lg mb-3" placeholder="Ex: Acétone Onyx">
                
                <hr class="text-muted">

                <label class="small fw-bold text-muted mb-2"><i class="fa-solid fa-file-pdf"></i> FICHE DE SÉCURITÉ (FDS)</label>
                
                <!-- LE NOUVEAU BOUTON ERGONOMIQUE ET VISIBLE -->
                <button class="btn btn-google w-100 py-3 mb-3" type="button" onclick="searchGoogleFDS()">
                    <i class="fa-brands fa-google fa-lg"></i> Chercher la FDS sur Internet
                </button>

                <input type="text" id="prod-fds" class="form-control form-control-lg mb-4" placeholder="Collez le lien (https://...) ici">
                
                <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm" onclick="saveProduct()" style="font-size: 1.1rem;">
                    <i class="fa-solid fa-cloud-arrow-up"></i> ENREGISTRER
                </button>
            </div>
        </div>
    </div>

    <!-- PAGE LISTE -->
    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Inventaire de l'adhérent</h5>
        <div id="inventory-container"></div>
    </div>

    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house fa-lg mb-1"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus-circle fa-lg mb-1"></i>AJOUTER</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-clipboard-list fa-lg mb-1"></i>LISTE</button>
    </nav>

    <script>
        const SUPABASE_URL = 'https://khhktchihkyojiuewyva.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hXeBEfzyVMM5PxwdZPlnjw_6xTwlP3T';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let inventory = [];
        let html5QrCode = null;

        async function loadInventory() {
            try {
                const { data, error } = await _supabase.from('produits').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                inventory = data || [];
                renderInventory();
                updateStats();
            } catch (e) {
                console.error(e);
                document.getElementById('inv-stats').innerText = "Erreur de connexion";
            }
        }

        // Vérification intelligente
        function checkIfProductExists(code) {
            if(!code || code.length < 3) return;
            const existingProduct = inventory.find(item => item.code === code);
            
            if(existingProduct) {
                document.getElementById('prod-name').value = existingProduct.name;
                if(existingProduct.fds_url) {
                    document.getElementById('prod-fds').value = existingProduct.fds_url;
                }
                // Petit retour visuel pour l'adhérent
                alert(`✅ Produit reconnu : ${existingProduct.name} ! Vérifiez et enregistrez.`);
            }
        }

        function searchGoogleFDS() {
            const name = document.getElementById('prod-name').value;
            if(!name) {
                alert("⚠️ Veuillez d'abord taper le nom du produit dans la case au-dessus pour lancer la recherche.");
                document.getElementById('prod-name').focus();
                return;
            }
            const query = encodeURIComponent("FDS " + name + " filetype:pdf");
            window.open("https://www.google.com/search?q=" + query, "_blank");
        }

        async function saveProduct() {
            const name = document.getElementById('prod-name').value;
            const code = document.getElementById('prod-code').value;
            const fds = document.getElementById('prod-fds').value;

            if(!name) return alert("Le nom du produit est obligatoire.");

            // Changement visuel du bouton pendant la sauvegarde
            const btn = document.querySelector('button[onclick="saveProduct()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ENREGISTREMENT...';
            btn.disabled = true;

            const { error } = await _supabase.from('produits').insert([{ 
                name: name, 
                code: code, 
                fds_url: fds 
            }]);

            if (!error) {
                document.getElementById('prod-name').value = '';
                document.getElementById('prod-code').value = '';
                document.getElementById('prod-fds').value = '';
                await loadInventory();
                
                // Remettre le bouton à la normale et changer de page
                btn.innerHTML = originalText;
                btn.disabled = false;
                nav('page-list', 'nav-list');
            } else {
                alert("Erreur réseau : " + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function deleteItem(id) {
            if(!confirm("Êtes-vous sûr de vouloir supprimer ce produit ?")) return;
            const { error } = await _supabase.from('produits').delete().eq('id', id);
            if(!error) await loadInventory();
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = inventory.length ? '' : '<p class="text-center text-muted mt-4">Votre inventaire est vide.</p>';
            
            inventory.forEach(item => {
                const fdsBtn = item.fds_url 
                    ? `<a href="${item.fds_url}" target="_blank" class="btn-fds btn-primary text-white shadow-sm"><i class="fa-solid fa-file-pdf"></i> Voir FDS</a>`
                    : `<span class="btn-fds bg-light text-muted border"><i class="fa-solid fa-search"></i> Pas de FDS</span>`;

                container.innerHTML += `
                <div class="card-custom">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h6 class="fw-bold mb-0 text-dark">${item.name}</h6>
                            <small class="text-muted"><i class="fa-solid fa-barcode"></i> ${item.code || 'Saisie manuelle'}</small>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="btn btn-sm text-danger"><i class="fa-solid fa-trash-can fa-lg"></i></button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top">
                        ${fdsBtn}
                        <small class="text-muted" style="font-size:0.7rem;">${new Date(item.created_at).toLocaleDateString()}</small>
                    </div>
                </div>`;
            });
        }

        function nav(id, el) {
            if (html5QrCode && html5QrCode.isScanning) stopScanner();
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(el) (typeof el === 'string' ? document.getElementById(el) : el).classList.add('active');
            if(id === 'page-list') loadInventory();
        }

        async function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            
            document.getElementById('cam-placeholder').style.display = 'none';
            document.getElementById('btn-start-scan').style.display = 'none';
            document.getElementById('btn-stop-scan').style.display = 'block';

            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('prod-code').value = text;
                stopScanner();
                checkIfProductExists(text);
            }).catch(() => {
                alert("Impossible d'accéder à la caméra. Vérifiez les autorisations de votre navigateur.");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('cam-placeholder').style.display = 'block';
                    document.getElementById('btn-start-scan').style.display = 'block';
                    document.getElementById('btn-stop-scan').style.display = 'none';
                });
            }
        }

        function updateStats() {
            document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) synchronisés`;
        }

        function dismissSplash() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
