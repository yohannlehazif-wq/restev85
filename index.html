<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Accompagnement prévention</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
}
.app{
  max-width:440px;
  margin:auto;
  padding:16px;
}
.header{
  text-align:center;
  margin-bottom:24px;
}
.logo{width:220px;}
.subtitle{font-size:14px;color:#475569;}

.card{
  background:#ffffff;
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 28px rgba(0,0,0,0.12);
}

h2,h3{color:#1e3a8a;margin-top:0;}

.info{
  background:#eef2ff;
  padding:14px;
  border-radius:16px;
  font-size:14px;
  margin-bottom:22px;
}

.btn{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:12px;
}
.btn-main{background:#2563eb;color:white;}
.btn-back{background:#e5e7eb;}

.risque{margin-bottom:30px;}
.action{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:2px solid #c7d2fe;
  background:#f8fafc;
  margin-bottom:10px;
  font-size:15px;
  text-align:left;
  cursor:pointer;
}
.action.active{
  background:#dcfce7;
  border-color:#22c55e;
  font-weight:600;
}

.cmr{
  background:#fff7ed;
  border:2px solid #f97316;
  border-radius:18px;
  padding:18px;
}

.result{
  padding:18px;
  border-radius:18px;
  font-weight:700;
  text-align:center;
}
.good{background:#dcfce7;color:#166534;}
.medium{background:#fef9c3;color:#854d0e;}
.bad{background:#fee2e2;color:#991b1b;}

.hidden{display:none;}
</style>
</head>

<div class="app">

<div class="header">
  <img src="logo.png" class="logo" alt="RESTEV">
  <div class="subtitle">Prévention santé au travail – Accompagnement entreprise</div>
</div>

<div id="accueil" class="card">
  <div class="info">
    Outil d’accompagnement prévention basé sur les métiers,
    pour faire un état des lieux simple et progresser sans jugement.
  </div>
  <button class="btn btn-main" onclick="showMetiers()">Démarrer</button>
</div>

<div id="metiers" class="card hidden">
  <h2>Choisir un métier</h2>
  <button class="btn btn-main" onclick="chargerMetier('macon')">Maçon</button>
  <button class="btn btn-main" onclick="chargerMetier('couvreur')">Couvreur</button>
  <button class="btn btn-main" onclick="chargerMetier('menuisier')">Menuisier</button>
  <button class="btn btn-back" onclick="showAccueil()">← Retour</button>
</div>

<div id="checklist" class="card hidden"></div>

</div>
