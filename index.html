<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3065a8">
    <link rel="icon" type="image/png" href="logo_restev_carre.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- Scripts PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: 100px; overflow-x: hidden; user-select: none; }

        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; font-size: 1.2rem; margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: breathing 2.5s ease-in-out infinite; }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; }

        .info-banner { background: #e6a00f; color: #fff; padding: 6px 0; overflow: hidden; white-space: nowrap; font-weight: 700; font-size: 0.85rem; }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.6rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s ease-out; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .sgh-card { display: flex; gap: 15px; align-items: center; }
        .sgh-img { width: 60px; height: 60px; object-fit: contain; }
        .badge-service { background-color: var(--r-teal); color: white; padding: 4px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>

<div id="splash">
    <div class="text-center text-white">
        <h2 class="fw-bold mt-3">RESTEV 85</h2>
        <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
    </div>
</div>

<div class="app-header">
    <img src="logo_restev_long.png" alt="RESTEV 85" class="logo-header" onerror="this.src='https://placehold.co/180x40?text=RESTEV+85'">
</div>

<div class="info-banner">
    <div class="ticker">
        <span><i class="fa-solid fa-bullhorn"></i> CARSAT : Subventions "Prévention TPE" disponibles | <i class="fa-solid fa-helmet-safety"></i> RESTEV : Pensez à mettre à jour votre DUERP !</span>
    </div>
</div>

<!-- ACCUEIL -->
<div id="page-home" class="app-page active-page">
    <div class="card-custom text-white border-0 mb-3" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
        <h5 class="fw-bold mb-1">Mon Espace RESTEV</h5>
        <p id="inv-stats" class="small opacity-75 mb-0">Calcul...</p>
    </div>

    <div class="row g-2">
        <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
            <div class="card-custom text-center py-3"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><small class="fw-bold">SCANNER FDS</small></div>
        </div>
        <div class="col-6" onclick="nav('page-list', 'nav-list')">
            <div class="card-custom text-center py-3"><i class="fa-solid fa-boxes-stacked fa-2x mb-2 text-success"></i><br><small class="fw-bold">MON PARC</small></div>
        </div>
        <div class="col-6" onclick="nav('page-quiz', 'nav-quiz')">
            <div class="card-custom text-center py-3"><i class="fa-solid fa-clipboard-check fa-2x mb-2 text-danger"></i><br><small class="fw-bold">AUTO-DIAG</small></div>
        </div>
        <div class="col-6" onclick="nav('page-sgh', 'nav-home')">
            <div class="card-custom text-center py-3"><i class="fa-solid fa-triangle-exclamation fa-2x mb-2 text-warning"></i><br><small class="fw-bold">GUIDE SGH</small></div>
        </div>
    </div>
</div>

<!-- INVENTAIRE -->
<div id="page-list" class="app-page">
    <h5 class="fw-bold mb-3">Mon Inventaire Chimique</h5>
    <div class="d-flex gap-2 mb-3">
        <button class="btn btn-success btn-sm flex-grow-1" onclick="exportToCSV()">CSV</button>
        <button class="btn btn-danger btn-sm flex-grow-1" onclick="generatePDFProof()">ATTESTATION PDF</button>
    </div>
    <div id="inventory-container"></div>
</div>

<!-- LEXIQUE SGH -->
<div id="page-sgh" class="app-page">
    <h5 class="fw-bold mb-3">Pictogrammes SGH</h5>
    <div id="sgh-list"></div>
</div>

<!-- AUTO DIAG -->
<div id="page-quiz" class="app-page">
    <h5 class="fw-bold mb-3">Auto-Diag Prévention</h5>
    <div class="card-custom" id="quiz-container">
        <div id="q-box">
            <p id="q-text" class="fw-bold"></p>
            <button onclick="quizAnswer(3)" class="btn btn-outline-primary w-100 mb-2">Oui</button>
            <button onclick="quizAnswer(1)" class="btn btn-outline-primary w-100 mb-2">En partie</button>
            <button onclick="quizAnswer(0)" class="btn btn-outline-primary w-100 mb-2">Non</button>
        </div>
        <div id="q-result" style="display:none;" class="text-center">
            <div class="score-badge" id="quiz-score"></div>
            <h6 id="quiz-label" class="fw-bold"></h6>
            <button onclick="resetQuiz()" class="btn btn-primary btn-sm mt-3">Recommencer</button>
        </div>
    </div>
</div>

<!-- NOS CENTRES -->
<div id="page-centres" class="app-page">
    <h5 class="fw-bold mb-3">Nos Centres (Vendée)</h5>
    <div id="centres-list"></div>
</div>

<!-- SCANNER -->
<div id="page-scan" class="app-page">
    <h5 class="fw-bold mb-3">Ajout de produit</h5>
    <div class="card-custom">
        <div id="reader" style="width:100%; border-radius:15px; overflow:hidden;"></div>
        <button class="btn btn-dark w-100 mt-2 mb-3" onclick="startScanner()">ACTIVER CAMERA</button>
        <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
        <input type="text" id="prod-code" class="form-control mb-2" placeholder="Code-barres">
        <input type="url" id="prod-fds" class="form-control mb-3" placeholder="URL du PDF FDS">
        <button id="btn-save" class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">ENREGISTRER</button>
    </div>
</div>

<nav class="nav-bottom">
    <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
    <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus"></i>SCAN</button>
    <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-list"></i>LISTE</button>
    <button id="nav-quiz" class="nav-item" onclick="nav('page-quiz', this)"><i class="fa-solid fa-check-to-slot"></i>DIAG</button>
    <button id="nav-centres" class="nav-item" onclick="nav('page-centres', this)"><i class="fa-solid fa-map-pin"></i>CENTRES</button>
</nav>

<script>
// --- CONFIGURATION ---
const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Ta clé
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

// --- DONNÉES COMPLÈTES SGH ---
const sghData = [
    { id: "SGH01", title: "Explosif", desc: "Danger d'explosion, de projection ou d'incendie suite à un choc ou chaleur.", img: "https://upload.wikimedia.org/wikipedia/commons/3/30/GHS-pictogram-explos.svg" },
    { id: "SGH02", title: "Inflammable", desc: "Produit pouvant s'enflammer au contact d'une flamme, d'une étincelle ou chaleur.", img: "https://upload.wikimedia.org/wikipedia/commons/a/a2/GHS-pictogram-flamme.svg" },
    { id: "SGH03", title: "Comburant", desc: "Peut provoquer ou aggraver un incendie (apporte de l'oxygène).", img: "https://upload.wikimedia.org/wikipedia/commons/0/06/GHS-pictogram-rondflam.svg" },
    { id: "SGH04", title: "Gaz sous pression", desc: "Peut exploser sous l'effet de la chaleur (bouteilles de gaz).", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/GHS-pictogram-bottle.svg" },
    { id: "SGH05", title: "Corrosif", desc: "Attaque les métaux et provoque des brûlures de la peau et des yeux.", img: "https://upload.wikimedia.org/wikipedia/commons/e/e1/GHS-pictogram-acid.svg" },
    { id: "SGH06", title: "Toxique", desc: "Produit empoisonnant rapidement même à faible dose.", img: "https://upload.wikimedia.org/wikipedia/commons/0/05/GHS-pictogram-skull.svg" },
    { id: "SGH07", title: "Toxique / Irritant", desc: "Provoque des irritations, somnolences ou allergies.", img: "https://upload.wikimedia.org/wikipedia/commons/1/13/GHS-pictogram-exclam.svg" },
    { id: "SGH08", title: "Danger Santé (CMR)", desc: "Cancérogène, mutagène, toxique pour la reproduction ou les poumons.", img: "https://upload.wikimedia.org/wikipedia/commons/2/2e/GHS-pictogram-silhouet.svg" },
    { id: "SGH09", title: "Environnement", desc: "Polluant pour les organismes aquatiques.", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/GHS-pictogram-pollut.svg" }
];

// --- DONNÉES CENTRES RESTEV 85 ---
const centresData = [
    { n: "La Roche-sur-Yon (Siège)", a: "Rue Maréchal Ney, 85000", t: "0251370000" },
    { n: "Les Sables d'Olonne", a: "Allée Titouan Lamazou, 85180", t: "0251210000" },
    { n: "Challans", a: "Rue des Artisans, 85300", t: "0251680000" },
    { n: "Montaigu", a: "Rue de l'Industrie, 85600", t: "0251460000" },
    { n: "Les Herbiers", a: "Rue de l'Arborescence, 85500", t: "0251670000" },
    { n: "Fontenay-le-Comte", a: "Rue de l'Innovation, 85200", t: "0251690000" }
];

const quizQuestions = [
    "Le DUERP a-t-il été mis à jour il y a moins d'un an ?",
    "Vos salariés ont-ils tous passé leur visite médicale ?",
    "Les FDS sont-elles accessibles sur les postes de travail ?",
    "Avez-vous des bacs de rétention pour vos produits liquides ?"
];
let currentQ = 0, totalScore = 0;

// --- LOGIQUE CORE ---

async function checkCloud(code) {
    if(!code) return;
    const { data } = await sb.from('produits_partages').select('*').eq('code', code.trim()).maybeSingle();
    if (data) {
        document.getElementById('prod-name').value = data.nom;
        document.getElementById('prod-fds').value = data.url_fds || '';
        document.getElementById('btn-save').classList.replace('btn-primary', 'btn-success');
        document.getElementById('btn-save').innerText = "PRODUIT RECONNU !";
    }
}

function startScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        document.getElementById('prod-code').value = text;
        checkCloud(text);
        scanner.stop();
    });
}

function saveProduct() {
    const name = document.getElementById('prod-name').value;
    const code = document.getElementById('prod-code').value;
    const fds = document.getElementById('prod-fds').value;
    if(!name) return alert("Nom requis");

    const p = { id: Date.now(), name, code, url_fds: fds };
    inventory.push(p);
    localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
    
    if(code) sb.from('produits_partages').upsert({ code, nom: name, url_fds: fds }).then();
    
    alert("Enregistré !");
    updateStats();
    nav('page-list', 'nav-list');
}

function renderInventory() {
    const c = document.getElementById('inventory-container');
    c.innerHTML = inventory.length ? '' : '<p class="text-center">Aucun produit</p>';
    inventory.forEach(i => {
        c.innerHTML += `
        <div class="card-custom">
            <div class="d-flex justify-content-between">
                <b>${i.name}</b>
                <button onclick="deleteItem(${i.id})" class="btn btn-sm text-danger"><i class="fa-solid fa-trash"></i></button>
            </div>
            <small class="text-muted">${i.code || 'Manuel'}</small>
            <div class="mt-2">
                ${i.url_fds ? `<a href="${i.url_fds}" target="_blank" class="btn btn-sm btn-primary w-100">VOIR FDS (PDF)</a>` : `<button class="btn btn-sm btn-outline-secondary w-100" disabled>FDS manquante</button>`}
            </div>
        </div>`;
    });
}

function deleteItem(id) {
    inventory = inventory.filter(x => x.id !== id);
    localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
    renderInventory();
    updateStats();
}

// --- RENDU LEXIQUE & CENTRES ---
function renderSGH() {
    document.getElementById('sgh-list').innerHTML = sghData.map(s => `
        <div class="card-custom sgh-card">
            <img src="${s.img}" class="sgh-img">
            <div><b class="d-block">${s.title}</b><small class="text-muted">${s.desc}</small></div>
        </div>`).join('');
}

function renderCentres() {
    document.getElementById('centres-list').innerHTML = centresData.map(c => `
        <div class="card-custom">
            <b>${c.n}</b><br><small>${c.a}</small><br>
            <a href="tel:${c.t}" class="btn btn-sm btn-outline-primary mt-2">Appeler : ${c.t}</a>
        </div>`).join('');
}

// --- QUIZ ---
function showQuestion() {
    document.getElementById('q-text').innerText = quizQuestions[currentQ];
}
function quizAnswer(p) {
    totalScore += p; currentQ++;
    if(currentQ < quizQuestions.length) showQuestion();
    else {
        document.getElementById('q-box').style.display = 'none';
        document.getElementById('q-result').style.display = 'block';
        document.getElementById('quiz-score').innerText = totalScore + "/12";
        document.getElementById('quiz-label').innerText = totalScore > 8 ? "Bravo !" : "Des efforts à faire.";
    }
}
function resetQuiz() { currentQ = 0; totalScore = 0; document.getElementById('q-box').style.display='block'; document.getElementById('q-result').style.display='none'; showQuestion(); }

// --- NAVIGATION ---
function nav(id, el) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active-page');
    if(el) el.classList.add('active');
    if(id === 'page-list') renderInventory();
    if(id === 'page-sgh') renderSGH();
    if(id === 'page-centres') renderCentres();
}

function updateStats() { document.getElementById('inv-stats').innerText = inventory.length + " produit(s) suivis"; }
function dismissSplash() { document.getElementById('splash').style.display = 'none'; }
function exportToCSV() { 
    let csv = "Nom,Code,URL\n" + inventory.map(i => `${i.name},${i.code},${i.url_fds}`).join("\n");
    window.open("data:text/csv;charset=utf-8," + encodeURI(csv));
}
function generatePDFProof() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Inventaire RESTEV 85", 10, 10);
    doc.autoTable({ head: [['Produit', 'Code', 'Lien FDS']], body: inventory.map(i => [i.name, i.code, i.url_fds]) });
    doc.save("Inventaire_FDS.pdf");
}

window.onload = () => { updateStats(); showQuestion(); };
</script>
</body>
</html>
