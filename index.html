function cacher(){['accueil','menu','pageMetiers','pageFiche','pageScanner','pageCMR','pageDUERP'].forEach(id=>document.getElementById(id).style.display='none');}
function retourAccueil(){cacher();document.getElementById('accueil').style.display='flex';}
function ouvrirMenu(){cacher();document.getElementById('menu').style.display='block';}
function ouvrirMetiers(){cacher();document.getElementById('pageMetiers').style.display='block';}
function ouvrirCMR(){cacher();document.getElementById('pageCMR').style.display='block';}
function ouvrirDUERP(){cacher();document.getElementById('pageDUERP').style.display='block';}

function afficherMetier(){let m=document.getElementById('metierSelect').value;if(!m){alert('Sélectionnez un métier');return;}cacher();document.getElementById('pageFiche').style.display='block';let d=metiersData[m];document.getElementById('titreMetier').innerText=d.label;document.getElementById('contenuMetier').innerHTML=`<b>Risques métier:</b><br>${d.risques_metier.join('<br>')}<br><br><b>CMR:</b><br>${d.risques_cmr.join('<br>')}<br><br><b>TMS:</b><br>${d.risques_tms.join('<br>')}<br><br><b>RPS:</b><br>${d.risques_rps.join('<br>')}<br><br><b>Prévention:</b><br>${d.prevention}<br><br><b>Obligations:</b><br>${d.obligations}<br><br><b>Docs:</b><br>${d.docs}`;}

let codeReader=null;
const produitsCMR={"3254567890123":{nom:'Dégraissant X',cmr:'H350',epi:'Gants'}};
function ouvrirScanner(){cacher();document.getElementById('pageScanner').style.display='block';codeReader=new ZXing.BrowserMultiFormatReader();codeReader.decodeFromVideoDevice(null,'video',(r,e)=>{if(r)afficherProduit(r.text);});}
function afficherProduit(ean){let z=document.getElementById('scanResult');z.style.display='block';if(produitsCMR[ean]){let p=produitsCMR[ean];z.innerHTML=`<b>${p.nom}</b><br>CMR:${p.cmr}<br>EPI:${p.epi}`;}else z.innerHTML='Produit non trouvé: '+ean;}
function arreterScanner(){try{codeReader.reset();}catch(e){}ouvrirMenu();}
