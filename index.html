<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Accompagnement prévention</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
}
.app{
  max-width:460px;
  margin:auto;
  padding:16px;
}
.header{
  text-align:center;
  margin-bottom:24px;
}
.logo{width:220px;}
.subtitle{font-size:14px;color:#475569;}

.card{
  background:#ffffff;
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 28px rgba(0,0,0,0.12);
}

h2,h3{
  color:#1e3a8a;
  margin-top:0;
}

.info{
  background:#eef2ff;
  padding:14px;
  border-radius:16px;
  font-size:14px;
  margin-bottom:22px;
}

.btn{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:12px;
}
.btn-main{background:#2563eb;color:white;}
.btn-back{background:#e5e7eb;}

.risque{margin-bottom:30px;}

.action{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:2px solid #c7d2fe;
  background:#f8fafc;
  margin-bottom:10px;
  font-size:15px;
  text-align:left;
  cursor:pointer;
}
.action.active{
  background:#dcfce7;
  border-color:#22c55e;
  font-weight:600;
}

.cmr{
  background:#fff7ed;
  border:2px solid #f97316;
  border-radius:18px;
  padding:18px;
}

.result{
  padding:18px;
  border-radius:18px;
  font-weight:700;
  text-align:center;
}

.good{background:#dcfce7;color:#166534;}
.medium{background:#fef9c3;color:#854d0e;}
.bad{background:#fee2e2;color:#991b1b;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  logo.png
  <div class="subtitle">Prévention santé au travail – Accompagnement EPST RESTEV</div>
</div>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <div class="info">
    Cette application est un <strong>outil d’accompagnement prévention</strong>.<br><br>
    Elle permet de faire un état des lieux simple par métier et
    d’orienter l’entreprise vers <strong>le bon accompagnement EPST</strong>,
    sans audit ni jugement.
  </div>
  <button class="btn btn-main" id="start">Démarrer</button>
</div>

<!-- MÉTIERS -->
<div id="metiers" class="card hidden">
  <h2>Choisir un métier</h2>
  <button class="btn btn-main" data-metier="macon">Maçon</button>
  <button class="btn btn-main" data-metier="couvreur">Couvreur</button>
  <button class="btn btn-main" data-metier="menuisier">Menuisier</button>
  <button class="btn btn-back" id="backAccueil">← Retour</button>
</div>

<!-- CHECKLIST -->
<div id="checklist" class="card hidden"></div>

</div>

<script>
const accueil = document.getElementById("accueil");
const metiersDiv = document.getElementById("metiers");
const checklist = document.getElementById("checklist");

const metiers = {
  macon:{
    nom:"Maçon",
    risques:[
      {
        titre:"Chute de hauteur",
        actions:["Échafaudages conformes","Garde‑corps","Accès sécurisés","Formation","EPI antichute"],
        niveau:"standard"
      },
      {
        titre:"Silice cristalline (CMR)",
        cmr:true,
        message:"Risque CMR nécessitant une vigilance renforcée et un accompagnement EPST.",
        actions:["Découpe à l’eau","Aspiration","Information salariés","Protection respiratoire"],
        niveau:"cmr"
      }
    ]
  },

  couvreur:{
    nom:"Couvreur",
    risques:[
      {
        titre:"Chute de hauteur",
        actions:["Protections collectives","Accès toiture","Formation","EPI antichute"],
        niveau:"standard"
      }
    ]
  },

  menuisier:{
    nom:"Menuisier",
    risques:[
      {
        titre:"Machines et outils coupants",
        actions:["Protections machines","Arrêts d’urgence","Formation","Consignes","EPI"],
        niveau:"structure"
      },
      {
        titre:"Poussières de bois (CMR)",
        cmr:true,
        message:"Poussières de bois classées CMR – accompagnement EPST recommandé.",
        actions:["Aspiration","Entretien aspiration","Nettoyage adapté","Information","Protection respiratoire"],
        niveau:"cmr"
      }
    ]
  }
};

// NAVIGATION
document.getElementById("start").onclick=()=>{
  accueil.classList.add("hidden");
  metiersDiv.classList.remove("hidden");
};
document.getElementById("backAccueil").onclick=()=>{
  metiersDiv.classList.add("hidden");
  accueil.classList.remove("hidden");
};

document.querySelectorAll("[data-metier]").forEach(b=>{
  b.onclick=()=>ouvrirMetier(b.dataset.metier);
});

function ouvrirMetier(id){
  const m=metiers[id];
  let html=`<h2>Métier : ${m.nom}</h2>
  <div class="info">Appuyez sur ce qui est déjà en place.</div>`;

  m.risques.forEach(r=>{
    html+=`<div class="risque ${r.cmr?'cmr':''}">
    <h3>${r.cmr?'🔴':'🟠'} ${r.titre}</h3>`;
    if(r.cmr){html+=`<div class="info">${r.message}</div>`;}
    r.actions.forEach(a=>{html+=`<button class="action">${a}</button>`;});
    html+=`</div>`;
  });

  html+=`
    <button class="btn btn-main" id="synthese">Voir la synthèse</button>
    <div id="result"></div>
    <button class="btn btn-back" id="backMetiers">← Retour</button>`;

  checklist.innerHTML=html;
  metiersDiv.classList.add("hidden");
  checklist.classList.remove("hidden");

  checklist.querySelectorAll(".action").forEach(b=>b.onclick=()=>b.classList.toggle("active"));
  document.getElementById("synthese").onclick=evaluer;
  document.getElementById("backMetiers").onclick=()=>{
    checklist.classList.add("hidden");
    metiersDiv.classList.remove("hidden");
  };
}

function evaluer(){
  const actions=checklist.querySelectorAll(".action");
  const actifs=checklist.querySelectorAll(".action.active").length;
  const ratio=actifs/actions.length;
  const res=document.getElementById("result");

  if(ratio>=0.7){
    res.innerHTML=`<div class="result good">
      ✅ Prévention globalement en place<br><br>
      <strong>Accompagnement RESTEV possible :</strong><br>
      Technicien prévention / Infirmier
    </div>`;
  }else if(ratio>=0.4){
    res.innerHTML=`<div class="result medium">
      🟡 Prévention partiellement en place<br><br>
      <strong>Accompagnement RESTEV recommandé :</strong><br>
      Technicien prévention / Ergonome
    </div>`;
  }else{
    res.innerHTML=`<div class="result bad">
      🔴 Prévention à renforcer<br><br>
      <strong>Accompagnement RESTEV conseillé :</strong><br>
      Technicien prévention / Ingénieur / Médecin
    </div>`;
  }

  if(checklist.querySelector(".cmr")){
    res.innerHTML+=`<div class="info">
      🔴 <strong>CMR identifié</strong><br>
      Intervention EPST recommandée :
      Médecin du travail + Prévention
    </div>`;
  }
}
</script>

</body>
</html>
