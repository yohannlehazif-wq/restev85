.card {
  background: white;
  max-width: 420px;
  width: 100%;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}
h2 { text-align: center; color: #1e3a8a; }
.info {
  background: #eef2ff;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 16px;
}
.risque { margin-bottom: 20px; }
.risque h3 { margin-bottom: 10px; }
.btn-action {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  border: 2px solid #c7d2fe;
  background: #f8fafc;
  font-size: 14px;
  cursor: pointer;
}
.btn-action.active {
  background: #dcfce7;
  border-color: #22c55e;
  font-weight: bold;
}
.resultat {
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
  margin-top: 16px;
  text-align: center;
}
.bon { background:#dcfce7; color:#166534; }
.moyen { background:#fef9c3; color:#854d0e; }
.faible { background:#fee2e2; color:#991b1b; }
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  background: #2563eb;
  color: white;
}

</head>

<body>

<div class="card">

<h2>Métier : Maçon</h2>

<div class="info">
  Appuyez sur les boutons correspondant à ce qui est
  <strong>déjà en place</strong> dans votre entreprise.
</div>

<div class="risque">
  <h3>🟠 Chute de hauteur</h3>

  <button class="btn-action">Échafaudages conformes et vérifiés</button>
  <button class="btn-action">Garde‑corps installés</button>
  <button class="btn-action">Accès sécurisés aux zones en hauteur</button>
  <button class="btn-action">Formation / sensibilisation travail en hauteur</button>
  <button class="btn-action">Utilisation des EPI antichute si nécessaire</button>
</div>

<button class="btn" onclick="evaluer()">✅ Voir la synthèse</button>
<div id="resultat"></div>

</div>

<script>
// gestion on/off des boutons
document.querySelectorAll('.btn-action').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
  });
});

function evaluer() {
  const total = document.querySelectorAll('.btn-action').length;
  const actifs = document.querySelectorAll('.btn-action.active').length;
  const ratio = actifs / total;
  const resultat = document.getElementById("resultat");

  if (ratio >= 0.7) {
    resultat.innerHTML = `<div class="resultat bon">
      ✅ Prévention globalement en place<br>
      La démarche va dans le bon sens.
    </div>`;
  } else if (ratio >= 0.4) {
    resultat.innerHTML = `<div class="resultat moyen">
      🟡 Prévention partiellement en place<br>
      Des axes d’amélioration existent.
    </div>`;
  } else {
    resultat.innerHTML = `<div class="resultat faible">
      🔴 Prévention à renforcer<br>
      Des actions simples peuvent être mises en place progressivement.
    </div>`;
  }
}
</script>

</body>
</html>
