<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Analyse produit CMR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:system-ui, Arial;
  background:#f2f5f4;
  padding:16px;
}
.card{
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
button{
  width:100%;
  padding:14px;
  border:none;
  background:#2e8b7a;
  color:white;
  font-size:16px;
  border-radius:14px;
  margin-top:10px;
}
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
}
.result{
  margin-top:14px;
  padding:14px;
  border-radius:14px;
  background:#f39c12;
  color:white;
}
</style>
</head>

<body>

<div class="card">
  <h2>🧪 Analyse produit – Repérage CMR</h2>

  <p>
    Saisissez le nom du produit ou scannez le code‑barres.
    Cette analyse permet un <strong>repérage préalable</strong>,
    et ne remplace pas l’évaluation réglementaire.
  </p>

  <!-- SAISIE MANUELLE -->
  <input type="text" id="produit" placeholder="Nom du produit ou code‑barres">

  <!-- SCAN CAMERA -->
  <br><br>
  <input type="file" accept="image/*" capture="environment">

  <button onclick="analyser()">Analyser le produit</button>

  <div id="resultat"></div>
</div>

<script>
function analyser(){
  document.getElementById("resultat").innerHTML =
  "<div class='result'>" +
  "<strong>⚠ Produit potentiellement concerné par des risques CMR.</strong><br><br>" +
  "Une analyse de la FDS et de la classification CLP est nécessaire.<br><br>" +
  "<em>SEIRICH (INRS) est l’outil de référence pour l’évaluation réglementaire.<br>" +
  "RESTEV peut vous accompagner dans cette démarche.</em>" +
  "</div>";
}
</script>

</body>
</html>
