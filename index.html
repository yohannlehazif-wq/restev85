<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Identification CMR</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
}

.app{
  max-width:480px;
  margin:auto;
  padding:16px;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  width:200px;
  max-width:90%;
}

.card{
  background:#ffffff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 28px rgba(0,0,0,0.12);
}

.info{
  background:#fff7ed;
  border:2px solid #f97316;
  border-radius:16px;
  padding:14px;
  font-size:14px;
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:12px;
}

.btn-main{
  background:#2563eb;
  color:white;
}

.result{
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  font-weight:700;
  background:#fee2e2;
  color:#991b1b;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <img src="logo.png" class="logo" alt="RESTEV">
</div>

<div class="card">

<h2>Identification produit CMR</h2>

<div class="info">
  Cette page permet d’identifier un produit ou un matériau
  contenant potentiellement des substances <strong>CMR</strong>.<br><br>
  Le scan sert à <strong>alerter et orienter</strong>,
  et ne remplace pas une analyse EPST.
</div>

<button class="btn btn-main" onclick="scannerCode()">
  📷 Scanner un code‑barres
</button>

<div id="scanResult"></div>

</div>
</div>

<script>
async function scannerCode(){
  const resultDiv = document.getElementById("scanResult");

  if(!('BarcodeDetector' in window)){
    resultDiv.innerHTML = `
      <div class="result">
        📱 Le scan automatique n’est pas disponible sur ce navigateur.<br><br>
        ➜ Utilisez un appareil Android/Chrome<br>
        ➜ Ou contactez RESTEV pour un accompagnement EPST.
      </div>`;
    return;
  }

  try{
    const detector = new BarcodeDetector();
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    const codes = await detector.detect(video);

    stream.getTracks().forEach(track => track.stop());

    if(codes.length > 0){
      resultDiv.innerHTML = `
        <div class="result">
          🔴 Produit détecté – vigilance CMR<br><br>
          Code : <strong>${codes[0].rawValue}</strong><br><br>

          ⚕️ <strong>Accompagnement recommandé :</strong><br>
          Médecin du travail + Prévention RESTEV
        </div>`;
    } else {
      resultDiv.innerHTML = `
        <div class="result">
          Aucun code détecté.<br>
          Réessayez ou contactez RESTEV.
        </div>`;
    }

  } catch(e){
    resultDiv.innerHTML = `
      <div class="result">
        Erreur lors du scan caméra.<br>
        Contactez RESTEV.
      </div>`;
  }
}
</script>

</body>
</html>
