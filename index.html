<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 450px;
  margin: auto;
  padding: 20px;
  background: #f3f4f6;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-top: 20px;
}

h1, h2 {
  color: #2563eb;
  text-align: center;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-main { background: #2563eb; color: white; }
.btn-risk { background: #f97316; color: white; }
.btn-back { background: #d1d5db; }

.info {
  background: #e0f2fe;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center;">Application d’aide à la prévention des risques professionnels</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ACTIVITÉS -->
<div id="activites" class="card" style="display:none;">
  <h2>Votre activité</h2>

  <div class="info">
    Il ne s’agit pas de juger mais d’identifier les risques pour agir progressivement.
  </div>

  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="afficherMetiers('logistique')">Logistique / Transport</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

<!-- MÉTIERS -->
<div id="metiers" class="card" style="display:none;"></div>

<!-- RISQUES -->
<div id="risques" class="card" style="display:none;"></div>

<script>
const data = {
  btp: {
    "Ouvrier du bâtiment": [
      "Chutes de hauteur",
      "Manutentions manuelles",
      "Bruit",
      "Poussières"
    ]
  },
  services: {
    "Commercial itinérant": [
      "Risque routier",
      "Stress / RPS"
    ],
    "Coiffeur / Coiffeuse": [
      "Produits chimiques",
      "Postures prolongées"
    ]
  },
  logistique: {
    "Conducteur / Livreur": [
      "Risque routier",
      "Manutention de colis",
      "Chutes de plain-pied"
    ]
  }
};

function cacherTout() {
  ["accueil","activites","metiers","risques"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
}

function entrer() {
  cacherTout();
  document.getElementById("activites").style.display = "block";
}

function retourAccueil() {
  cacherTout();
  document.getElementById("accueil").style.display = "block";
}

function afficherMetiers(secteur) {
  cacherTout();
  const zone = document.getElementById("metiers");
  zone.style.display = "block";

  let html = "<h2>Métiers</h2>";
  for (let m in data[secteur]) {
    html += `<button class="btn btn-main" onclick="afficherRisques('${secteur}','${m}')">${m}</button>`;
  }

  html += `<button class="btn btn-back" onclick="entrer()">← Retour activités</button>`;
  zone.innerHTML = html;
}

function afficherRisques(secteur, metier) {
  cacherTout();
  const zone = document.getElementById("risques");
  zone.style.display = "block";

  let html = `<h2>Risques – ${metier}</h2>`;
  data[secteur][metier].forEach(risque => {
    html += `<div class="btn btn-risk">${risque}</div>`;
  });

  html += `
    <div class="info">
      RESTEV accompagne les entreprises et les salariés dans une démarche de prévention progressive.
    </div>
    <button class="btn btn-back" onclick="afficherMetiers('${secteur}')">← Retour métiers</button>
  `;
  zone.innerHTML = html;
}
</script>

</body>
</html>
