<script>
const mesures = {
  btp: [
    "Organisation du travail et des chantiers",
    "Formation à la sécurité et aux risques spécifiques",
    "Équipements de protection individuelle (EPI)",
    "Matériel et engins entretenus",
    "Prévention des chutes et manutentions"
  ],
  sante: [
    "Organisation des soins et des tâches",
    "Prévention des risques biologiques",
    "Gestes et postures adaptés",
    "Protocoles connus et appliqués",
    "Espaces de récupération identifiés"
  ],
  bouche: [
    "Hygiène et sécurité alimentaire",
    "Organisation des postes de travail",
    "Équipements adaptés (coupures, brûlures)",
    "Prévention des TMS",
    "Matériel entretenu"
  ],
  logistique: [
    "Organisation des flux",
    "Gestes et postures",
    "Utilisation d’aides à la manutention",
    "Circulation sécurisée",
    "Formation à la conduite d’engins"
  ],
  services: [
    "Organisation du travail",
    "Prévention des risques psychosociaux",
    "Aménagement des postes",
    "Temps d’échange sur le travail",
    "Information prévention"
  ]
};

function changerMesures(){
  const metier = document.getElementById("metier").value;
  const liste = document.getElementById("liste-mesures");

  // Nettoyage
  liste.innerHTML = "";

  if (!mesures[metier]) {
    const info = document.createElement("li");
    info.style.color = "#6b7280";
    info.textContent = "Sélectionnez un métier pour afficher les mesures correspondantes.";
    liste.appendChild(info);
    return;
  }

  mesures[metier].forEach(function(m){
    const li = document.createElement("li");

    const label = document.createElement("label");
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" " + m));

    li.appendChild(label);
    liste.appendChild(li);
  });
}
</script>
