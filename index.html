<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Démo produits</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #eef7ff 80%);
}
.app{max-width:620px;margin:auto;padding:16px}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
.header img{height:48px;}
.header-title{font-size:18px;font-weight:bold;color:#3b82f6}

/* Pages */
.page{
  display:none;
  background:white;
  border-radius:26px;
  padding:24px;
  box-shadow:0 14px 34px rgba(59,130,246,0.15);
}
.page.active{display:block;}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:14px;
}

.home{background:#e0f2fe;color:#1e3a8a}
.cmr{background:#fee2e2;color:#7f1d1d}
.back{background:#e5e7eb;color:#111}

input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:14px;
  border:2px solid #c7d2fe;
}

.card{
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.card.info{background:#e0f2fe}
.card.cmr{background:#fee2e2}
.card.prev{background:#dcfce7}

video{
  width:100%;
  border-radius:14px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  logo.png
  <div class="header-title">Prévention santé au travail</div>
</div>

<!-- ACCUEIL -->
<div id="home" class="page active">
<h2>Application RESTEV</h2>
<p>Démo : identification des produits et prévention des risques.</p>
<button class="cmr" onclick="openPage('cmr')">Identifier un produit (scan / saisie)</button>
</div>

<!-- PAGE CMR -->
<div id="cmr" class="page">
<h2>Identification produits – Démo direction</h2>

<button class="cmr" onclick="startScan()">Scanner un produit (code‑barres)</button>
<video id="video" style="display:none"></video>

<input id="cmrInput" placeholder="Ou saisir : destop / white spirit">
<button class="home" onclick="searchByName()">Identifier le produit</button>

<div id="result"></div>

<button class="back" onclick="openPage('home')">← Retour</button>
</div>

</div>

<script>
/* NAVIGATION */
function openPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* BASE PRODUITS – SIMULATION API */
const productDB = {
  "destop": {
    nom:"Déboucheur de canalisations (DESTOP)",
    categorie:"Produit de nettoyage très alcalin",
    substances:["soude"]
  },
  "white spirit": {
    nom:"White‑Spirit",
    categorie:"Solvant pétrolier",
    substances:["white_spirit"]
  },
  "3228857005173": { // exemple EAN DESTOP
    nom:"Déboucheur de canalisations (DESTOP)",
    categorie:"Produit de nettoyage très alcalin",
    substances:["soude"]
  }
};

/* BASE SUBSTANCES */
const substanceDB = {
  soude:{
    nom:"Hydroxyde de sodium (soude caustique)",
    type:"Agent chimique dangereux – corrosif",
    effets:"Brûlures graves de la peau et des yeux, risques respiratoires",
    prevention:[
      "Substitution par méthodes mécaniques si possible",
      "Procédure d’utilisation écrite",
      "Interdiction des mélanges",
      "Gants et protection oculaire"
    ]
  },
  white_spirit:{
    nom:"White‑Spirit (solvant pétrolier)",
    type:"Toxique chronique par exposition répétée",
    effets:"Troubles neurologiques, irritations",
    prevention:[
      "Produits à l’eau si possible",
      "Ventilation des locaux",
      "Limitation des durées d’exposition",
      "Protection respiratoire si nécessaire"
    ]
  }
};

/* NORMALISATION */
function norm(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

/* RECHERCHE PAR NOM */
function searchByName(){
  const key = norm(cmrInput.value);
  const product = Object.values(productDB).find(p=>norm(p.nom).includes(key));
  if(!product){
    result.innerHTML="<div class='card info'>Produit non reconnu – vérifier la FDS.</div>";
    return;
  }
  showProduct(product);
}

/* AFFICHAGE PRODUIT */
function showProduct(p){
  let html = `
    <div class="card info">
      <strong>Produit identifié</strong><br>
      ${p.nom}<br>
      <em>${p.categorie}</em>
    </div>
  `;
  p.substances.forEach(s=>{
    const sub=substanceDB[s];
    html+=`
      <div class="card cmr">
        <strong>${sub.nom}</strong><br>
        ${sub.type}<br>
        ${sub.effets}
      </div>
      <div class="card prev">
        <strong>Prévention recommandée :</strong>
        <ul>${sub.prevention.map(x=>`<li>${x}</li>`).join("")}</ul>
      </div>
    `;
  });
  html+=`
    <div class="card prev">
      ⚠️ La fiche de données de sécurité (FDS) reste la référence obligatoire.
    </div>
  `;
  result.innerHTML=html;
}

/* SCAN CODE‑BARRES */
async function startScan(){
  if(!("BarcodeDetector" in window)){
    alert("Caméra non disponible sur cet appareil");
    return;
  }
  const v=document.getElementById("video");
  v.style.display="block";
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  v.srcObject=stream;await v.play();
  const detector=new BarcodeDetector();
  const loop=setInterval(async()=>{
    const codes=await detector.detect(v);
    if(codes.length){
      clearInterval(loop);
      stream.getTracks().forEach(t=>t.stop());
      v.style.display="none";
      const code=codes[0].rawValue;
      const product=productDB[code];
      if(product){showProduct(product);}
      else{result.innerHTML="<div class='card info'>Produit identifié – informations chimiques à vérifier via la FDS.</div>";}
    }
  },800);
}
</script>

</body>
</html>
