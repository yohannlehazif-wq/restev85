<!DOCTYPE html>
<html lang="fr">
<head‑évaluation prévention & CMR</title><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --vert:#7fbf9a;
  --orange:#f2b66d;
  --rouge:#e88b8b;
  --fond:#ecf6f3;
  --carte:#ffffff;
  --accent:#2e8b7a;
  --texte:#2c3e50;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--fond);
  color:var(--texte);
}

section{
  display:none;
  min-height:100vh;
  padding:28px;
}
section.active{display:block}

h1,h2,h3{color:var(--accent)}

button{
  padding:14px 28px;
  border:none;
  border-radius:24px;
  background:var(--accent);
  color:white;
  font-size:16px;
  margin-top:20px;
}

.card{
  background:var(--carte);
  border-radius:20px;
  padding:22px;
  margin-top:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.accueil{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  width:200px;
  max-width:70%;
  margin-bottom:20px;
  animation:resp 4s ease-in-out infinite;
}

@keyframes resp{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

.menu{display:grid;gap:16px}

.menu button{
  background:white;
  color:var(--texte);
  font-weight:bold;
}

select{
  width:100%;
  padding:14px;
  border-radius:12px;
  font-size:15px;
  margin-top:10px;
}

.checklist{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.resultat{
  padding:16px;
  border-radius:14px;
  font-weight:bold;
  margin-top:15px;
}

.info{
  background:#eef5f2;
  border-left:5px solid var(--accent);
  padding:14px;
  border-radius:10px;
  margin-top:15px;
}

.retour{
  background:transparent;
  color:var(--accent);
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<section id="accueil" class="active">
  <div class="accueil">
    logo-restev.png
    <p>Évaluer sa prévention, identifier les points de vigilance et avancer accompagné.</p>
    <button onclick="show('menu')">Entrer</button>
  </div>
</section>

<!-- MENU -->
<section id="menu">
  <h1>Menu</h1>
  <div class="menu">
    <button onclick="show('evaluation')">👷 Auto‑évaluation par métier</button>
  </div>
  <button class="retour" onclick="show('accueil')">← Accueil</button>
</section>

<!-- AUTO EVALUATION METIER + CMR -->
<section id="evaluation">
<h1>Auto‑évaluation prévention</h1>

<div class="card">

  <label><strong>Sélectionnez votre métier :</strong></label>
  <select id="metier" onchange="chargerMetier()">
    <option value="">— Choisir —</option>
    <option value="aide">Aide‑soignant / EHPAD</option>
    <option value="macon">Maçon</option>
    <option value="bureau">Travail de bureau</option>
    <option value="boulanger">Boulanger</option>
  </select>

  <h2>Prévention métier</h2>
  <div id="questions" class="checklist"></div>

  <h2>Repérage CMR (si concerné)</h2>
  <p>Indiquez si ces situations existent dans votre activité :</p>

  <div class="checklist">
    <label><input type="checkbox" class="cmr"> Utilisation de produits chimiques dangereux</label>
    <label><input type="checkbox" class="cmr"> Poussières, fumées ou vapeurs</label>
    <label><input type="checkbox" class="cmr"> Substances classées CMR</label>
    <label><input type="checkbox" class="cmr"> Protections collectives insuffisantes</label>
  </div>

  <button onclick="evaluerGlobale()">Évaluer ma prévention</button>
  <div id="resultat" class="resultat"></div>

</div>

<button class="retour" onclick="show('menu')">← Menu</button>
</section>

<script>
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

const data={
  aide:["EPI disponibles","Formation manutention","Gestion AES","Organisation soins","Prévention RPS"],
  macon:["Protections collectives","Manutention sécurisée","Plan de prévention","Brief sécurité","EPI portés"],
  bureau:["Poste ergonomique","Pauses","Prévention RPS","Éclairage adapté","Organisation du travail"],
  boulanger:["Ventilation","Manutentions","EPI coupures","Farines maîtrisées","Organisation postes"]
};

function chargerMetier(){
  const m=document.getElementById("metier").value;
  const zone=document.getElementById("questions");
  zone.innerHTML="";
  document.getElementById("resultat").innerHTML="";
  if(!data[m])return;
  data[m].forEach(q=>{
    zone.innerHTML += `<label><input type="checkbox" class="prev"> ${q}</label>`;
  });
}

function evaluerGlobale(){
  const prev=document.querySelectorAll(".prev");
  const cmr=document.querySelectorAll(".cmr");
  let okPrev=0; prev.forEach(x=>{if(x.checked)okPrev++;});
  let okCmr=0; cmr.forEach(x=>{if(x.checked)okCmr++;});

  const ratio=okPrev/prev.length;
  const res=document.getElementById("resultat");

  let couleur="";
  let message="";

  if(ratio<0.4){
    couleur="var(--rouge)";
    message="Prévention à renforcer.";
  }else if(ratio<0.75){
    couleur="var(--orange)";
    message="Prévention en progression.";
  }else{
    couleur="var(--vert)";
    message="Prévention globalement maîtrisée.";
  }

  if(okCmr>0){
    couleur = okCmr>2 ? "var(--rouge)" : "var(--orange)";
    message +=
      "<br><br><strong>Point de vigilance CMR identifié.</strong>" +
      "<br>Une analyse plus approfondie et un accompagnement sont recommandés.";
  }

  message +=
    "<br><br><em>RESTEV peut vous accompagner dans l’analyse de votre situation, " +
    "la gestion des CMR et la mise en place d’actions adaptées.</em>";

  res.style.background=couleur;
  res.innerHTML=message;
}
</script>

</body>
</html>
<meta charset="UTF-8">
