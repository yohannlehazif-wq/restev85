<script>
/* =========================================================
   CONFIGURATION SUPABASE
========================================================= */
const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co';
const SUPABASE_KEY = 'TA_CLE_ANON_SUPABASE'; // à mettre en prod avec RLS
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================================================
   DONNÉES LOCALES
========================================================= */
let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

/* =========================================================
   OUTILS
========================================================= */
function normalizeCode(v) {
  return v ? v.toString().trim().replace(/\s+/g, '') : '';
}

/* =========================================================
   RECONNAISSANCE CLOUD (LECTURE AUTO PDF)
========================================================= */
async function checkCloud(rawCode) {
  const code = normalizeCode(rawCode);
  if (!code) return;

  const { data, error } = await sb
    .from('produits_partages')
    .select('nom, url_fds')
    .eq('code', code)
    .maybeSingle();

  if (error) {
    console.error("Erreur Supabase :", error);
    return;
  }

  if (data) {
    document.getElementById('prod-name').value = data.nom;
    document.getElementById('prod-fds').value = data.url_fds || '';

    const btn = document.getElementById('btn-save');
    btn.innerText = "✅ PRODUIT RECONNU (Cloud)";
    btn.classList.replace('btn-primary', 'btn-success');

    setTimeout(() => {
      btn.innerText = "ENREGISTRER LE PRODUIT";
      btn.classList.replace('btn-success', 'btn-primary');
    }, 2000);
  }
}

/* =========================================================
   SCANNER CODE-BARRES
========================================================= */
function startScanner() {
  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      const code = normalizeCode(text);
      document.getElementById('prod-code').value = code;
      checkCloud(code);
      scanner.stop();
    },
    (err) => {}
  ).catch(() => alert("Erreur caméra – autorisation refusée."));
}

/* =========================================================
   RECHERCHE GOOGLE FDS
========================================================= */
function searchFDS() {
  const name = document.getElementById('prod-name').value;
  if (!name) return alert("Saisis le nom du produit.");
  const q = encodeURIComponent(`FDS ${name} filetype:pdf`);
  window.open(`https://www.google.com/search?q=${q}`, '_blank');
}

/* =========================================================
   ENREGISTREMENT PRODUIT (LOCAL + CLOUD)
========================================================= */
async function saveProduct() {
  const name = document.getElementById('prod-name').value.trim();
  const code = normalizeCode(document.getElementById('prod-code').value);
  const fdsUrl = document.getElementById('prod-fds').value.trim();

  if (!name) return alert("Nom du produit obligatoire.");

  const newProd = {
    id: Date.now(),
    name,
    code,
    url_fds: fdsUrl,
    date: new Date().toLocaleDateString('fr-FR')
  };

  inventory.push(newProd);
  localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));

  if (code) {
    await sb.from('produits_partages').upsert({
      code,
      nom: name,
      url_fds: fdsUrl
    });
  }

  document.getElementById('prod-name').value = '';
  document.getElementById('prod-code').value = '';
  document.getElementById('prod-fds').value = '';

  updateStats();
  nav('page-list', 'nav-list');
}

/* =========================================================
   INVENTAIRE
========================================================= */
function renderInventory() {
  const box = document.getElementById('inventory-container');
  box.innerHTML = inventory.length
    ? ''
    : '<p class="text-muted text-center mt-4">Inventaire vide.</p>';

  inventory
    .sort((a,b)=>a.name.localeCompare(b.name))
    .forEach(i => {
      const google = `https://www.google.com/search?q=FDS+${encodeURIComponent(i.name)}`;
      box.innerHTML += `
      <div class="card-custom">
        <div class="d-flex justify-content-between">
          <div>
            <b>${i.name}</b><br>
            <small class="text-muted">${i.code || 'Saisie manuelle'}</small>
          </div>
          <button class="btn btn-sm text-danger" onclick="deleteItem(${i.id})">
            <i class="fa fa-trash"></i>
          </button>
        </div>
        <div class="mt-3">
          ${i.url_fds
            ? `<a href="${i.url_fds}" target <i class="fa fa-file-pdf"></i> Ouvrir la FDS
               </a>`
            : `<a href="${google}" target="_blank" class="btn btn-outline-warningRechercher FDS
               </a>`
          }
        </div>
      </div>`;
    });
}

function deleteItem(id) {
  if (!confirm("Supprimer ce produit ?")) return;
  inventory = inventory.filter(p => p.id !== id);
  localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
  renderInventory();
  updateStats();
}

/* =========================================================
   NAVIGATION
========================================================= */
function nav(id, btnId) {
  document.querySelectorAll('.app-page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById(id)?.classList.add('active-page');

  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btnId) document.getElementById(btnId)?.classList.add('active');

  if(id === 'page-list') renderInventory();
  window.scrollTo(0,0);
}

/* =========================================================
   STATS / UI
========================================================= */
function updateStats() {
  document.getElementById('inv-stats').innerText =
    `${inventory.length} produit(s) enregistrés`;
}

function dismissSplash() {
  document.getElementById('splash').style.opacity = '0';
  setTimeout(()=>document.getElementById('splash').style.display='none', 700);
}

/* =========================================================
   INIT
========================================================= */
document.getElementById('prod-code').addEventListener('blur', e=>{
  checkCloud(e.target.value);
});

window.onload = () => {
  updateStats();
};
</script>
