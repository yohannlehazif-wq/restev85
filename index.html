<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin-bottom: 85px; }
        
        /* SPLASH SCREEN AVEC LOGO CARRÉ */
        #splash { 
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, var(--r-blue), var(--r-teal), var(--r-purple), var(--r-yellow));
            background-size: 400% 400%; animation: gradient 8s ease infinite;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        .logo-splash { width: 120px; height: auto; margin-bottom: 20px; border-radius: 15px; }

        /* HEADER AVEC LOGO LONG */
        .app-header { background: white; padding: 10px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; width: auto; }

        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.65rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }

        .app-page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-custom { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--r-blue); box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        
        /* GRILLE SGH */
        .sgh-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sgh-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sgh-card img { width: 100%; max-width: 60px; height: 60px; object-fit: contain; margin-bottom: 5px; }
        .sgh-card b { font-size: 0.6rem; color: #334155; display: block; line-height: 1.1; }

        .prevention-badge { background: #fff3e0; border-left: 4px solid #ff9800; padding: 10px; font-size: 0.85rem; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="text-center bg-white p-5 rounded-5 shadow">
            <img src="logo_restev_carre.png" alt="Logo" class="logo-splash" onerror="this.src='https://placehold.co/120x120?text=RESTEV+85'">
            <div class="h4 fw-bold mb-4" style="color: var(--r-blue);">Expert Prévention</div>
            <button class="btn btn-primary rounded-pill px-5 fw-bold" onclick="startApp()">LANCER</button>
        </div>
    </div>

    <!-- HEADER -->
    <div class="app-header">
        <img src="logo_restev_long.png" alt="RESTEV 85" class="logo-header" onerror="this.style.display='none'">
        <!-- Fallback texte si le logo ne charge pas -->
        <div class="fw-bold" id="header-text" style="display:none; color: var(--r-blue);">RESTEV 85</div>
    </div>

    <!-- ACCUEIL -->
    <div id="page-home" class="app-page active-page">
        <div class="card-custom" style="background: var(--r-blue); color: white; border: none;">
            <h5>Bonjour,</h5>
            <p class="small mb-0">Sélectionnez un outil de prévention :</p>
        </div>
        <div class="row g-2">
            <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-4"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><b>SCAN FDS</b></div>
            </div>
            <div class="col-6" onclick="nav('page-sgh', 'nav-sgh')">
                <div class="card-custom text-center py-4"><i class="fa-solid fa-biohazard fa-2x mb-2 text-danger"></i><br><b>SGH / DANGER</b></div>
            </div>
        </div>
    </div>

    <!-- PAGE SGH -->
    <div id="page-sgh" class="app-page">
        <h5 class="fw-bold mb-3">Symboles de Danger (SGH)</h5>
        <div id="sgh-list" class="sgh-container"></div>
    </div>

    <!-- MODAL SGH -->
    <div class="modal fade" id="sghModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-body text-center p-4">
                    <img id="modal-img" src="" style="width: 80px;" class="mb-3">
                    <h4 id="modal-title" class="fw-bold"></h4>
                    <hr>
                    <div class="text-start">
                        <p class="small"><strong>Risques :</strong> <span id="modal-desc"></span></p>
                        <div id="modal-h" class="mb-2"></div>
                        <div class="prevention-badge">
                            <strong>Conseils :</strong><br><span id="modal-p"></span>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary w-100 mt-4 rounded-pill" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE SCAN -->
    <div id="page-scan" class="app-page">
        <div class="card-custom"><div id="reader"></div></div>
        <p class="text-center mt-3 small text-muted">Scannez le QR Code sur la FDS ou l'étiquette.</p>
    </div>

    <!-- PAGE METIERS -->
    <div id="page-metiers" class="app-page">
        <h5 class="fw-bold mb-3">Fiches par Métier</h5>
        <div id="metiers-list"></div>
    </div>

    <!-- NAV BOTTOM -->
    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-barcode"></i>SCAN</button>
        <button id="nav-sgh" class="nav-item" onclick="nav('page-sgh', this)"><i class="fa-solid fa-biohazard"></i>SGH</button>
        <button id="nav-metiers" class="nav-item" onclick="nav('page-metiers', this)"><i class="fa-solid fa-helmet-safety"></i>MÉTIERS</button>
    </nav>

    <script>
        const sghData = [
            {t: "Explosif", img: "SGH01_BombeExplosant.jpg", d: "Matières explosibles.", h: "H200", p: "Éviter chocs et chaleur[cite: 1]."},
            {t: "Inflammable", img: "SGH02_Flamme.jpg", d: "Gaz/liquides inflammables.", h: "H220", p: "Tenir à l'écart des flammes[cite: 1]."},
            {t: "Comburant", img: "SGH03_FlammeSurCercle.jpg", d: "Peut aggraver un incendie.", h: "H270", p: "Stocker loin des combustibles[cite: 1]."},
            {t: "Gaz Pression", img: "SGH04_BouteilleGaz.jpg", d: "Peut exploser sous la chaleur.", h: "H280", p: "Stocker en lieu ventilé[cite: 1]."},
            {t: "Corrosif", img: "SGH05_Corrosion.jpg", d: "Brûlures graves de la peau.", h: "H314", p: "Porter gants et lunettes[cite: 1]."},
            {t: "Toxique", img: "SGH06_T%C3%AAteDeMort.jpg", d: "Mortel en cas d'ingestion/inhalation.", h: "H300", p: "Appeler le centre antipoison[cite: 1]."},
            {t: "Irritant", img: "SGH07_PointExclamation.jpg", d: "Nocif, irritant ou sensibilisant.", h: "H315", p: "Éviter le contact cutané[cite: 1]."},
            {t: "Danger Santé", img: "SGH08_DangerSante.jpg", d: "Effets CMR (Cancer, etc.).", h: "H350", p: "Protection respiratoire obligatoire[cite: 1]."},
            {t: "Environnement", img: "SGH09_Environnement.jpg", d: "Toxique pour la vie aquatique.", h: "H410", p: "Ne pas jeter à l'égout[cite: 1]."}
        ];

        function startApp() { 
            document.getElementById('splash').style.display='none'; 
            renderSGH(); 
        }

        function renderSGH() {
            document.getElementById('sgh-list').innerHTML = sghData.map((x, i) => `
                <div class="sgh-card" onclick="showSghDetail(${i})">
                    <img src="${x.img}" onerror="this.src='https://placehold.co/100x100?text=SGH'">
                    <b>${x.t}</b>
                </div>`).join('');
        }

        function showSghDetail(i) {
            const d = sghData[i];
            document.getElementById('modal-img').src = d.img;
            document.getElementById('modal-title').innerText = d.t;
            document.getElementById('modal-desc').innerText = d.d;
            document.getElementById('modal-h').innerHTML = `<span class="badge bg-danger">${d.h}</span>`;
            document.getElementById('modal-p').innerText = d.p;
            new bootstrap.Modal(document.getElementById('sghModal')).show();
        }

        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(typeof el === 'string') document.getElementById(el).classList.add('active'); else el.classList.add('active');
        }

        // Vérification logo header
        window.onload = () => {
            const img = document.querySelector('.logo-header');
            img.onerror = () => { img.style.display='none'; document.getElementById('header-text').style.display='block'; };
        };
    </script>
</body>
</html>
