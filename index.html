<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>RESTEV – Prévention Mobile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: auto;
      background: #f3f4f6;
      padding: 0;
    }

    /* ---- ÉCRAN D’ACCUEIL ---- */
    #accueil {
      height: 100vh;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 260px;
      margin-bottom: 30px;
    }

    #accueil h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    #accueil p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-start { background: white; color: #2563eb; width: 240px; }
    .btn-job   { background: #2563eb; color: white; }
    .btn-risk  { background: #f97316; color: white; }
    .btn-back  { background: #d1d5db; color: black; }

    /* ---- CARTES ---- */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: left;
    }
  </style>
</head>

<body>

<!-- ✅ ÉCRAN D’ACCUEIL -->
<div id="accueil">
  <img src="https://i.ibb.co/rf4MxsC/LOGO-RESTEV-DIGITAL-RVB.png" class="logo" alt="logo RESTEV">
  <h1>Prévention Mobile</h1>
  <p>Application officielle RESTEV</p>
  <button class="btn btn-start" onclick="entrer()">Entrer</button>
</div>

<!-- ✅ MÉTIERS -->
<div id="menu-metiers" class="card" style="display:none;">
  <h2>Choisis ton métier :</h2>

  <button class="btn btn-job" onclick="showRisks('maintenance')">Technicien maintenance</button>
  <button class="btn btn-job" onclick="showRisks('commercial')">Commercial itinérant</button>
  <button class="btn btn-job" onclick="showRisks('boucher')">Boucher</button>
  <button class="btn btn-job" onclick="showRisks('coiffeur')">Coiffeur / Coiffeuse</button>
  <button class="btn btn-job" onclick="showRisks('batiment')">Ouvrier du bâtiment</button>
  <button class="btn btn-job" onclick="showRisks('livreur')">Conducteur / Livreur</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>

<!-- ✅ RISQUES -->
<div id="menu-risks" class="card" style="display:none;"></div>

<script>
/* ✅ BDD RISQUES — VERSION PROPRE (aucun doublon) */
const data = {
  maintenance: {
    label: "Technicien maintenance",
    risques: {
      chute: "Chute de hauteur : harnais, protections collectives.",
      cmr: "CMR : produits dangereux.",
      electrique: "Risque électrique : consignation.",
      tms: "TMS : ergonomie, alternance."
    }
  },

  commercial: {
    label: "Commercial itinérant",
    risques: {
      routier: "Risque routier : pauses, vigilance.",
      stress: "Stress : gestion du temps."
    }
  },

  boucher: {
    label: "Boucher",
    risques: {
      coupure: "Coupures : gants anticoupure.",
      manutention: "Gestes sûrs pour éviter les douleurs.",
      cmr: "Produits CMR : ventilation, gants adaptés."
    }
  },

  coiffeur: {
    label: "Coiffeur / Coiffeuse",
    risques: {
      chimique: "Produits chimiques : gants, lunettes.",
      posture: "Postures prolongées : pauses régulières."
    }
  },

  batiment: {
    label: "Ouvrier du bâtiment",
    risques: {
      chute: "Harnais, échafaudages sécurisés.",
      manutention: "Charges lourdes : techniques adaptées.",
      bruit: "Casque anti-bruit.",
      poussiere: "Masques adaptés."
    }
  },

  livreur: {
    label: "Conducteur / Livreur",
    risques: {
      routier: "Planification, pauses régulières.",
      manutention: "Colis lourds : diable, transpalette.",
      chute: "Attention aux sols glissants."
    }
  }
};

/* ✅ BOUTON ENTRER — FONCTIONNEL */
function entrer() {
  document.getElementById("accueil").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}

/* ✅ AFFICHAGE DES RISQUES */
function showRisks(job) {
  document.getElementById("menu-metiers").style.display = "none";

  let zone = document.getElementById("menu-risks");
  zone.style.display = "block";

  let html = `
    <button class="btn btn-back" onclick="goBack()">← Retour métiers</button>
    <h2>Risques – ${data[job].label}</h2>
  `;

  for (let r in data[job].risques) {
    html += `<button class="btn btn-risk" onclick="showDetail('${job}','${r}')">${r}</button>`;
  }

  zone.innerHTML = html;
}

/* ✅ FICHE DÉTAIL */
function showDetail(job, risque) {
  document.getElementById("menu-risks").innerHTML = `
    <button class="btn btn-back" onclick="showRisks('${job}')">← Retour risques</button>
    <h2>${risque}</h2>
    <p>${data[job].risques[risque]}</p>
  `;
}

/* ✅ RETOUR */
function goBack() {
  document.getElementById("menu-risks").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}

function retourAccueil() {
  document.getElementById("menu-risks").style.display = "none";
