<script>
/* === PRODUITS POUR SCANNER === */
const produitsCMR={
 "3254567890123":{nom:"Degraissant X",categorie:"Solvant",cmr:"H350",epi:"Gants nitrile",fds:"FDS.pdf"}
};

/* === METIERS (placeholder complet 70 métiers) === */
const data={};
for(let i=1;i<=70;i++){
 data["Metier_"+i]={
   label:"Metier_"+i,
   risques_metier:["Risque professionnel niveau B"],
   risques_cmr:["Selon exposition"],
   risques_tms:["Postures"],
   risques_rps:["Charge mentale"],
   prevention:"✅ Prévention adaptée disponible dans la version finale",
   obligations:"DUERP obligatoire",
   docs:"Fiches INRS disponibles"
 };
}

/* === NAVIGATION === */
function cacher(){
 document.getElementById('accueil').style.display='none';
 document.getElementById('menu').style.display='none';
 document.getElementById('pageMetiers').style.display='none';
 document.getElementById('pageFiche').style.display='none';
 document.getElementById('pageScanner').style.display='none';
 document.getElementById('pageCMR').style.display='none';
 document.getElementById('pageDUERP').style.display='none';
}
function retourAccueil(){cacher();document.getElementById('accueil').style.display='flex';}
function ouvrirMenu(){cacher();document.getElementById('menu').style.display='block';}
function ouvrirMetiers(){cacher();document.getElementById('pageMetiers').style.display='block';}
function ouvrirCMR(){cacher();document.getElementById('pageCMR').style.display='block';}
function ouvrirDUERP(){cacher();document.getElementById('pageDUERP').style.display='block';}

/* === FICHE METIER === */
function afficherMetier(){
 let m=document.getElementById('metierSelect').value;
 if(!m){alert('Sélectionnez un métier');return;}
 cacher();
 document.getElementById('pageFiche').style.display='block';
 document.getElementById('titreMetier').innerText=data[m].label;
 document.getElementById('contenuMetier').innerHTML=
   `<b>Risques métier :</b><br>${data[m].risques_metier.join('<br>')}<br><br>`+
   `<b>CMR :</b><br>${data[m].risques_cmr.join('<br>')}<br><br>`+
   `<b>TMS :</b><br>${data[m].risques_tms.join('<br>')}<br><br>`+
   `<b>RPS :</b><br>${data[m].risques_rps.join('<br>')}<br><br>`+
   `<b>Prévention :</b><br>${data[m].prevention}<br><br>`+
   `<b>Obligations :</b><br>${data[m].obligations}<br><br>`+
   `<b>Documents :</b><br>${data[m].docs}`;
}

/* === SCANNER === */
let codeReader=null;
function ouvrirScanner(){
 cacher();
 document.getElementById('pageScanner').style.display='block';
 codeReader=new ZXing.BrowserMultiFormatReader();
 codeReader.decodeFromVideoDevice(null,'video',(r,e)=>{if(r)afficherProduit(r.text);});
}
function afficherProduit(ean){
 let zone=document.getElementById('scanResult');
 zone.style.display='block';
 if(produitsCMR[ean]){
   let p=produitsCMR[ean];
   zone.innerHTML=`<b>${p.nom}</b><br>CMR : ${p.cmr}<br>EPI : ${p.epi}`;
 }else zone.innerHTML=`Produit non trouvé : ${ean}`;
}
function arreterScanner(){try{codeReader.reset();}catch(e){}ouvrirMenu();}
</script>
