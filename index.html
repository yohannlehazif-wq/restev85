<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Base Prévention Locale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --restev-blue: #2c5da7; --restev-green: #8ec641; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; margin-bottom: 80px; }
        .app-header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid #f9b233; sticky: top; }
        .card-custom { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--restev-blue); shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .prev-box { background: #f0f7ff; border-radius: 10px; padding: 12px; margin-top: 10px; font-size: 0.9rem; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { border: none; background: none; color: #888; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--restev-blue); font-weight: bold; }
        .badge-epi { background: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; margin-right: 5px; }
        .app-page { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-header"><b>PRÉVENTION MÉTIERS 85</b></div>

<div id="page-search" class="app-page active-page">
    <div class="mb-4">
        <label class="fw-bold mb-2">Rechercher un métier ou un risque :</label>
        <input type="text" id="search-input" class="form-control form-control-lg rounded-pill border-primary" 
               placeholder="Ex: Peintre, Soudage, Poussière..." onkeyup="searchInternal()">
    </div>
    
    <div id="results-count" class="small text-muted mb-3"></div>
    <div id="search-results">
        </div>
</div>

<div id="page-sgh" class="app-page">
    <h5 class="fw-bold mb-3">Guide des Dangers</h5>
    <div id="sgh-container"></div>
</div>

<div class="nav-bottom">
    <button class="nav-item active" onclick="showPage('page-search', this)"><i class="fa-solid fa-magnifying-glass mb-1"></i>RECHERCHE</button>
    <button class="nav-item" onclick="showPage('page-sgh', this)"><i class="fa-solid fa-triangle-exclamation mb-1"></i>DANGERS</button>
</div>

<script>
// BASE DE DONNÉES LOCALE (EMBARQUÉE)
const dbMetiers = [
    { 
        m: "Peintre / Carrossier", 
        r: "Inhalation de solvants, Isocyanates, Incendie.", 
        p: "Travailler en cabine ventilée. Stockage en armoire de sécurité ignifugée.",
        epi: ["Masque A2P3", "Gants Nitrile", "Combinaison jetable"]
    },
    { 
        m: "Soudage / Métallurgie", 
        r: "Fumées de soudage, Rayonnements UV, Brûlures.", 
        p: "Utiliser une torche aspirante. Mettre en place des écrans de protection.",
        epi: ["Cagoule auto", "Tablier cuir", "Gants de soudeur"]
    },
    { 
        m: "Menuisier / Poseur", 
        r: "Poussières de bois (Cancérigène), Bruit, Coupures.", 
        p: "Aspiration à la source obligatoire. Pas de nettoyage à la soufflette.",
        epi: ["Masque FFP3", "Bouchons d'oreilles", "Lunettes"]
    },
    { 
        m: "Agent de Propreté / ASH", 
        r: "Dermatoses, Brûlures chimiques, TMS.", 
        p: "Doseurs automatiques. Ne jamais mélanger Javel et Acide.",
        epi: ["Gants manchettes", "Chaussures SRC"]
    },
    { 
        m: "Maçon / BTP", 
        r: "Chutes de hauteur, Silice, Manutention lourde.", 
        p: "Arrosage pour limiter la poussière. Échafaudages conformes.",
        epi: ["Casque", "Chaussures S3", "Gants manutention"]
    },
    { 
        m: "Bureautique / Tertiaire", 
        r: "Fatigue visuelle, Postures prolongées, Stress.", 
        p: "Réglage écran (hauteur yeux). Pauses actives toutes les 2h.",
        epi: ["Siège ergonomique"]
    }
];

const sghData = [
    { t: "Inflammable", d: "Produits pouvant s'enflammer (Solvants, Gaz)." },
    { t: "Corrosif", d: "Attaque les tissus vivants et les métaux (Acides)." },
    { t: "Toxique", d: "Empoisonnement rapide même à faible dose." },
    { t: "CMR / Santé", d: "Effets cancérogènes, mutagènes ou toxiques pour la reproduction." },
    { t: "Nocif / Irritant", d: "Provoque des allergies, des somnolences ou des irritations." },
    { t: "Environnement", d: "Dangereux pour les organismes aquatiques." }
];

function searchInternal() {
    const val = document.getElementById('search-input').value.toLowerCase();
    const results = document.getElementById('search-results');
    results.innerHTML = "";

    if(val.length < 2) return;

    const filtered = dbMetiers.filter(item => 
        item.m.toLowerCase().includes(val) || item.r.toLowerCase().includes(val)
    );

    document.getElementById('results-count').innerText = `${filtered.length} fiche(s) trouvée(s)`;

    filtered.forEach(item => {
        const epis = item.epi.map(e => `<span class="badge-epi">${e}</span>`).join('');
        results.innerHTML += `
            <div class="card-custom">
                <h5 class="fw-bold text-primary mb-1">${item.m}</h5>
                <p class="small mb-2"><b>Risques :</b> ${item.r}</p>
                <div class="prev-box">
                    <b class="text-success small"><i class="fa-solid fa-shield-check"></i> PRÉVENTION :</b><br>
                    ${item.p}
                </div>
                <div class="mt-2">${epis}</div>
            </div>
        `;
    });
}

function showPage(id, btn) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-page');
    btn.classList.add('active');
}

window.onload = () => {
    document.getElementById('sgh-container').innerHTML = sghData.map(s => `
        <div class="card-custom" style="border-left-color: var(--restev-green)">
            <h6 class="fw-bold mb-1">${s.t}</h6>
            <p class="small text-muted mb-0">${s.d}</p>
        </div>
    `).join('');
};
</script>
</body>
</html>
