<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Identification CMR</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
}

.app{
  max-width:480px;
  margin:auto;
  padding:16px;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  width:200px;
  max-width:90%;
}

.card{
  background:#ffffff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 28px rgba(0,0,0,0.12);
}

.info{
  background:#fff7ed;
  border:2px solid #f97316;
  border-radius:16px;
  padding:14px;
  font-size:14px;
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:12px;
}

.btn-main{
  background:#2563eb;
  color:white;
}

.result{
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  font-weight:700;
}

.cmr{
  background:#fee2e2;
  color:#991b1b;
}

.ok{
  background:#dcfce7;
  color:#166534;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <img src="logo.png" class="logo" alt="RESTEV">
</div>

<div class="card">

<h2>Identification produit CMR</h2>

<div class="info">
  Cette page permet d’identifier un produit scanné
  et de <strong>détecter un risque CMR potentiel</strong>.<br><br>
  L’objectif est d’alerter et d’orienter vers
  l’accompagnement EPST RESTEV.
</div>

<button class="btn btn-main" onclick="scanner()">
  📷 Scanner un code‑barres
</button>

<div id="result"></div>

</div>
</div>

<script>
/* ===== BASE PRODUITS DEMO RESTEV ===== */
const produitsCMR = [
  {
    barcode: "3700123456789",
    nom: "Colle à bois vinylique",
    risque: "Solvants / substances chimiques",
    cmr: true,
    orientation: "Médecin du travail + Technicien prévention"
  },
  {
    barcode: "3228881234567",
    nom: "Résine époxy",
    risque: "Produits chimiques CMR",
    cmr: true,
    orientation: "Médecin + Ingénieur prévention"
  },
  {
    barcode: "3012345678901",
    nom: "Nettoyant industriel",
    risque: "Solvants",
    cmr: false,
    orientation: "Technicien prévention"
  }
];

async function scanner(){
  const resultDiv = document.getElementById("result");

  if(!("BarcodeDetector" in window)){
    afficherResultat("Scan non disponible sur ce navigateur.", false);
    return;
  }

  try{
    const detector = new BarcodeDetector();
    const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:"environment"} });
    const video = document.createElement("video");
    video.srcObject = stream;
    await video.play();

    const codes = await detector.detect(video);
    stream.getTracks().forEach(track => track.stop());

    if(codes.length === 0){
      afficherResultat("Aucun code détecté.", false);
      return;
    }

    const code = codes[0].rawValue;
    const produit = produitsCMR.find(p => p.barcode === code);

    if(produit){
      afficherProduit(produit);
    }else{
      afficherResultat("Produit non référencé dans la base RESTEV (démo).", false);
    }

  }catch(e){
    afficherResultat("Erreur caméra. Contactez RESTEV.", false);
  }
}

function afficherProduit(produit){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `
    <div class="result cmr">
      🔴 <strong>Produit identifié</strong><br><br>

      Nom : <strong>${produit.nom}</strong><br>
      Type de risque : ${produit.risque}<br><br>

      🧑‍⚕️ <strong>Accompagnement EPST recommandé :</strong><br>
      ${produit.orientation}
    </div>
  `;
}

function afficherResultat(message, ok){
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `
    <div class="result ${ok?'ok':'cmr'}">
      ${message}
    </div>
  `;
}
</script>

</body>
</html>
