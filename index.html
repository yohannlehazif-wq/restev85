<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* FOND BLANC – MOBILE FIRST */
body{
  height:100vh;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
}

/* CONTENEUR */
.app{
  width:100%;
  max-width:420px;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo{
  animation:fadeZoom 2s ease-out forwards;
}
.logo img{
  width:170px;
  max-width:60%;
  animation:pulse 3.6s ease-in-out infinite;
}

/* BOUTON */
.enter{
  margin-top:48px;
  opacity:0;
  animation:fadeIn 1.2s ease-out forwards;
  animation-delay:2s;
}
.enter button{
  padding:14px 36px;
  border:none;
  border-radius:20px;
  background:#1e3a8a;
  color:#ffffff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes fadeZoom{
  0%{
    opacity:0;
    transform:scale(0.9);
  }
  100%{
    opacity:1;
    transform:scale(1);
  }
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="app">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="RESTEV">
  </div>

  <!-- BOUTON ENTRÉE -->
  <div class="enter">
    <button onclick="location.href='accueil.htmltml>
