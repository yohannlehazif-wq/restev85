<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>RESTEV – Prévention Mobile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: auto;
      padding: 0;
      background: #f3f4f6;
    }

    /* ÉCRAN D'ACCUEIL */
    #accueil {
      height: 100vh;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 260px;
      margin-bottom: 30px;
    }

    #accueil h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    #accueil p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-start { background: white; color: #2563eb; width: 240px; }
    .btn-job { background: #2563eb; color: white; }
    .btn-risk { background: #f97316; color: white; }
    .btn-back { background: #d1d5db; color: black; }

    /* CARTES */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: left;
    }
  </style>
</head>

<body>

<!-- ✅ LOGO RESTEV SUR ACCUEIL -->
<div id="accueil">

  <h1>Prévention Mobile</h1>
  <p>Application officielle RESTEV</p>
  <button class="btn btn-start" onclick="entrer()">Entrer</button>
</div>

  <button class="btn btn-job" onclick="showRisks('boucher')">Boucher</button>

  <button class="btn btn-job" onclick="showRisks('batiment')">Ouvrier du bâtiment</button>
  <button class="btn btn-job" onclick="showRisks('livreur')">Conducteur / Livreur</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>
