<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RESTEV – Prévention santé au travail</title>

<style>
/* ===== BASE ===== */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

/* ===== APPLICATION ===== */
.app {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

/* ===== HEADER LOGO ===== */
.header {
  text-align: center;
  padding: 24px 12px 12px;
}

.logo {
  width: 240px;
  max-width: 100%;
  height: auto;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  color: #475569;
  font-weight: 500;
}

/* ===== CARDS ===== */
.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}

h2 {
  text-align: center;
  color: #1e3a8a;
  margin-top: 0;
}

/* ===== INFO ===== */
.info {
  background: #eef2ff;
  color: #1e3a8a;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  margin: 14px 0;
}

/* ===== BOUTONS ===== */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary {
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
}

.btn-action {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: white;
}

.btn-good {
  background: linear-gradient(135deg, #22c55e, #15803d);
  color: white;
}

.btn-back {
  background: #e5e7eb;
  color: #111827;
}

/* ===== AFFICHAGE ===== */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="app">

  <!-- ===== HEADER ===== -->
  <div class="header">
    <img src="logo.png" alt="Logo RESTEV" class="logo">
    <div class="subtitle">Prévention santé au travail</div>
  </div>

  <!-- ===== ACCUEIL ===== -->
  <div id="accueil" class="card">
    <div class="info">
      Identifier, prioriser et agir en prévention,
      simplement et progressivement.
    </div>
