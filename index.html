<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Accueil</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #eef7ff 80%);
}
.app{
  max-width:600px;
  margin:auto;
  padding:16px;
}

.header{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
  margin-bottom:20px;
}
.header img{
  height:50px;
}
.header-title{
  font-size:18px;
  font-weight:bold;
  color:#3b82f6;
}

.home{
  background:white;
  border-radius:26px;
  padding:24px;
  box-shadow:0 14px 34px rgba(59,130,246,0.18);
}

.welcome{
  background:#f0f9ff;
  border-radius:18px;
  padding:18px;
  margin-bottom:22px;
  color:#1e40af;
  line-height:1.5;
}

.menu button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:20px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:14px;
  text-align:left;
}

.prevention{background:#e0f2fe;color:#1e3a8a;}
.cmr{background:#fde2e4;color:#9d174d;}
.pdp{background:#ddf7f2;color:#065f46;}
.duerp{background:#ede9fe;color:#4c1d95;}
.contact{background:#dcfce7;color:#14532d;}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <img src="logo.png" alt="RESTEV">
    <div class="header-title">Prévention santé au travail</div>
  </div>

  <div class="home">

    <div class="welcome">
      👋 <strong>Bienvenue sur l’application RESTEV</strong><br><br>
      Cet outil vous accompagne pour mieux <strong>comprendre les risques professionnels</strong>,
      identifier les <strong>expositions CMR</strong> et prévenir les situations de
      <strong>désinsertion professionnelle</strong>.<br><br>
      🌱 Une approche <strong>préventive, humaine et orientée solutions</strong>.
    </div>

    <div class="menu">
      <button class="prevention">🛠️ Prévention par métier</button>
      <button class="cmr">🌸 Identification des risques CMR</button>
      <button class="pdp">🩵 Prévention de la désinsertion professionnelle</button>
      <button class="duerp">💜 Appui DUERP</button>
      <button class="contact">🌿 Contacter RESTEV</button>
    </div>

  </div>

</div>

</body>
</html>
