<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention Mobile</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 480px;
        margin: auto;
        padding: 0;
        background: #f3f4f6;
    }

    /* ACCUEIL SIMPLE */
    #accueil {
        height: 100vh;
        background: linear-gradient(135deg, #2563eb, #9333ea);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        padding: 20px;
    }

    .logo {
        width: 160px;
        margin-bottom: 25px;
    }

    .btn {
        width: 90%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
    }

    .btn-start {
        background: white;
        color: #2563eb;
    }

    .btn-menu {
        background: #2563eb;
        color: white;
        font-size: 18px;
    }

    .btn-back {
        background: #d1d5db;
        color: black;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin: 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        text-align: left;
    }

    select {
        width: 100%;
        font-size: 18px;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 15px;
    }
</style>
</head>

<body>

<!-- ✅ ACCUEIL SIMPLE -->
<div id="accueil">
    logo.png class="logo">
    <h1>Prévention RESTEV</h1>
    <button class="btn btn-start" onclick="ouvrirMetiers()">ENTRER</button>
</div>

<!-- ✅ MENU MÉTIERS -->
<div id="menuMetiers" class="card" style="display:none;">
    <h2>Choisis ton métier :</h2>

    <select id="select-metier">
        <option value=""></option>
        <option value="agent_entretien">Agent d'entretien</option>
        <option value="agent_logistique">Agent logistique</option>
        <option value="boulanger">Boulanger</option>
        <option value="maintenance">Technicien maintenance</option>
    </select>

    <button class="btn btn-menu" onclick="validerMetier()">VALIDER ✅</button>
    <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

<!-- ✅ RISQUES -->
<div id="menuRisks" class="card" style="display:none;"></div>

<script>

/* ✅ MÉTIERS + FICHES (Niveau B) */
const data = {

    agent_entretien: {
      label: "Agent d’entretien",
      risques: {
        "Produits chimiques": `
          <h3 style='color:#9333ea;'>🧴 Produits chimiques</h3>
          • Aérosols, irritants<br><br>
          ✅ Gants nitrile<br>
          ✅ Jamais de mélanges<br>
        `,
        "TMS": `
          <h3 style='color:#2563eb;'>📦 TMS</h3>
          • Lavage, vitres répétitives<br><br>
          ✅ Alternance tâches<br>
          ✅ Manche télescopique<br>
        `,
        "Chutes": `
          <h3 style='color:#0ea5e9;'>🦶 Chutes</h3>
          ✅ Signalisation sol<br>
          ✅ Chaussures antidérapantes<br>
        `
      }
    },

    agent_logistique: {
      label: "Agent logistique",
      risques: {
        "Manutention lourde": `
          <h3 style='color:#2563eb;'>📦 Manutention</h3>
          ✅ Transpalette<br>
          ✅ Rotation tâches<br>
        `,
        "Chocs": `
          <h3 style='color:#dc2626;'>🚧 Heurts engins</h3>
          ✅ Chemins piétons<br>
          ✅ Gilet HV<br>
        `
      }
    },

    boulanger: {
      label: "Boulanger",
      risques: {
        "Brûlures": `
          <h3 style='color:#f97316;'>🔥 Brûlures</h3>
          ✅ Gants thermiques<br>
          ✅ Manipulation sécurisée<br>
        `,
        "Farine": `
          <h3 style='color:#9333ea;'>🌾 Poussières</h3>
          ✅ FFP2<br>
          ✅ Aspiration<br>
        `
      }
    },

    maintenance: {
      label: "Technicien maintenance",
      risques: {
        "Chute hauteur": `
          <h3 style='color:#2563eb;'>⬆️ Chute</h3>
          ✅ Garde-corps<br>
          ✅ Harnais<br>
        `,
        "Électrique": `
          <h3 style='color:#f97316;'>⚡ Électrique</h3>
          ✅ BR / B2V<br>
          ✅ Consignation LOTO<br>
        `,
        "Mécanique": `
          <h3 style='color:#dc2626;'>⚙️ Mécanique</h3>
          ✅ Carter verrouillé<br>
          ✅ Procédure<br>
        `
      }
    },
};briqueteur: {
  label: "Briqueteur",
  risques: {

    "Chute de hauteur": `
      <h3 style='color:#2563eb;'>⬆️ Chute de hauteur</h3>
      <b>Situations dangereuses :</b><br>
      • Travail sur échafaudages<br>
      • Passerelles non protégées<br>
      • Échafaudage instable<br><br>

      <b>Prévention :</b><br>
      ✅ Garde-corps obligatoires<br>
      ✅ Filets anti-chute<br>
      ✅ Vérification quotidienne échafaudage<br>
      ✅ Chaussures S3<br><br>

      <b>Documents utiles :</b><br>
      INRS ED 820 – Travail en hauteur
    `,

    "Manutention et TMS": `
      <h3 style='color:#f97316;'>📦 Manutentions & TMS</h3>
      <b>Situations dangereuses :</b><br>
      • Port briques/sacs de mortier<br>
      • Maçonnerie bras tendus<br>
      • Postures prolongées<br><br>

      <b>Prévention :</b><br>
      ✅ Palan / grue pour palettes<br>
      ✅ Alternance tâches<br>
      ✅ Outils ergonomiques<br>

      <b>Documents utiles :</b><br>
      INRS ED 917 – TMS

    "Poussières / Silice": `
      <h3 style='color:#9333ea;'>🌫️ Poussières / Silice</h3>
      <b>Situations dangereuses :</b><br>
      • Coupe de briques (disqueuse)<br>
      • Mélange ciment<br><br>

      <b>Prévention :</b><br>
      ✅ Masque FFP3 obligatoire<br>

      ✅ Aspiration localisée<br>

      INRS ED 6180 – Risque silice
    `,

    "Bruit": `
      <h3 style='color:#0ea5e9;'>🔊 Bruit</h3>
      <b>Situations dangereuses :</b><br>
      • Coupe briques<br>
      • Marteaux / scies<br><br>

      <b>Prévention :</b><br>

      ✅ Outillage silencieux<br><br>
    `,

    "Coupures / projections": `
      <h3 style='color:#dc2626;'>🧩 Coupures / projections</h3>
      <b>Situations :</b><br>
      • Coupe disqueuse<br>
      • Éclats briques<br><br>

      <b>Prévention :</b><br>
      ✅ Lunettes enveloppantes<br>
      ✅ Gants anti-coupure<br>
      ✅ Habillage jambes/bras<br><br>
    `,
  }
},


/* ✅ NAVIGATION SIMPLE */
function ouvrirMetiers() {
    document.getElementById("accueil").style.display = "none";
    document.getElementById("menuMetiers").style.display = "block";
    document.getElementById("menuRisks").style.display = "none";
}

function retourAccueil() {
    document.getElementById("accueil").style.display = "flex";
    document.getElementById("menuMetiers").style.display = "none";
    document.getElementById("menuRisks").style.display = "none";
}


/* ✅ VALIDATION MÉTIER */
function validerMetier() {

    const metier = document.getElementById("select-metier").value;

    if (metier === "") {
        alert("Merci de sélectionner un métier.");
        return;
    }

    afficherRisques(metier);
}


/* ✅ AFFICHAGE DES RISQUES */
function afficherRisques(job) {

    document.getElementById("menuMetiers").style.display = "none";

    const zone = document.getElementById("menuRisks");
    zone.style.display = "block";

    let html = `
<button class='btn btn-back' onclick='ouvrirMetiers()'>← Retour métiers</button>
<h2>Risques – ${data[job].label}</h2>
`;

    for (let r in data[job].risques) {
        html += `<button class='btn btn-menu' onclick="showDetail('${job}','${r}')">${r}</button>`;
    }

    zone.innerHTML = html;
}


/* ✅ AFFICHAGE DU DÉTAIL */
function showDetail(job, risque) {

    document.getElementById("menuRisks").innerHTML = `
<button class='btn btn-back' onclick="afficherRisques('${job}')">← Retour</button>
<h2>${risque}</h2>
${data[job].risques[risque]}
`;
}
</script>

</body>
</html>
