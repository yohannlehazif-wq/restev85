<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* FOND BLANC */
body{
  height:100vh;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
}

/* CONTENEUR APP */
.app{
  width:100%;
  max-width:420px; /* smartphone */
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo{
  opacity:0;
  animation:fadeZoom 2s ease-out forwards;
}
.logo img{
  width:65vw;          /* taille principale mobile */
  max-width:260px;     /* limite sur grands écrans */
  min-width:180px;     /* lisible même sur petits */
}

/* BOUTON ENTRÉE */
.enter{
  margin-top:48px;
  opacity:0;
  animation:fadeIn 1.2s ease-out forwards;
  animation-delay:2s;
}
.enter button{
  padding:14px 42px;
  border:none;
  border-radius:20px;
  background:#1e3a8a;
  color:#ffffff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes fadeZoom{
  0%{
    opacity:0;
    transform:scale(0.92);
  }
  100%{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>
