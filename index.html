<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RESTEV 85 – Inventaire FDS</title>

<link rel="icon" href="logo_restev_carre.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root { --r-blue:#3065a8; --r-light:#f8fafc; }
body { background:var(--r-light); font-family:Segoe UI,sans-serif; margin-bottom:90px; }
.app-page { display:none; padding:15px; }
.active-page { display:block; }
.card-custom { background:#fff; padding:15px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,.05); margin-bottom:12px; border-left:4px solid var(--r-blue); }
.nav-bottom { position:fixed; bottom:15px; left:10px; right:10px; display:flex; justify-content:space-around;
background:rgba(255,255,255,.95); padding:10px; border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15); }
.nav-item { background:none; border:none; color:#94a3b8; font-size:.6rem; font-weight:700; }
.nav-item.active { color:var(--r-blue); }
.nav-item i { font-size:1.2rem; display:block; }
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" style="position:fixed;inset:0;background:#3065a8;color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div class="text-center">
    <img src="logo_restev_carre.png" style="width:120px;background:#fff;border-radius:20px">
    <h3 class="mt-3 fw-bold">RESTEV 85</h3>
    <button class="btn btn-light rounded-pill px-5 mt-3 fw-bold" onclick="dismissSplash()">ENTRER</button>
  </div>
</div>

<!-- HEADER -->
<div class="text-center py-2 bg-white shadow-sm">
  <img src="logo_restev_long.png" style="height:40px">
  <div id="inv-stats" class="small text-muted"></div>
</div>

<!-- PAGE ACCUEIL -->
<div id="page-home" class="app-page active-page">
  <div class="card-custom text-center">
    <i class="fa fa-barcode fa-2x text-primary mb-2"></i>
    <p class="fw-bold mb-2">Scanner ou rechercher une FDS</p>
    <button class="btn btn-primary w-100" onclick="nav('page-scan','nav-scan')">AJOUTER UN PRODUIT</button>
  </div>
</div>

<!-- PAGE SCAN -->
<div id="page-scan" class="app-page">
  <h5 class="fw-bold mb-3">Ajouter un produit</h5>

  <div class="card-custom">
    <div id="reader" style="width:100%;min-height:240px;background:#000;border-radius:12px"></div>
    <button class="btn btn-dark w-100 mt-3" onclick="startScanner()">
      <i class="fa fa-camera me-2"></i>Scanner le code-barres
    </button>

    <input id="prod-name" class="form-control mt-3" placeholder="Nom du produit">
    <input id="prod-code" class="form-control mt-2" placeholder="Code-barres">
    <input id="prod-fds" class="form-control mt-2" placeholder="Lien PDF FDS">

    <button id="btn-save" class="btn btn-primary w-100 mt-3 fw-bold" onclick="saveProduct()">
      ENREGISTRER LE PRODUIT
    </button>
  </div>
</div>

<!-- PAGE LISTE -->
<div id="page-list" class="app-page">
  <h5 class="fw-bold mb-3">Mon inventaire chimique</h5>
  <div id="inventory-container"></div>
</div>

<!-- NAV -->
<nav class="nav-bottom">
  <button id="nav-home" class="nav-item active" onclick="nav('page-home',this.id)">
    <i class="fa fa-house"></i>ACCUEIL
  </button>
  <button id="nav-scan" class="nav-item" onclick="nav('page-scan',this.id)">
    <i class="fa fa-plus"></i>AJOUTER
  </button>
  <button id="nav-list" class="nav-item" onclick="nav('page-list',this.id)">
    <i class="fa fa-list"></i>LISTE
  </button>
</nav>

<script>
/* ====================== SUPABASE ====================== */
const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co';
const SUPABASE_KEY = 'TA_CLE_ANON_SUPABASE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ====================== DATA ====================== */
let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

const normalizeCode = v => v ? v.trim().replace(/\s+/g,'') : '';

/* ====================== CLOUD ====================== */
async function checkCloud(raw) {
  const code = normalizeCode(raw);
  if(!code) return;

  const {data} = await sb.from('produits_partages')
    .select('nom,url_fds').eq('code',code).maybeSingle();

  if(data){
    prod-name.value = data.nom;
    prod-fds.value = data.url_fds || '';
    btn-save.innerText = "✅ PRODUIT RECONNU (CLOUD)";
    btn-save.classList.replace('btn-primary','btn-success');
    setTimeout(()=>{
      btn-save.innerText="ENREGISTRER LE PRODUIT";
      btn-save.classList.replace('btn-success','btn-primary');
    },2000);
  }
}

/* ====================== SCAN ====================== */
function startScanner() {
  const scanner = new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:250}, txt=>{
    prod-code.value = normalizeCode(txt);
    checkCloud(txt);
    scanner.stop();
  }).catch(()=>alert("Erreur caméra"));
}

/* ====================== SAVE ====================== */
async function saveProduct() {
  const name = prod-name.value.trim();
  const code = normalizeCode(prod-code.value);
  const url = prod-fds.value.trim();

  if(!name) return alert("Nom obligatoire");

  inventory.push({id:Date.now(),name,code,url_fds:url});
  localStorage.setItem('restev_inventory_v3',JSON.stringify(inventory));

  if(code){
    await sb.from('produits_partages')
      .upsert({code,nom:name,url_fds:url});
  }

  prod-name.value=prod-code.value=prod-fds.value="";
  updateStats();
  nav('page-list','nav-list');
}

/* ====================== INVENTAIRE ====================== */
function renderInventory() {
  inventory-container.innerHTML = inventory.length ? '' :
    '<p class="text-center text-muted">Aucun produit</p>';

  inventory.sort((a,b)=>a.name.localeCompare(b.name)).forEach(i=>{
    inventory-container.innerHTML += `
    <div class="card-custom">
      <b>${i.name}</b><br>
      <small class="text-muted">${i.code || 'Saisie manuelle'}</small>
      <div class="mt-2">
        ${i.url_fds
          ? `<a href="${i.url_fds}" target="_blank" class="btn btn-success btn'.app-page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById(id).classList.add('active-page');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(btn)?.classList.add('active');
  if(id==='page-list') renderInventory();
}

/* ====================== UI ====================== */
function updateStats(){
  inv-stats.innerText = inventory.length+" produit(s)";
}
function dismissSplash(){
  splash.style.display="none";
}
prod-code.addEventListener('blur',e=>checkCloud(e.target.value));
window.onload=updateStats;
</script>

</body>
</html>
