<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #2c5da7; --green: #8ec641; --violet: #a74b9e; --danger: #dc2626; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin-bottom: 80px; }
        .app-header { background: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--green); position: sticky; top: 0; z-index: 1000; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; color: #64748b; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        .app-page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active-page { display: block !important; }
        .card-expert { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid var(--blue); }
        .picto-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .picto-btn { border: 1px solid #ddd; border-radius: 10px; padding: 10px; background: white; transition: 0.2s; cursor: pointer; }
        .picto-btn:active { transform: scale(0.9); background: #f8fafc; }
        .vlep-badge { background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header"><b style="color:var(--blue)">RESTEV 85</b> <small>V. Expert 2026</small></div>

    <div id="page-home" class="app-page active-page">
        <h5 class="fw-bold"><i class="fa-solid fa-triangle-exclamation"></i> Décodeur de Risque</h5>
        <div class="card-expert" style="border-left-color: var(--violet);">
            <p class="small mb-2">Cliquez sur un symbole pour la <b>Règle d'Or</b> :</p>
            <div class="picto-grid">
                <div class="picto-btn" onclick="showRule('🔥 INFLAMMABLE', 'Écarter toute source d\'étincelle. Stocker en armoire coupe-feu ventilée.')">🔥</div>
                <div class="picto-btn" onclick="showRule('💀 TOXIQUE', 'Danger de mort immédiat. Port du masque à cartouche et gants étanches obligatoire.')">💀</div>
                <div class="picto-btn" onclick="showRule('🧪 CORROSIF', 'Attaque les tissus. Visière faciale et douche de sécurité à < 10m.')">🧪</div>
                <div class="picto-btn" onclick="showRule('❗ IRRITANT', 'Risque d\'allergie ou eczéma. Ventilation forcée et crème barrière.')">❗</div>
                <div class="picto-btn" onclick="showRule('🫁 CANCÉROGÈNE', 'Effet long terme (CMR). Substitution prioritaire. Suivi médical renforcé.')">🫁</div>
                <div class="picto-btn" onclick="showRule('🐟 POLLUANT', 'Ne pas jeter à l\'égout. Utilisation de bacs de rétention obligatoire.')">🐟</div>
            </div>
            <div id="rule-display" class="mt-3 p-3 bg-light rounded d-none">
                <b id="rule-title" class="text-primary small"></b><br><span id="rule-text" class="small"></span>
            </div>
        </div>

        <h5 class="fw-bold mt-4"><i class="fa-solid fa-barcode"></i> Vérification Produit</h5>
        <input type="text" id="manualInput" class="form-control mb-3" placeholder="Ex: 3077316291191" onkeyup="searchExpert(this.value)">
        <div id="res-expert" class="d-none">
            <div class="card-expert" style="border-left-color: var(--danger);">
                <h6 id="exp-n" class="fw-bold text-danger"></h6>
                <div class="small mt-2">
                    <b>Incompatibilité :</b> <span id="exp-inc" class="text-muted"></span><br>
                    <b>EPI Normé :</b> <span id="exp-epi" class="text-primary fw-bold"></span>
                </div>
                <div id="google-link" class="mt-3"></div>
            </div>
        </div>
    </div>

    <div id="page-metiers" class="app-page">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-user-gear"></i> Référentiel VLEP & Métiers</h5>
        <div id="metiers-expert"></div>
    </div>

    <div class="nav-bottom">
        <button class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-shield-halved"></i>Risques</button>
        <button class="nav-item" onclick="nav('page-metiers', this)"><i class="fa-solid fa-vial-circle-check"></i>VLEP Métiers</button>
    </div>

    <script>
        const dbExpert = {
            "3077316291191": { 
                n: "White Spirit (Expert)", 
                inc: "Oxydants, Acides forts, Javel.", 
                epi: "Gants NITRILE (EN374-3) épaisseur > 0.4mm. Temps de passage : 480 min." 
            }
        };

        const metiersVlep = [
            {m:"Menuisier", vlep:"Bois: 1 mg/m³ (8h)", p:"Aspiration forcée > 20 m/s. Mesurage annuel obligatoire."},
            {m:"Maçon", vlep:"Silice: 0.1 mg/m³", p:"Travail à l'humide. Masque FFP3 pour toute découpe."},
            {m:"Peintre", vlep:"Benzène: 0.66 mg/m³", p:"Priorité aux peintures A+. Masque A2P3 si solvants."},
            {m:"Soudeur", vlep:"Manganèse: 0.2 mg/m³", p:"Captage à la source. Torche aspirante obligatoire."},
            {m:"Carrossier", vlep:"Isocyanates: 0.02 mg/m³", p:"Aspiration cabine 0.5 m/s. Masque adduction d'air."}
        ];

        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
            if(id === 'page-metiers') renderMetiersExpert();
        }

        function showRule(title, text) {
            const d = document.getElementById('rule-display');
            document.getElementById('rule-title').innerText = title;
            document.getElementById('rule-text').innerText = text;
            d.classList.remove('d-none');
        }

        function searchExpert(v) {
            const res = document.getElementById('res-expert');
            if(dbExpert[v]) {
                document.getElementById('exp-n').innerText = dbExpert[v].n;
                document.getElementById('exp-inc').innerText = dbExpert[v].inc;
                document.getElementById('exp-epi').innerText = dbExpert[v].epi;
                const link = "https://www.google.com/search?q="+encodeURIComponent(dbExpert[v].n + " FDS filetype:pdf");
                document.getElementById('google-link').innerHTML = `<a href="${link}" target="_blank" class="btn btn-sm btn-danger w-100">Ouvrir la FDS (PDF Constructeur)</a>`;
                res.classList.remove('d-none');
            } else { res.classList.add('d-none'); }
        }

        function renderMetiersExpert() {
            const list = document.getElementById('metiers-expert');
            list.innerHTML = "";
            metiersVlep.forEach(m => {
                list.innerHTML += `
                    <div class="card-expert">
                        <div class="d-flex justify-content-between"><b>${m.m}</b> <span class="vlep-badge">${m.vlep}</span></div>
                        <p class="small mt-2 text-muted"><b>Prévention :</b> ${m.p}</p>
                    </div>`;
            });
        }
    </script>
</body>
</html>
