<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention Cloud</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', sans-serif; margin-bottom: 100px; }
        
        /* Écran de Connexion */
        #auth-container { position: fixed; inset: 0; background: white; z-index: 10001; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }

        /* Header & Navigation */
        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.6rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; }
        .active-page { display: block !important; }
        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card">
            <div class="mb-4">
                <i class="fa-solid fa-shield-halved fa-3x" style="color: var(--r-blue);"></i>
            </div>
            <h3 class="fw-bold mb-1">RESTEV 85</h3>
            <p class="text-muted small mb-4">Espace sécurisé Adhérents</p>
            <input type="email" id="auth-email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="auth-password" class="form-control mb-3" placeholder="Mot de passe">
            <button onclick="handleLogin()" class="btn btn-primary w-100 py-3 rounded-pill mb-2 fw-bold">SE CONNECTER</button>
            <button onclick="handleSignup()" class="btn btn-outline-secondary w-100 py-2 rounded-pill small fw-bold">Créer un compte</button>
            <p id="auth-msg" class="text-danger small mt-3"></p>
        </div>
    </div>

    <div class="app-header">
        <h5 class="mb-0 fw-bold" style="color: var(--r-blue);">RESTEV <span style="color: var(--r-yellow);">85</span></h5>
    </div>

    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0" style="background: linear-gradient(135deg, var(--r-blue), var(--r-purple));">
            <h5 class="fw-bold mb-1">Bienvenue</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Chargement de vos données...</p>
        </div>
        <div class="row g-2 mt-2">
            <div class="col-12" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-4">
                    <i class="fa-solid fa-qrcode fa-2x mb-2 text-primary"></i><br>
                    <span class="fw-bold">SCANNER UN PRODUIT</span>
                </div>
            </div>
        </div>
        <button class="btn btn-link btn-sm text-muted w-100 mt-4" onclick="handleLogout()">Déconnexion</button>
    </div>

    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Mon Inventaire Cloud</h5>
        <div id="inventory-container"></div>
    </div>

    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3">Ajouter un produit</h5>
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden;"></div>
            <input type="text" id="prod-name" class="form-control mt-3 mb-2" placeholder="Nom du produit (ex: Acétone)">
            <input type="text" id="prod-code" class="form-control mb-3" placeholder="Code-barres (facultatif)">
            <button id="btn-save" class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveToCloud()">ENREGISTRER DANS MA BASE</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus-circle"></i>AJOUTER</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-box-archive"></i>LISTE</button>
    </nav>

    <script>
        // CONFIGURATION SUPABASE (TES IDENTIFIANTS)
        const SB_URL = "https://sbvccjnwxvfmcfadfngc.supabase.co";
        const SB_KEY = "sb_publishable_RiUKUCrRehNumDIlsNourA_hDzj_QgX";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentSession = null;
        let cloudInventory = [];

        // --- AUTHENTIFICATION ---
        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('auth-msg').innerText = "Erreur : " + error.message;
            else checkUser();
        }

        async function handleSignup() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { data, error } = await _supabase.auth.signUp({ email, password });
            if (error) document.getElementById('auth-msg').innerText = "Erreur : " + error.message;
            else alert("Compte créé ! Connectez-vous (pensez à vérifier vos emails si besoin).");
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentSession = session;
                document.getElementById('auth-container').style.display = 'none';
                loadCloudData();
            }
        }

        // --- GESTION DES DONNÉES ---
        async function loadCloudData() {
            const { data, error } = await _supabase
                .from('produits')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (!error) {
                cloudInventory = data;
                renderInventory();
                document.getElementById('inv-stats').innerText = `${cloudInventory.length} produit(s) dans votre parc.`;
            }
        }

        async function saveToCloud() {
            const name = document.getElementById('prod-name').value;
            const code = document.getElementById('prod-code').value;
            if(!name) return alert("Veuillez saisir un nom de produit.");

            document.getElementById('btn-save').disabled = true;
            document.getElementById('btn-save').innerText = "Enregistrement...";

            const { error } = await _supabase
                .from('produits')
                .insert([{ 
                    nom: name, 
                    code_barres: code,
                    user_id: currentSession.user.id 
                }]);

            if(!error) {
                document.getElementById('prod-name').value = '';
                document.getElementById('prod-code').value = '';
                await loadCloudData();
                nav('page-list', 'nav-list');
            } else {
                alert("Erreur base de données : vérifiez votre configuration RLS sur Supabase.");
            }
            document.getElementById('btn-save').disabled = false;
            document.getElementById('btn-save').innerText = "ENREGISTRER DANS MA BASE";
        }

        async function deleteItem(id) {
            if(confirm("Supprimer ce produit définitivement ?")) {
                const { error } = await _supabase.from('produits').delete().eq('id', id);
                if(!error) loadCloudData();
            }
        }

        // --- INTERFACE ---
        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(typeof el === 'string') document.getElementById(el).classList.add('active');
            else el.classList.add('active');
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = cloudInventory.length ? '' : '<p class="text-center mt-4">Votre inventaire est vide.</p>';
            cloudInventory.forEach(item => {
                const searchUrl = `https://www.google.com/search?q=FDS+${encodeURIComponent(item.nom)}+filetype:pdf`;
                container.innerHTML += `
                <div class="card-custom">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <b style="color:var(--r-blue)">${item.nom}</b><br>
                            <small class="text-muted">Code: ${item.code_barres || 'Non renseigné'}</small>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="btn btn-sm text-danger"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <a href="${searchUrl}" target="_blank" class="btn btn-sm btn-outline-primary w-100 mt-2">
                        <i class="fa-solid fa-file-pdf me-1"></i> Trouver la FDS
                    </a>
                </div>`;
            });
        }

        window.onload = checkUser;
    </script>
</body>
</html>
