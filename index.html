<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Auto‑évaluation prévention</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --vert:#7fbf9a;
  --orange:#f2b66d;
  --rouge:#e88b8b;
  --fond1:#eaf6f3;
  --fond2:#ffffff;
  --accent:#2e8b7a;
  --texte:#2c3e50;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,var(--fond1),var(--fond2));
  color:var(--texte);
}

section{display:none;padding:28px;min-height:100vh}
section.active{display:block}

h1,h2{color:var(--accent)}

button{
  padding:14px 28px;
  border:none;
  border-radius:25px;
  background:var(--accent);
  color:white;
  font-size:16px;
  margin-top:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
  margin-top:20px;
}

.accueil{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  width:200px;
  margin-bottom:20px;
  animation:resp 4s ease-in-out infinite;
}

@keyframes resp{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

.menu{display:grid;gap:16px}

.menu button{
  background:white;
  color:var(--texte);
  font-weight:bold;
}

select{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ccc;
  margin-top:10px;
  font-size:15px;
}

.checklist{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:15px;
}

.resultat{
  margin-top:20px;
  padding:18px;
  border-radius:14px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<section id="accueil" class="active">
  <div class="accueil">
    <img src="logo-restev.png" class="logo" alt="RESTEV">
    <p>Un outil pour vous situer, progresser et structurer votre prévention.</p>
    <button onclick="show('menu')">Commencer</button>
  </div>
</section>

<!-- MENU -->
<section id="menu">
  <h1>Menu</h1>
  <div class="menu">
    <button onclick="show('metiers')">👷 Auto‑évaluation par métier</button>
  </div>
  <button onclick="show('accueil')">← Accueil</button>
</section>

<!-- METIERS -->
<section id="metiers">
<h1>Auto‑évaluation prévention</h1>

<div class="card">
<label><strong>Métier :</strong></label>
<select id="metier" onchange="chargerMetier()">
  <option value="">— Sélectionner —</option>

  <optgroup label="🩺 Santé">
    <option value="aide">Aide‑soignant</option>
    <option value="infirmier">Infirmier</option>
    <option value="ehpad">Personnel EHPAD</option>
    <option value="ambulancier">Ambulancier</option>
  </optgroup>

  <optgroup label="🏗️ BTP">
    <option value="macon">Maçon</option>
    <option value="electricien">Électricien</option>
    <option value="plombier">Plombier</option>
    <option value="couvreur">Couvreur</option>
  </optgroup>

  <optgroup label="💼 Tertiaire">
    <option value="bureau">Travail de bureau</option>
    <option value="commercial">Commercial</option>
    <option value="direction">Encadrement</option>
  </optgroup>

  <optgroup label="🥖 Métiers de bouche">
    <option value="boulanger">Boulanger</option>
    <option value="boucher">Boucher</option>
    <option value="cuisinier">Cuisinier</option>
    <option value="serveur">Service</option>
  </optgroup>
</select>

<div id="questions" class="checklist"></div>

<button onclick="evaluer()">Évaluer</button>
<div id="resultat" class="resultat"></div>
</div>

<button onclick="show('menu')">← Menu</button>
</section>

<script>
function show(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

const data={
 aide:["EPI disponibles","Formation manutention","Gestion AES","Organisation des soins","Prévention RPS"],
 infirmier:["EPI","Protocoles","Gestion piqûres","Manutention","Rotation postes"],
 ehpad:["Effectifs adaptés","Aides techniques","Prévention chutes","Organisation soins","Suivi RPS"],
 ambulancier:["EPI","Formation portage","Hygiène véhicule","Organisation trajets","Repos"],

 macon:["EPI portés","Protections collectives","Manutention","Plan de prévention","Brief sécurité"],
 electricien:["Habilitations","Consignation","Outils vérifiés","EPI","Analyse risques"],
 plombier:["EPI","Manutention","Produits maîtrisés","Organisation chantier","Prévention chutes"],

 bureau:["Poste ergonomique","Pauses","Éclairage","Prévention RPS","Télétravail encadré"],
 commercial:["Risque routier","Organisation planning","Repos","Communication","Téléphone sécurisé"],
 direction:["Analyse risques","DUERP","Dialogue social","Prévention RPS","Suivi actions"],

 boulanger:["Ventilation","Manutention","EPI coupures","Hygiène","Organisation postes"],
 boucher:["EPI coupures","Affûtage sécurisé","Manutentions","Hygiène","Formation"],
 cuisinier:["Brûlures","Coupures","Organisation cuisine","Ventilation","Hygiène"],
 serveur:["Chaussures adaptées","Manutention","Organisation salle","Prévention chutes","Rythmes"]
};

function chargerMetier(){
 const m=document.getElementById("metier").value;
 const zone=document.getElementById("questions");
 zone.innerHTML="";
 document.getElementById("resultat").innerHTML="";
 if(!data[m])return;
 data[m].forEach(q=>{
  zone.innerHTML+=`<label><input type="checkbox" class="prev"> ${q}</label>`;
 });
}

function evaluer(){
 const c=document.querySelectorAll(".prev");
 let ok=0;c.forEach(x=>{if(x.checked)ok++;});
 const r=ok/c.length;
 const res=document.getElementById("resultat");

 if(r<0.4){
  res.style.background= "var(--rouge)";
  res.innerHTML="Prévention insuffisante – des actions prioritaires sont à engager";
 }else if(r<0.75){
  res.style.background= "var(--orange)";
  res.innerHTML="Prévention en progression – bases présentes";
 }else{
  res.style.background= "var(--vert)";
  res.innerHTML="Prévention bien structurée – organisation cohérente";
 }
}
</script>

</body>
</html>
