<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Démo Scan Produits</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #eef7ff 80%);
}
.app{max-width:620px;margin:auto;padding:16px}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
.header img{height:48px;}
.header-title{font-size:18px;font-weight:bold;color:#3b82f6}

/* Pages */
.page{
  display:none;
  background:white;
  border-radius:26px;
  padding:24px;
  box-shadow:0 14px 34px rgba(59,130,246,0.15);
}
.page.active{display:block;}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:14px;
}

.home{background:#e0f2fe;color:#1e3a8a}
.scan{background:#fee2e2;color:#7f1d1d}
.back{background:#e5e7eb;color:#111}

input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:14px;
  border:2px solid #c7d2fe;
}

.card{
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.card.info{background:#e0f2fe}
.card.risk{background:#fee2e2}
.card.prev{background:#dcfce7}

video{
  width:100%;
  border-radius:14px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  logo.png
  <div class="header-title">Prévention santé au travail</div>
</div>

<!-- ACCUEIL -->
<div id="home" class="page active">
<h2>Application RESTEV</h2>
<p>Démo – Identification et prévention à partir d’un produit réel.</p>
<button class="scan" onclick="openPage('scan')">Identifier un produit</button>
</div>

<!-- PAGE SCAN -->
<div id="scan" class="page">
<h2>Identification d’un produit</h2>

<button class="scan" onclick="startScan()">Scanner un code‑barres</button>
<video id="video" style="display:none"></video>

<input id="manualInput" placeholder="Ou saisir : destop / white spirit">
<button class="home" onclick="manualSearch()">Identifier le produit</button>

<div id="result"></div>

<button class="back" onclick="openPage('home')">← Retour</button>
</div>

</div>

<script>
/* NAVIGATION */
function openPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* BASE PRODUITS (SIMULATION API) */
const products = {
  destop:{
    nom:"Déboucheur de canalisations (DESTOP)",
    categorie:"Produit de nettoyage très alcalin",
    substance:"soude"
  },
  white_spirit:{
    nom:"White‑Spirit",
    categorie:"Solvant pétrolier",
    substance:"white_spirit"
  }
};

/* BASE SUBSTANCES */
const substances = {
  soude:{
    nom:"Hydroxyde de sodium (soude caustique)",
    type:"Agent chimique dangereux – corrosif",
    effets:"Brûlures graves de la peau et des yeux, risques respiratoires",
    prevention:[
      "Substitution par méthodes mécaniques si possible",
      "Procédure d’utilisation formalisée",
      "Interdiction des mélanges",
      "Gants et lunettes de protection"
    ]
  },
  white_spirit:{
    nom:"White‑Spirit (solvant pétrolier)",
    type:"Toxique chronique par exposition répétée",
    effets:"Troubles neurologiques, irritations respiratoires",
    prevention:[
      "Utilisation de produits à l’eau",
      "Ventilation des locaux",
      "Limitation des durées d’exposition",
      "Protection respiratoire si nécessaire"
    ]
  }
};

/* NORMALISATION */
function norm(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

/* AFFICHAGE PRODUIT */
function showProduct(p){
  const s = substances[p.substance];

  let html = `
    <div class="card info">
      <strong>Produit identifié</strong><br>
      ${p.nom}<br>
      <em>${p.categorie}</em>
    </div>

    <div class="card risk">
      <strong>${s.nom}</strong><br>
      ${s.type}<br>
      ${s.effets}
    </div>

    <div class="card prev">
      <strong>Prévention recommandée :</strong>
      <ul>${s.prevention.map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>

    <div class="card prev">
      ⚠️ La fiche de données de sécurité (FDS) reste la référence obligatoire.
    </div>
  `;
  result.innerHTML = html;
}

/* RECHERCHE MANUELLE */
function manualSearch(){
  const key = norm(manualInput.value);
  if(key.includes("destop")){
    showProduct(products.destop);
    return;
  }
  if(key.includes("white")){
    showProduct(products.white_spirit);
    return;
  }
  result.innerHTML = `
    <div class="card info">
      Produit non reconnu.<br>
      Vérification par la FDS recommandée.
    </div>
  `;
}

/* SCAN CODE‑BARRES AVEC RECONNAISSANCE INTELLIGENTE */
async function startScan(){
  if(!("BarcodeDetector" in window)){
    alert("Lecteur code‑barres non disponible sur cet appareil");
    return;
  }

  const v = document.getElementById("video");
  v.style.display = "block";

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  v.srcObject = stream;
  await v.play();

  const detector = new BarcodeDetector();
  const loop = setInterval(async()=>{
    const codes = await detector.detect(v);
    if(codes.length){
      clearInterval(loop);
      stream.getTracks().forEach(t=>t.stop());
      v.style.display = "none";

      // 👉 Reconnaissance par famille (démonstration EPST)
      showProduct(products.destop);
    }
  },800);
}
</script>

</body>
</html>
