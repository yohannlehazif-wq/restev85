<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Prévention Santé au Travail</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #eef7ff 80%);
}
.app{max-width:700px;margin:auto;padding:16px}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
.header img{height:48px}
.header-title{font-size:18px;font-weight:bold;color:#2563eb}

/* PAGES */
.page{
  display:none;
  background:white;
  border-radius:26px;
  padding:24px;
  box-shadow:0 14px 34px rgba(59,130,246,0.15);
}
.page.active{display:block}

/* BOUTONS */
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:14px;
}

.btn-prevention{background:#e0f2fe;color:#1e3a8a}
.btn-back{background:#e5e7eb;color:#111}

select{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:14px;
  border:2px solid #c7d2fe;
}

/* CARTES */
.card{
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.card.info{background:#e0f2fe}
.card.warn{background:#fef9c3}

/* TABLEAU */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th, td{
  border:1px solid #c7d2fe;
  padding:8px;
  vertical-align:top;
}
th{
  background:#e0f2fe;
  text-align:left;
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <img src="logo.png" altheader-title">Prévention santé au travail</div>
</div>

<!-- ACCUEIL -->
<div id="home" class="page active">
  <h2>Application RESTEV</h2>
  <p>Outil d’aide à l’identification et à la structuration de la prévention.</p>
  <button class="btn-prevention" onclick="openPage('metier')">Prévention par métier</button>
</div>

<!-- METIER -->
<div id="metier" class="page">
  <h2>Prévention par métier</h2>

  <select id="jobSelect" onchange="showJob()">
    <option value="">— Choisir un métier —</option>
    <option value="agent_entretien">Agent d’entretien</option>
    <option value="agent_maintenance">Agent de maintenance</option>
    <option value="peintre">Peintre / applicateur</option>
    <option value="magasinier">Magasinier / logistique</option>
    <option value="boucher">Boucher / charcutier</option>
    <option value="cuisinier">Cuisinier / restauration</option>
    <option value="soignant">Aide‑soignant / soignant</option>
    <option value="cariste">Cariste</option>
    <option value="labo">Technicien de laboratoire</option>
    <option value="bureau">Agent administratif / bureau</option>
  </select>

  <div id="jobResult"></div>
  <button class="btn-back" onclick="openPage('home')">← Retour</button>
</div>

</div>

<script>
function openPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const jobs = {
  agent_entretien:{
    nom:"Agent d’entretien",
    tableau:[
      {risque:"Chutes", situation:"Sols humides", prevention:"Organisation, signalisation"},
      {risque:"Produits chimiques", situation:"Détergents, désinfectants", prevention:"Substitution, gants"},
      {risque:"TMS", situation:"Gestes répétés", prevention:"Organisation, matériel"}
    ]
  },
  agent_maintenance:{
    nom:"Agent de maintenance",
    tableau:[
      {risque:"Électrique", situation:"Interventions équipements", prevention:"Consignation"},
      {risque:"Solvants", situation:"Nettoyage, dégraissage", prevention:"Ventilation, substitution"},
      {risque:"Brûlures", situation:"Produits corrosifs", prevention:"EPI"}
    ]
  },
  peintre:{
    nom:"Peintre / applicateur",
    tableau:[
      {risque:"Inhalation solvants", situation:"Application peinture", prevention:"Ventilation"},
      {risque:"CMR possibles", situation:"Peintures solvantées", prevention:"Peintures à l’eau"},
      {risque:"Postures", situation:"Travail prolongé bras levés", prevention:"Organisation"}
    ]
  },
  magasinier:{
    nom:"Magasinier / logistique",
    tableau:[
      {risque:"Manutention", situation:"Charges manuelles", prevention:"Aides mécaniques"},
      {risque:"Circulation", situation:"Engins", prevention:"Plan de circulation"},
      {risque:"Produits dangereux", situation:"Stockage chimique", prevention:"Sécurisation"}
    ]
  },
  boucher:{
    nom:"Boucher / charcutier",
    tableau:[
      {risque:"Coupures", situation:"Couteaux", prevention:"Formation, EPI"},
      {risque:"TMS", situation:"Découpe répétée", prevention:"Organisation"},
      {risque:"Froid", situation:"Chambres froides", prevention:"Protection thermique"}
    ]
  },
  cuisinier:{
    nom:"Cuisinier / restauration",
    tableau:[
      {risque:"Brûlures", situation:"Cuisson", prevention:"Procédures"},
      {risque:"Chutes", situation:"Sols gras", prevention:"Nettoyage"},
      {risque:"Coupures", situation:"Ustensiles", prevention:"Formation"}
    ]
  },
  soignant:{
    nom:"Aide‑soignant / soignant",
    tableau:[
      {risque:"Manutention patients", situation:"Transferts", prevention:"Aides techniques"},
      {risque:"AES", situation:"Soins", prevention:"Procédures"},
      {risque:"Stress", situation:"Charge émotionnelle", prevention:"Organisation"}
    ]
  },
  cariste:{
    nom:"Cariste",
    tableau:[
      {risque:"Collision", situation:"Conduite chariot", prevention:"Formation"},
      {risque:"Chutes", situation:"Chargement", prevention:"Organisation"},
      {risque:"Manutention", situation:"Palettes", prevention:"Aides mécaniques"}
    ]
  },
  labo:{
    nom:"Technicien de laboratoire",
    tableau:[
      {risque:"Produits chimiques", situation:"Manipulation réactifs", prevention:"Hotte"},
      {risque:"Projection", situation:"Transvasement", prevention:"EPI"},
      {risque:"CMR", situation:"Formol, solvants", prevention:"Substitution"}
    ]
  },
  bureau:{
    nom:"Agent administratif / bureau",
    tableau:[
      {risque:"TMS", situation:"Poste écran", prevention:"Ergonomie"},
      {risque:"Fatigue visuelle", situation:"Écran prolongé", prevention:"Pauses"},
      {risque:"Stress", situation:"Charge mentale", prevention:"Organisation"}
    ]
  }
};

function showJob(){
  const id = jobSelect.value;
  if(!id){ jobResult.innerHTML=""; return; }

  const j = jobs[id];
  jobResult.innerHTML = `
    <div class="card info"><strong>${j.nom}</strong></div>
    <div class="card info">
      <table>
        <tr><th>Risque</th><th>Situation</th><th>Prévention</th></tr>
        ${j.tableau.map(l=>`<tr><td>${l.risque}</td><td>${l.situation}</td><td>${l.prevention}</td></tr>`).join("")}
      </table>
      <div style="margin-top:8px;font-size:12px;">
        ⚠️ Tableau d’aide à l’identification – à adapter à la situation réelle.
      </div>
    </div>
  `;
}
</script>

</body>
</html>
