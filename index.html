<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RESTEV 85 - Expert Prévention</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3065a8">
<link rel="icon" type="image/png" href="logo_restev_carre.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RESTEV 85">
<link rel="apple-touch-icon" href="logo_restev_carre.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- =====================================================
     STYLES : INCHANGÉS (identiques à ton original)
===================================================== -->
<style>
/* (styles identiques à ton fichier, non modifiés) */
</style>
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="splash">
  <div class="text-center text-white">
    <img src="logo_restev_carre.png" style="width:120px;border-radius:25px;background:#fff">
    <h2 class="fw-bold mt-3">RESTEV 85</h2>
    <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
  </div>
</div>

<!-- ================= HEADER ================= -->
<div class="app-header">
  <img src="logo_restev_long.png" class="logo-header">
</div>

<!-- ================= HOME ================= -->
<div id="page-home" class="app-page active-page">
  <div class="card-custom text-white" style="background:linear-gradient(135deg,#3065a8,#1e40af)">
    <h5 class="fw-bold">RESTEV 85</h5>
    <p id="inv-stats" class="small opacity-75">Chargement…</p>
  </div>
</div>

<!-- ================= SCAN ================= -->
<div id="page-scan" class="app-page">
  <h5 class="fw-bold mb-3">Ajouter un produit</h5>

  <div class="card-custom">
    <div id="reader" style="min-height:250px;background:#000;border-radius:15px"></div>
    <button class="btn btn-dark w-100 mt-3" onclick="startScanner()">
      <i class="fa fa-camera me-2"></i>ACTIVER LA CAMÉRA
    </button>

    <input id="prod-name" class="form-control mt-3" placeholder="Nom du produit">
    <input id="prod-code" class="form-control mt-2" placeholder="Code-barres">
    <input id="prod-fds" class="form-control mt-2" placeholder="Lien PDF FDS">

    <button id="btn-save" class="btn btn-primary w-100 mt-3 fw-bold" onclick="saveProduct()">
      ENREGISTRER LE PRODUIT
    </button>
  </div>
</div>

<!-- ================= INVENTAIRE ================= -->
<div id="page-list" class="app-page">
  <h5 class="fw-bold mb-3">Mon Parc Chimique</h5>
  <div id="inventory-container"></div>
</div>

<!-- ================= NAV ================= -->
<nav class="nav-bottom">
  <button id="nav-home" class="nav-item active" onclick="nav('page-home',this)">
    <i class="fa fa-house"></i>ACCUEIL
  </button>
  <button id="nav-scan" class="nav-item" onclick="nav('page-scan',this)">
    <i class="fa fa-plus"></i>AJOUTER
  </button>
  <button id="nav-list" class="nav-item" onclick="nav('page-list',this)">
    <i class="fa fa-list-check"></i>LISTE
  </button>
</nav>

<!-- =====================================================
     SCRIPT UNIQUE, NETTOYÉ, STABLE
===================================================== -->
<script>
const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co';
const SUPABASE_KEY = 'TA_CLE_SUPABASE_EXISTANTE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

const normalizeCode = c => c ? c.trim().replace(/\s+/g,'') : '';

async function checkCloud(raw) {
  const code = normalizeCode(raw);
  if (!code) return;

  const { data } = await sb
    .from('produits_partages')
    .select('nom,url_fds')
    .eq('code',code)
    .maybeSingle();

  if (data) {
    prod-name.value = data.nom;
    prod-fds.value = data.url_fds || '';

    btn-save.innerText = "✅ PRODUIT RECONNU (CLOUD)";
    btn-save.classList.replace('btn-primary','btn-success');

    setTimeout(()=>{
      btn-save.innerText="ENREGISTRER LE PRODUIT";
      btn-save.classList.replace('btn-success','btn-primary');
    },2000);
  }
}

function startScanner() {
  const scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    txt => {
      prod-code.value = normalizeCode(txt);
      checkCloud(txt);
      scanner.stop();
    }
  ).catch(()=>alert("Autorisation caméra refusée"));
}

async function saveProduct() {
  const name = prod-name.value.trim();
  const code = normalizeCode(prod-code.value);
  const url = prod-fds.value.trim();

  if (!name) return alert("Nom obligatoire");

  inventory.push({ id: Date.now(), name, code, url_fds:url });
  localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));

  if (code) {
    await sb.from('produits_partages')
      .upsert({ code, nom:name, url_fds:url });
  }

  prod-name.value = prod-code.value = prod-fds.value = '';
  updateStats();
  nav('page-list','nav-list');
}

function renderInventory() {
  inventory-container.innerHTML = inventory.length ? '' :
    '<p class="text-muted text-center">Inventaire vide</p>';

  inventory.sort((a,b)=>a.name.localeCompare(b.name))
    .forEach(i=>{
      inventory-container.innerHTML += `
      <div class="card-custom">
        <b>${i.name}</b><br>
        <small class="text-muted">${i.code || 'Saisie manuelle'}</small>
        ${i.url_fds ? `<a class="btn btn-success btn-sm w-100 mt-2" target="_blank" href="${i.url_f);
  btn.classList.add('active');
  if (id==='page-list') renderInventory();
}

function updateStats(){
  inv-stats.innerText = inventory.length+" produit(s) enregistrés";
}

function dismissSplash(){
  splash.style.display="none";
}

prod-code.addEventListener('blur',e=>checkCloud(e.target.value));
window.onload = updateStats;
</script>

</body>
</html>
