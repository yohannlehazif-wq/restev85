<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>RESTEV – Prévention Mobile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: auto;
      padding: 0;
      background: #f3f4f6;
    }

    /* ---- ACCUEIL ---- */
    #accueil {
      height: 100vh;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 100px;      /* ✅ TON LOGO TAILLE 100px */
      margin-bottom: 30px;
    }

    .btn {
      width: 90%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 20px;   /* ✅ bouton plus grand */
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-start { background: white; color: #2563eb; }
    .btn-job   { background: #2563eb; color: white; font-size: 18px; }
    .btn-risk  { background: #f97316; color: white; font-size: 17px; }
    .btn-back  { background: #d1d5db; color: black; }

    /* ---- CARTES ---- */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
  </style>
</head>

<body>

<!-- ✅ ✅ ACCUEIL AVEC TON LOGO LOCAL -->
<div id="accueil">
  logo.png
  <h1>Prévention Mobile</h1>
  <p>Application officielle RESTEV</p>
  <button class="btn btn-start" onclick="entrer()">ENTRER</button>
</div>

<!-- ✅ ✅ MÉTIERS -->
<div id="menu-metiers" class="card" style="display:none;">
  <h2>Choisis ton métier :</h2>

  <button class="btn btn-job" onclick="showRisks('maintenance')">Technicien maintenance</button>
  <button class="btn btn-job" onclick="showRisks('commercial')">Commercial itinérant</button>
  <button class="btn btn-job" onclick="showRisks('boucher')">Boucher</button>
  <button class="btn btn-job" onclick="showRisks('coiffeur')">Coiffeur / Coiffeuse</button>
  <button class="btn btn-job" onclick="showRisks('batiment')">Ouvrier du bâtiment</button>
  <button class="btn btn-job" onclick="showRisks('livreur')">Conducteur / Livreur</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>

<!-- ✅ ✅ RISQUES -->
<div id="menu-risks" class="card" style="display:none;"></div>

<script>
/* ✅ BASE RISQUES FIABLE */
const data = {
 maintenance: {
  label: "Technicien maintenance",
  risques: {

    "Chute de hauteur": `
      <b>SITUATIONS DANGEREUSES :</b><br>
      • Travail en hauteur sur machine / toiture<br>
      • Plateforme instable ou improvisée<br>
      • Garde-corps absents<br><br>

      <b>PRÉVENTION (HIÉRARCHIE INRS/CARSAT) :</b><br>
      • Plateformes sécurisées / garde-corps<br>
      • Harnais + ligne de vie<br>
      • Travail en binôme<br>
      • Formation port du harnais<br><br>

      <b>RÉFÉRENCES :</b><br>
      INRS ED 6109 – Maintenance et sécurité
    `,

    "Risque électrique": `
      <b>SITUATIONS DANGEREUSES :</b><br>
      • Armoire sous tension<br>
      • Consignation non effectuée<br>
      • Mauvaise VAT<br><br>

      <b>PRÉVENTION :</b><br>
      • Procédure LOTO (consignation)<br>
      • Habilitation BR / B2V<br>
      • Vérification absence de tension (VAT)<br>
      • Outils isolés 1000V<br><br>

      <b>RÉFÉRENCES :</b><br>
      INRS ED 912 – Consignation
    `,

    "CMR": `
      <b>SITUATIONS DANGEREUSES :</b><br>
      • Aérosols dégraissants<br>
      • Solvants en atelier<br>
      • Nettoyants agressifs<br><br>

      <b>PRÉVENTION :</b><br>
      • Substitution obligatoire<br>
      • Ventilation locale aspirante<br>
      • Port gants nitrile / masque FFP2<br>
      • Respect strict FDS<br><br>

      <b>RÉFÉRENCES :</b><br>
      INRS ED 984 – CMR
    `,

    "TMS": `
      <b>SITUATIONS DANGEREUSES :</b><br>
      • Travail en zone exiguë<br>
      • Postures accroupies / bras levés<br>
      • Port de charges répétées<br><br>

      <b>PRÉVENTION :</b><br>
      • Pauses régulières<br>
      • Outils ergonomiques<br>
      • Alternance des tâches<br>
      • Éclairage adapté<br><br>

      <b>RÉFÉRENCES :</b><br>
      INRS – TMS (ED 917)
    `,

    "Mécanique / Écrasement": `
      <b>SITUATIONS DANGEREUSES :</b><br>
      • Carter enlevé<br>
      • Machine en mouvement<br>
      • Réarmement intempestif<br><br>

      <b>PRÉVENTION :</b><br>
      • Consignation obligatoire<br>
      • Carter verrouillable<br>
      • Procédures travaux dangereux<br><br>

      <b>RÉFÉRENCES :</b><br>
      INRS ND 2234 – Risques mécaniques
    `
  }
},

  commercial: {
    label: "Commercial itinérant",
    risques: {
      routier: "Risque routier : pauses, vigilance.",
      stress: "Stress : gestion du temps."
    }
  },

  boucher: {
    label: "Boucher",
    risques: {
      coupure: "Coupures : gants anticoupure.",
      manutention: "Charges lourdes : gestes sûrs.",
      cmr: "CMR : ventilation, gants."
    }
  },

  coiffeur: {
    label: "Coiffeur / Coiffeuse",
    risques: {
      chimique: "Produits chimiques : gants, lunettes.",
      posture: "Postures prolongées : pauses."
    }
  },

  batiment: {
    label: "Ouvrier du bâtiment",
    risques: {
      chute: "Harnais, échafaudages sécurisés.",
      manutention: "Manutention lourde.",
      bruit: "Casques anti-bruit.",
      poussiere: "Masques adaptés."
    }
  },

  livreur: {
    label: "Conducteur / Livreur",
    risques: {
      routier: "Planification + pauses.",
      manutention: "Diable, transpalette.",
      chute: "Sols glissants."
    }
  }
};

/* ✅ ✅ BOUTON ENTRER */
function entrer() {
  document.getElementById("accueil").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}

/* ✅ ✅ AFFICHAGE DES RISQUES */
function showRisks(job) {
  document.getElementById("menu-metiers").style.display = "none";

  const zone = document.getElementById("menu-risks");
  zone.style.display = "block";

  let html = `
    <button class="btn btn-back" onclick="retourMetiers()">← Retour métiers</button>
    <h2>Risques – ${data[job].label}</h2>
  `;

  for (let r in data[job].risques) {
    html += `<button class="btn btn-risk" onclick="showDetail('${job}','${r}')">${r}</button>`;
  }

  zone.innerHTML = html;
}

/* ✅ ✅ FICHE DÉTAIL */
function showDetail(job, risque) {
  document.getElementById("menu-risks").innerHTML = `
    <button class="btn btn-back" onclick="showRisks('${job}')">← Retour risques</button>
    <h2>${risque}</h2>
    <p>${data[job].risques[risque]}</p>
  `;
}

/* ✅ ✅ RETOURS */
function retourMetiers() {
  document.getElementById("menu-risks").style.display = "none";
  document.getElementById("menu-metiers").style.display = "block";
}

function retourAccueil() {
  document.getElementById("menu-risks").style.display = "none";
  document.getElementById("menu-metiers").style.display = "none";
  document.getElementById("accueil").style.display = "flex";
}
</script>

</body>
</html>
