<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RESTEV – Prévention Mobile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 480px;
            margin: auto;
            padding: 0;
            background: #f3f4f6;
        }

        /* ACCUEIL */
        #accueil {
            height: 100vh;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 160px;
            margin-bottom: 25px;
        }

        .btn {
            width: 90%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-start { background: white; color: #2563eb; }
        .btn-menu { background: #2563eb; color: white; font-size: 18px; }
        .btn-back { background: #d1d5db; color: black; }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            text-align: left;
        }

        select {
            width: 100%;
            font-size: 18px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<!-- ✅ ACCUEIL -->
<div id="accueil">
    logo.png
    <h1>Prévention Mobile</h1>
    <p>Application officielle RESTEV</p>

    <button class="btn btn-start" onclick="ouvrirMenuPrincipal()">ENTRER</button>

    <button class="btn btn-start" style="margin-top:20px;background:#9333ea;">À propos</button>
    <button class="btn btn-start" style="background:#4ade80;">Contact</button>
    <button class="btn btn-start" style="background:#ef4444;">Urgences</button>
</div>

<!-- ✅ MENU PRINCIPAL -->
<div id="menuPrincipal" class="card" style="display:none;">
    <h2>Menu principal</h2>

    <button class="btn btn-menu" onclick="ouvrirMetiers()">Métiers</button>

    <button class="btn btn-back" onclick="retourAccueil()">← Retour accueil</button>
</div>

<!-- ✅ MENU METIERS -->
<div id="menuMetiers" class="card" style="display:none;">
    <h2>Choisis ton métier :</h2>

    <select id="select-metier">
        <option value=""></option>
        <option value="maintenance">Technicien maintenance</option>
        <option value="boucher">Boucher</option>
        <option value="boulanger">Boulanger</option>
    </select>

    <button class="btn btn-menu" onclick="validerMetier()">VALIDER ✅</button>
    <button class="btn btn-back" onclick="ouvrirMenuPrincipal()">← Retour</button>
</div>

<!-- ✅ RISQUES -->
<div id="menuRisks" class="card" style="display:none;"></div>

<script>

/* ✅ BASE DES MÉTIERS / RISQUES */
const data = {
briqueteur: {
  label: "Briqueteur",
  risques: {

    "Chute de hauteur": `
      <h3 style='color:#2563eb;'>⬆️ Chute de hauteur</h3>
      <b>Situations dangereuses :</b><br>
      • Travail sur échafaudages<br>
      • Pose de briques en hauteur<br>
      • Circulation sur planchers non protégés<br><br>

      <b>Prévention :</b><br>
      ✅ Garde-corps obligatoires<br>
      ✅ Échafaudages conformes + vérification journalière<br>
      ✅ Chaussures sécurité S3<br>
      ✅ Filets / Planchers provisoires<br><br>

      <b>Documents utiles :</b><br>
      <a target="_blank" href="https://www.oppbtp.fr">OPPBTP – Travail en hauteur</a>
    `,

    "Manutention / TMS": `
      <h3 style='color:#f97316;'>📦 TMS / Manutention</h3>
      <b>Situations dangereuses :</b><br>
      • Port de sacs de ciment<br>
      • Manutention répétée de briques lourdes<br>
      • Travail penché / accroupi<br><br>

      <b>Prévention :</b><br>
      ✅ Répartition des charges<br>
      ✅ Utilisation de palonniers / chariots<br>
      ✅ Alternance des tâches<br>
      ✅ Formation gestes & postures<br><br>

      <b>Documents utiles :</b><br>
      <a target="_blank" href="https://www.inrs.fr/dms/inrs/CataloguePapier/ED/TI-ED-917/ed917.pdf">INRS ED 917 – TMS</a>
    `,

    "Poussières / Silice": `
      <h3 style='color:#9333ea;'>🌫️ Poussières / Silice</h3>
      <b>Situations dangereuses :</b><br>
      • Coupe de briques<br>
      • Mélange ciment / mortier<br>
      • Nettoyage à sec<br><br>

      <b>Prévention :</b><br>
      ✅ Masque FFP3 obligatoire<br>
      ✅ Arrosage / coupe à l’eau<br>
      ✅ Aspiration à la source<br>
      ✅ Interdiction nettoyage à l’air comprimé<br><br>

      <b>Documents utiles :</b><br>
      <a target="_blank" href="https://www.inrs.fr/media.html?refINRS=ED%206180">INRS ED 6180 – Risque Silice</a>
    `,

    "Bruit": `
      <h3 style='color:#0ea5e9;'>🔊 Bruit</h3>
      <b>Situations dangereuses :</b><br>
      • Marteaux pneumatiques<br>
      • Disqueuses<br>
      • Chantiers BTP<br><br>

      <b>Prévention :</b><br>
      ✅ Casque antibruit SNR 30+<br>
      ✅ Limiter l’exposition<br>
      ✅ Matériel silencieux<br><br>

      <b>Documents utiles :</b><br>
      <a target="_blank" href="https://www.inrs.fr/media.html?refINRS=ED%206064">INRS ED 6064 – Bruit</a>
    `    
  }
}
    maintenance: {
        label: "Technicien maintenance",
        risques: {
            "Chute": "Travail en hauteur.",
            "Électrique": "Risque de contact indirect."
        }
    },

    boucher: {
        label: "Boucher",
        risques: {
            "Coupures": "Lames, couteaux, scies.",
        }
    },

    boulanger: {
        label: "Boulanger",
        risques: {
            "Brûlures": "Fours chauds.",
        }
    }
};


/* ✅ ✅ NAVIGATION – 100% fonctionnel */
function ouvrirMenuPrincipal() {
    document.getElementById("accueil").style.display = 'none';
    document.getElementById("menuPrincipal").style.display = 'block';
    document.getElementById("menuMetiers").style.display = 'none';
    document.getElementById("menuRisks").style.display = 'none';
}

function ouvrirMetiers() {
    document.getElementById("menuPrincipal").style.display = 'none';
    document.getElementById("menuMetiers").style.display = 'block';
}

function retourAccueil() {
    document.getElementById("accueil").style.display = 'flex';
    document.getElementById("menuPrincipal").style.display = 'none';
    document.getElementById("menuMetiers").style.display = 'none';
    document.getElementById("menuRisks").style.display = 'none';
}


/* ✅ ✅ VALIDATION – 100% fonctionnel */
function validerMetier() {
    const metier = document.getElementById("select-metier").value;

    if (metier === "") {
        alert("Merci de sélectionner un métier.");
        return;
    }

    afficherRisques(metier);
}


/* ✅ ✅ AFFICHAGE RISQUES – fonctionnel */
function afficherRisques(job) {

    document.getElementById("menuMetiers").style.display = "none";
    const zone = document.getElementById("menuRisks");
    zone.style.display = "block";

    let html = `
<button class='btn btn-back' onclick='ouvrirMetiers()'>← Retour métiers</button>
<h2>Risques – ${data[job].label}</h2>
`;

    for (let r in data[job].risques) {
        html += `<button class='btn btn-menu' onclick="showDetail('${job}','${r}')">${r}</button>`;
    }

    zone.innerHTML = html;
}


/* ✅ ✅ DETAILS – fonctionne */
function showDetail(job, risque) {

    document.getElementById("menuRisks").innerHTML = `
<button class='btn btn-back' onclick="afficherRisques('${job}')">← Retour</button>

<h2>${risque}</h2>
<p>${data[job].risques[risque]}</p>
`;
}

</script>

</body>
</html>
