<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Prévention & Santé au Travail</title>

<style>
body{margin:0;font-family:Arial;background:#eef2ff}
.app{max-width:480px;margin:auto;padding:16px}
.page{background:#fff;border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.12);padding:22px}
h2,h3{color:#1e3a8a}
select{width:100%;padding:14px;margin-bottom:14px;border-radius:12px;border:2px solid #c7d2fe}
.risk{background:#f8fafc;padding:12px;border-radius:12px;margin-bottom:10px}
.cmr{background:#fee2e2;padding:12px;border-radius:12px;margin-bottom:12px}
.epi{background:#fff7ed;padding:10px;border-radius:10px;font-size:13px}
</style>
</head>

<body>
<div class="app">
<div class="page">
<h2>Prévention par métier</h2>

<select id="secteur" onchange="chargerMetiers()">
<option value="">— Secteur —</option>
<option value="btp">BTP</option>
<option value="industrie">Industrie</option>
<option value="tertiaire">Tertiaire</option>
</select>

<select id="metier" onchange="afficher()" disabled>
<option value="">— Métier —</option>
</select>

<div id="resultat"></div>
</div>
</div>

<script>
const data={
btp:{
  macon:{
    nom:"Maçon",
    risques:["Chutes","Manutentions"],
    cmr:[{
      nom:"Silice cristalline",
      pourquoi:"Découpe béton / pierre",
      effets:"Silicose, cancer pulmonaire",
      exposition:"Inhalation",
      epi:["FFP3","Lunettes","Aspiration à la source"]
    }]
  },
  peintre:{
    nom:"Peintre bâtiment",
    risques:["Postures","Chutes"],
    cmr:[{
      nom:"Solvants",
      pourquoi:"Peintures, diluants",
      effets:"Cancers, troubles neurologiques",
      exposition:"Inhalation / cutanée",
      epi:["Masque A2P3","Gants nitrile","Ventilation"]
    }]
  }
},
industrie:{
  soudeur:{
    nom:"Soudeur",
    risques:["Bruit","Rayonnements"],
    cmr:[{
      nom:"Fumées de soudage",
      pourquoi:"Émanations métalliques",
      effets:"Cancers pulmonaires",
      exposition:"Inhalation",
      epi:["Masque à adduction d’air","Ventilation"]
    }]
  }
},
tertiaire:{
  commercial:{
    nom:"Commercial itinérant",
    risques:["Risque routier"],
    cmr:[{
      nom:"Gaz diesel",
      pourquoi:"Déplacements fréquents",
      effets:"Cancer pulmonaire",
      exposition:"Inhalation",
      epi:["Organisation des trajets","Ventilation véhicule"]
    }]
  }
}
};

const sect=document.getElementById("secteur");
const met=document.getElementById("metier");
const res=document.getElementById("resultat");

function chargerMetiers(){
  met.innerHTML="<option>— Métier —</option>";
  met.disabled=true;
  res.innerHTML="";
  Object.keys(data[sect.value]).forEach(k=>{
    met.innerHTML+=`<option value="${k}">${data[sect.value][k].nom}</option>`;
  });
  met.disabled=false;
}

function afficher(){
  res.innerHTML="";
  const m=data[sect.value][met.value];
  m.risques.forEach(r=>res.innerHTML+=`<div class="risk">⚠️ ${r}</div>`);
  m.cmr.forEach(c=>{
    res.innerHTML+=`
    <div class="cmr">
    🔴 <strong>${c.nom}</strong><br>
    ${c.pourquoi}<br>
    Effets : ${c.effets}
    <div class="epi">
    <strong>EPI recommandés :</strong><br>
    • ${c.epi.join("<br>• ")}
    </div>
    </div>`;
  });
}
</script>
</body>
</html>
