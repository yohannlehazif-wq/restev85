<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Prévention & Santé au Travail</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
}
.app{max-width:480px;margin:auto;padding:16px;}
.header{text-align:center;margin-bottom:20px;}
.logo{width:220px;max-width:90%}
.subtitle{font-size:14px;color:#475569}

.card{
  background:white;
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
}
h2,h3{color:#1e3a8a;margin-top:0;}
.info{
  background:#eef2ff;
  padding:14px;
  border-radius:16px;
  font-size:14px;
  margin-bottom:18px;
}

select{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:2px solid #c7d2fe;
  font-size:15px;
  margin-bottom:14px;
}

.btn{
  width:100%;
  padding:16px;
  border-radius:18px;
  border:none;
  font-size:15px;
  font-weight:700;
  margin-bottom:12px;
  cursor:pointer;
}
.btn-main{background:#2563eb;color:white;}
.btn-back{background:#e5e7eb;}

.risk{
  background:#f8fafc;
  border:2px solid #c7d2fe;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}
.cmr{
  background:#fee2e2;
  border:2px solid #ef4444;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  font-weight:600;
}
.hidden{display:none;}
</style>
</head>

<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  logo.png
  <div class="subtitle">Prévention santé au travail – EPST RESTEV</div>
</div>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <div class="info">
    Sélectionnez un secteur et un métier pour identifier
    les <strong>risques professionnels</strong> et les
    <strong>risques CMR</strong> associés.
  </div>

  <button class="btn btn-main" onclick="ouvrirPrevention()">
    🛠️ Prévention par secteur et métier
  </button>
</div>

<!-- PREVENTION -->
<div id="preventionPage" class="card hidden">

  <h2>Prévention par métier</h2>

  <!-- SECTEUR -->
  <select id="secteurSelect" onchange="chargerMetiers()">
    <option value="">— Choisir un secteur —</option>
  </select>

  <!-- METIER -->
  <select id="metierSelect" onchange="afficherRisques()" disabled>
    <option value="">— Choisir un métier —</option>
  </select>

  <!-- RESULTATS -->
  <div id="risquesResult"></div>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

</div>

<script>
// ===== DONNÉES SECTEURS / MÉTIERS =====
const secteursData = {
  btp: {
    nom:"BTP / Artisanat",
    metiers:{
      macon:{
        nom:"Maçon",
        risques:["Chute de hauteur","Manutentions manuelles"],
        cmr:["Silice cristalline"]
      },
      menuisier:{
        nom:"Menuisier",
        risques:["Machines coupantes","Bruit"],
        cmr:["Poussières de bois"]
      },
      peintre:{
        nom:"Peintre en bâtiment",
        risques:["Travail en hauteur","Postures contraignantes"],
        cmr:["Solvants","Peintures anciennes (plomb)"]
      }
    }
  },
  industrie:{
    nom:"Industrie / Maintenance",
    metiers:{
      maintenance:{
        nom:"Agent de maintenance",
        risques:["Travail isolé","Contraintes physiques"],
        cmr:["Huiles minérales usagées"]
      },
      soudeur:{
        nom:"Soudeur",
        risques:["Rayonnements","Bruit"],
        cmr:["Fumées de soudage"]
      }
    }
  },
  tertiaire:{
    nom:"Tertiaire",
    metiers:{
      administratif:{
        nom:"Agent administratif",
        risques:["Travail sur écran","Charge mentale"],
        cmr:[]
      },
      teleconseiller:{
        nom:"Téléconseiller",
        risques:["Contraintes temporelles","Travail répétitif"],
        cmr:[]
      },
      commercial_itinerant:{
        nom:"Commercial itinérant",
        risques:["Risque routier","Fatigue"],
        cmr:["Gaz d’échappement diesel"]
      }
    }
  }
};

// ===== INITIALISATION SECTEURS =====
const secteurSelect=document.getElementById("secteurSelect");
Object.keys(secteursData).forEach(s=>{
  secteurSelect.innerHTML+=`<option value="${s}">${secteursData[s].nom}</option>`;
});

// ===== NAVIGATION =====
function ouvrirPrevention(){
  accueil.classList.add("hidden");
  preventionPage.classList.remove("hidden");
}

function retourAccueil(){
  preventionPage.classList.add("hidden");
  accueil.classList.remove("hidden");
}

// ===== MÉTIERS =====
const metierSelect=document.getElementById("metierSelect");
function chargerMetiers(){
  metierSelect.innerHTML=`<option value="">— Choisir un métier —</option>`;
  document.getElementById("risquesResult").innerHTML="";
  metierSelect.disabled=true;

  const sec=secteurSelect.value;
  if(!sec) return;

  Object.keys(secteursData[sec].metiers).forEach(m=>{
    metierSelect.innerHTML+=`
      <option value="${m}">${secteursData[sec].metiers[m].nom}</option>`;
  });
  metierSelect.disabled=false;
}

// ===== AFFICHAGE RISQUES =====
function afficherRisques(){
  const r=document.getElementById("risquesResult");
  r.innerHTML="";

  const sec=secteurSelect.value;
  const met=metierSelect.value;
  if(!sec||!met) return;

  const data=secteursData[sec].metiers[met];

  r.innerHTML+=`<h3>Risques métier</h3>`;
  data.risques.forEach(x=>r.innerHTML+=`<div class="risk">⚠️ ${x}</div>`);

  if(data.cmr.length){
    r.innerHTML+=`<h3>Risques CMR</h3>`;
    data.cmr.forEach(x=>r.innerHTML+=`<div class="cmr">🔴 ${x}</div>`);
  }else{
    r.innerHTML+=`<div class="info">Aucun risque CMR identifié pour ce métier</div>`;
  }
}
</script>

</body>
</html>
