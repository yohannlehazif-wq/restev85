<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --restev-blue: #3d7cc0; --restev-violet: #a74b9e; --restev-green: #97c93e; --restev-bg: #f8fafc; }
        body { background-color: var(--restev-bg); font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .header-restev { background: white; border-bottom: 5px solid var(--restev-blue); padding: 15px; }
        .logo-img { max-height: 60px; }
        .nav-link { color: #666; font-weight: 600; border: none !important; }
        .nav-link.active { color: var(--restev-blue) !important; border-bottom: 4px solid var(--restev-blue) !important; }
        #reader { border: 4px solid var(--restev-blue); border-radius: 20px; overflow: hidden; background: white; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; }
        .picto-grid img { width: 50px; height: 50px; cursor: pointer; margin: 5px; transition: 0.2s; }
        .picto-grid img:hover { transform: scale(1.2); }
        .btn-restev { background: var(--restev-blue); color: white; border-radius: 10px; font-weight: bold; }
        footer { font-size: 0.75rem; background: white; border-top: 1px solid #eee; z-index: 1000; }
    </style>
</head>
<body>

    <header class="header-restev text-center">
        <img src="1000009663.jpg" alt="RESTEV 85" class="logo-img" onerror="this.style.display='none'">
        <h6 class="mb-0 fw-bold" style="color: var(--restev-blue);">RESTEV 85 - Partenaire Santé</h6>
    </header>

    <ul class="nav nav-tabs sticky-top justify-content-center bg-white" id="mainTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#scan-content">🔍 Scan</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#duerp-content">📊 Suivi</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#prev-content">🛡️ Conseils</button></li>
    </ul>

    <div class="container tab-content mt-3">
        
        <div class="tab-pane fade show active" id="scan-content">
            <div id="reader"></div>
            <div id="result-container" class="d-none mt-3">
                <div id="product-info" class="card card-custom p-4"></div>
                <button class="btn btn-outline-secondary w-100 mt-2" onclick="resetScanner()">Scanner un autre produit</button>
            </div>
            <div class="mt-4 p-3 card-custom text-center">
                <h6>🆘 Besoin d'aide pour lire une FDS ?</h6>
                <button class="btn btn-sm btn-outline-primary" onclick="ouvrirSOSFDS()">Guide de lecture rapide</button>
            </div>
        </div>

        <div class="tab-pane fade" id="duerp-content">
            <div class="card card-custom p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0 text-primary">Mon Bilan d'Exposition</h6>
                    <button class="btn btn-sm btn-success" onclick="exporterBilan()">📥 Export Visite Médicale</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <tbody id="duerp-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="prev-content">
            <div class="card card-custom p-3 mb-3 border-start border-4 border-warning">
                <h6>⚡ Diagnostic Flash Poste</h6>
                <p class="small">Évaluez votre poste en 30 secondes.</p>
                <button class="btn btn-sm btn-restev" onclick="lancerDiag()">Démarrer</button>
            </div>

            <div class="card card-custom p-3 mb-3">
                <h6>⚠️ Guide des Dangers (CLP)</h6>
                <p class="small text-muted">Cliquez sur un symbole pour comprendre le risque.</p>
                <div class="picto-grid text-center">
                    <span onclick="infoPicto('Explosif', 'Produit pouvant exploser au contact d\'une flamme ou d\'un choc.')">💥</span>
                    <span onclick="infoPicto('Inflammable', 'Peut s\'enflammer facilement. Éloignez toute source de chaleur.')">🔥</span>
                    <span onclick="infoPicto('Corrosif', 'Attaque les tissus (peau, yeux) et les métaux. Portez des lunettes !')">🧪</span>
                    <span onclick="infoPicto('Toxicité aiguë', 'Empoisonnement rapide même à faible dose.')">💀</span>
                    <span onclick="infoPicto('Danger Santé (CMR)', 'Effets graves à long terme (cancer, mutation, fertilité).')">👤</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header" id="modalHeader" style="background: var(--restev-blue); color: white;">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <footer class="text-center p-3 fixed-bottom shadow-lg">
        <div class="container"><span class="fw-bold" style="color: var(--restev-blue);">RESTEV 85</span> | Partenaire de votre sécurité</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        let inventaireLocal = JSON.parse(localStorage.getItem('restev_duerp')) || [];
        let databaseProduits = [];
        const modal = new bootstrap.Modal(document.getElementById('mainModal'));

        fetch('produits.json').then(r => r.json()).then(d => { databaseProduits = d.produits; afficherInventaire(); });

        // 1. DIAGNOSTIC FLASH
        function lancerDiag() {
            document.getElementById('modalTitle').innerText = "Diagnostic Rapide";
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Question :</strong> Travaillez-vous dans un espace ventilé ?</p>
                <button class="btn btn-success btn-sm w-100 mb-2" onclick="diagReponse('ok')">Oui, c'est aéré</button>
                <button class="btn btn-warning btn-sm w-100" onclick="diagReponse('ko')">Non, c'est confiné</button>
            `;
            modal.show();
        }
        function diagReponse(res) {
            const msg = res === 'ok' ? "Parfait. Continuez à maintenir cette aération." : "Attention : Le RESTEV préconise l'installation d'une aspiration localisée pour éviter de respirer les vapeurs.";
            document.getElementById('modalBody').innerHTML = `<div class="alert alert-info">${msg}</div>`;
        }

        // 2. SOS FDS
        function ouvrirSOSFDS() {
            document.getElementById('modalTitle').innerText = "Lire une FDS";
            document.getElementById('modalBody').innerHTML = `
                <ul class="small">
                    <li><strong>Rubrique 2 :</strong> Les dangers (Pictogrammes).</li>
                    <li><strong>Rubrique 4 :</strong> Premiers secours.</li>
                    <li><strong>Rubrique 8 :</strong> Les gants et masques à porter.</li>
                    <li><strong>Rubrique 11 :</strong> Effets sur la santé.</li>
                </ul>
            `;
            modal.show();
        }

        // 3. PICTO INFO
        function infoPicto(titre, texte) {
            document.getElementById('modalTitle').innerText = titre;
            document.getElementById('modalBody').innerHTML = `<p>${texte}</p>`;
            modal.show();
        }

        // 4. EXPORT BILAN
        function exporterBilan() {
            let contenu = "BILAN EXPOSITION RESTEV 85\n\n";
            inventaireLocal.forEach(p => contenu += `- ${p.nom} (${p.risque})\n`);
            const blob = new Blob([contenu], {type: "text/plain"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Bilan_Exposition_RESTEV.txt";
            link.click();
        }

        // SCAN & LOGIC
        function onScanSuccess(decodedText) {
            const info = document.getElementById('product-info');
            document.getElementById('reader').classList.add('d-none');
            document.getElementById('result-container').classList.remove('d-none');
            const produit = databaseProduits.find(p => p.code === decodedText);
            if (produit) {
                info.innerHTML = `<h6>${produit.nom}</h6><p class="small">${produit.conseil}</p>
                <button class="btn btn-restev btn-sm w-100" onclick="ajouterAuDuerp('${produit.nom}','${produit.classement}',${produit.cmr})">Tracer ce produit</button>`;
            } else {
                info.innerHTML = `<p>Produit inconnu (${decodedText}).</p>`;
            }
        }

        function ajouterAuDuerp(nom, risque, cmr) {
            inventaireLocal.push({nom, risque, cmr});
            localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal));
            afficherInventaire();
            resetScanner();
        }

        function afficherInventaire() {
            const list = document.getElementById('duerp-list');
            list.innerHTML = inventaireLocal.length ? "" : "<tr><td class='text-center p-3'>Aucun scan.</td></tr>";
            inventaireLocal.forEach((item, index) => {
                list.innerHTML += `<tr><td><strong>${item.nom}</strong></td><td><span class="badge ${item.cmr?'bg-danger':'bg-success'}">${item.cmr?'CMR':'OK'}</span></td><td class="text-end"><button class="btn btn-sm text-danger" onclick="suppr(${index})">🗑️</button></td></tr>`;
            });
        }

        function suppr(i) { inventaireLocal.splice(i,1); localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal)); afficherInventaire(); }
        function resetScanner() { document.getElementById('result-container').classList.add('d-none'); document.getElementById('reader').classList.remove('d-none'); }
        
        new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }).render(onScanSuccess);
    </script>
</body>
</html>
