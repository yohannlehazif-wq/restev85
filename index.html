<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Connexion RESTEV 85</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        #app-section { display: none; background: #e7f3ff; }
        button { cursor: pointer; padding: 8px 12px; }
    </style>
</head>
<body>

    <h1>🚀 Test Connexion Supabase</h1>

    <div id="auth-section" class="box">
        <h3>1. Connexion / Inscription</h3>
        <input type="email" id="email" placeholder="Email (ex: test@test.fr)">
        <input type="password" id="password" placeholder="Mot de passe">
        <br><br>
        <button onclick="signUp()">1. Créer le compte</button>
        <button onclick="signIn()">2. Se connecter</button>
        <p id="auth-status" style="color: red;"></p>
    </div>

    <div id="app-section" class="box">
        <h3>✅ Connecté !</h3>
        <p>Utilisateur : <span id="user-email"></span></p>
        <hr>
        <h4>2. Ajouter un produit</h4>
        <input type="text" id="nom-produit" placeholder="Nom du produit (ex: Acétone)">
        <button onclick="ajouterProduit()">Enregistrer dans la base</button>
        
        <h4>3. Ma Liste</h4>
        <ul id="liste-produits"></ul>
        <button onclick="logout()">Se déconnecter</button>
    </div>

    <script>
        // --- CONFIGURATION (Tes clés) ---
        const SB_URL = "https://sbvccjnwxvfmcfadfngc.supabase.co";
        const SB_KEY = "sb_publishable_RiUKUCrRehNumDIlsNourA_hDzj_QgX";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        // --- FONCTIONS AUTHENTIFICATION ---
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert("Erreur inscription : " + error.message);
            else alert("Compte créé ! Essayez maintenant de vous connecter.");
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                document.getElementById('auth-status').innerText = error.message;
            } else {
                currentUser = data.user;
                showApp();
            }
        }

        function showApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-email').innerText = currentUser.email;
            chargerProduits();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // --- FONCTIONS DONNÉES ---
        async function ajouterProduit() {
            const nom = document.getElementById('nom-produit').value;
            if(!nom) return alert("Tapez un nom !");

            const { error } = await supabaseClient
                .from('produits')
                .insert([{ 
                    nom: nom, 
                    user_id: currentUser.id 
                }]);

            if (error) {
                alert("Erreur base de données : " + error.message + "\n\nAs-tu bien fait l'étape du SQL Editor (RLS) ?");
            } else {
                alert("Produit ajouté !");
                document.getElementById('nom-produit').value = "";
                chargerProduits();
            }
        }

        async function chargerProduits() {
            const { data, error } = await supabaseClient
                .from('produits')
                .select('*');

            const liste = document.getElementById('liste-produits');
            liste.innerHTML = "";
            if (data) {
                data.forEach(p => {
                    let li = document.createElement('li');
                    li.innerText = p.nom;
                    liste.appendChild(li);
                });
            }
        }
    </script>
</body>
</html>
