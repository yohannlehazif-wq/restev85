<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 450px;
  margin: auto;
  padding: 20px;
  background: #f3f4f6;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-top: 20px;
}

h1, h2 {
  color: #2563eb;
  text-align: center;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-main { background: #2563eb; color: white; }
.btn-risk { background: #f97316; color: white; }
.btn-back { background: #d1d5db; }

.info {
  background: #e0f2fe;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  margin: 15px 0;
}

.block {
  margin-top: 10px;
}
.block strong {
  display:block;
  margin-bottom:4px;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center;">Aide à la prévention des risques professionnels</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ACTIVITÉS -->
<div id="activites" class="card" style="display:none;">
  <h2>Votre activité</h2>
  <div class="info">
    Comprendre les risques permet de respecter ses obligations tout en protégeant les salariés.
  </div>

  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="afficherMetiers('logistique')">Logistique / Transport</button>

  <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

<!-- METIERS -->
<div id="metiers" class="card" style="display:none;"></div>

<!-- RISQUES -->
<div id="risques" class="card" style="display:none;"></div>

<!-- DETAIL -->
<div id="detail" class="card" style="display:none;"></div>

<script>
const data = {
  btp: {
    "Ouvrier du bâtiment": {
      chute: {
        titre: "Chute de hauteur",
        description: "Travaux en hauteur sur échafaudage, toiture ou structure.",
        employeur: "Mettre en place des protections collectives et organiser le travail en sécurité.",
        salarie: "Utiliser les équipements fournis et respecter les consignes.",
        obligationEmployeur: "Évaluer le risque de chute, intégrer au DUERP et mettre en œuvre des mesures de prévention adaptées.",
        obligationSalarie: "Respecter les consignes de sécurité et utiliser les équipements mis à disposition.",
        restev: "RESTEV accompagne l’analyse du risque et la mise en place des actions adaptées."
      }
    }
  },

  services: {
    "Commercial itinérant": {
      routier: {
        titre: "Risque routier",
        description: "Déplacements professionnels fréquents en véhicule.",
        employeur: "Organiser les déplacements et sensibiliser aux règles de conduite.",
        salarie: "Adopter une conduite prudente et signaler toute situation à risque.",
        obligationEmployeur: "Prendre en compte le risque routier dans le DUERP et organiser le travail pour le limiter.",
        obligationSalarie: "Respecter le code de la route et les consignes de l’entreprise.",
        restev: "RESTEV aide à structurer la prévention du risque routier professionnel."
      }
    }
  }
};

function cacherTout() {
  ["accueil","activites","metiers","risques","detail"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function entrer() {
  cacherTout();
  document.getElementById("activites").style.display="block";
}

function retourAccueil() {
  cacherTout();
  document.getElementById("accueil").style.display="block";
}

function afficherMetiers(secteur) {
  cacherTout();
  const zone = document.getElementById("metiers");
  zone.style.display="block";

  let html = "<h2>Métiers</h2>";
  for (let m in data[secteur]) {
    html += `<button class="btn btn-main" onclick="afficherRisques('${secteur}','${m}')">${m}</button>`;
  }
  html += `<button class="btn btn-back" onclick="entrer()">← Retour activités</button>`;
  zone.innerHTML = html;
}

function afficherRisques(secteur, metier) {
  cacherTout();
  const zone = document.getElementById("risques");
  zone.style.display="block";

  let html = `<h2>Risques – ${metier}</h2>`;
  for (let r in data[secteur][metier]) {
    html += `<button class="btn btn-risk" onclick="afficherDetail('${secteur}','${metier}','${r}')">
      ${data[secteur][metier][r].titre}</button>`;
  }
  html += `<button class="btn btn-back" onclick="afficherMetiers('${secteur}')">← Retour métiers</button>`;
  zone.innerHTML = html;
}

function afficherDetail(secteur, metier, risque) {
  cacherTout();
  const d = data[secteur][metier][risque];
  const zone = document.getElementById("detail");
  zone.style.display="block";

  zone.innerHTML = `
    <h2>${d.titre}</h2>

    <div class="block"><strong>Description</strong>${d.description}</div>
    <div class="block"><strong>Ce que l’employeur fait</strong>${d.employeur}</div>
    <div class="block"><strong>Ce que le salarié fait</strong>${d.salarie}</div>

    <div class="block"><strong>Obligations employeur</strong>${d.obligationEmployeur}</div>
    <div class="block"><strong>Obligations salarié</strong>${d.obligationSalarie}</div>

    <div class="info">
      <strong>Rôle de RESTEV</strong><br>
      ${d.restev}
    </div>

    <button class="btn btn-back" onclick="afficherRisques('${secteur}','${metier}')">← Retour risques</button>
  `;
}
</script>

</body>
</html>
``
