<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3065a8">
    <link rel="icon" type="image/png" href="logo_restev_carre.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RESTEV 85">
    <link rel="apple-touch-icon" href="logo_restev_carre.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- SDK SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: 100px; overflow-x: hidden; user-select: none; }
        
        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; font-size: 1.2rem; margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: breathing 2.5s ease-in-out infinite; }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; }
        
        .info-banner { background: #e6a00f; color: #fff; padding: 6px 0; overflow: hidden; white-space: nowrap; font-weight: 700; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.55rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; outline: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s ease-out; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-excel { background-color: #1d6f42; color: white; border: none; border-radius: 12px; width: 100%; padding: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sync { background-color: #3f51b5; color: white; border: none; border-radius: 12px; width: 100%; padding: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-center text-white">
            <img src="logo_restev_carre.png" alt="Logo" style="width: 120px; border-radius: 25px; background: white;" onerror="this.src='https://placehold.co/120x120?text=RESTEV'">
            <h2 class="fw-bold mt-3">RESTEV 85</h2>
            <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
        </div>
    </div>

    <div class="app-header">
        <img src="logo_restev_long.png" alt="RESTEV 85" class="logo-header" onerror="this.src='https://placehold.co/180x40?text=RESTEV+85'">
    </div>

    <div class="info-banner">
        <div class="ticker">
            <span><i class="fa-solid fa-cloud-check me-1"></i> Sauvegarde Supabase active | <i class="fa-solid fa-circle-info me-1"></i> RESTEV : Pensez à mettre à jour votre DUERP !</span>
        </div>
    </div>

    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0 mb-3" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
            <h5 class="fw-bold mb-1">RESTEV 85</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Chargement...</p>
        </div>
        
        <div class="row g-2">
            <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e3f2fd;"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><small class="fw-bold">SCANNER</small></div>
            </div>
            <div class="col-6" onclick="nav('page-list', 'nav-list')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e8f5e9;"><i class="fa-solid fa-boxes-stacked fa-2x mb-2 text-success"></i><br><small class="fw-bold">INVENTAIRE</small></div>
            </div>
            <div class="col-6" onclick="nav('page-quiz', 'nav-quiz')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #ffebee;"><i class="fa-solid fa-clipboard-check fa-2x mb-2 text-danger"></i><br><small class="fw-bold">AUTO-DIAG</small></div>
            </div>
            <div class="col-6" onclick="nav('page-centres', 'nav-centres')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e0f2f1;"><i class="fa-solid fa-map-location-dot fa-2x mb-2 text-teal"></i><br><small class="fw-bold">CENTRES</small></div>
            </div>
        </div>
    </div>

    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Mon Parc Chimique</h5>
        
        <div class="row g-2 mb-3">
            <div class="col-6">
                <button class="btn-sync" id="btn-cloud-sync" onclick="syncToSupabase()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> SYNC CLOUD
                </button>
            </div>
            <div class="col-6">
                <button class="btn-excel" onclick="exportToCSV()">
                    <i class="fa-solid fa-file-csv"></i> EXPORT CSV
                </button>
            </div>
        </div>

        <div id="inventory-container"></div>
    </div>

    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3">Ajouter un produit</h5>
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 250px;"></div>
            <button class="btn btn-dark w-100 mt-3 mb-4 py-2" onclick="startScanner()"><i class="fa-solid fa-camera me-2"></i>ACTIVER LA CAMÉRA</button>
            <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
            <input type="text" id="prod-code" class="form-control mb-3" placeholder="Code-barres">
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">ENREGISTRER</button>
        </div>
    </div>

    <div id="page-centres" class="app-page">
        <h5 class="fw-bold mb-3">Nos Centres RESTEV</h5>
        <div id="centres-list"></div>
    </div>

    <div id="page-quiz" class="app-page">
        <h5 class="fw-bold mb-3">Auto-Diag Prévention</h5>
        <div class="card-custom" id="quiz-container">
            <div id="q-box">
                <p id="q-text" class="fw-bold mb-4">Diagnostic en cours...</p>
                <div class="d-grid gap-2">
                    <button onclick="quizAnswer(3)" class="btn btn-outline-primary py-2">Oui, tout à fait</button>
                    <button onclick="quizAnswer(0)" class="btn btn-outline-primary py-2">Non, pas encore</button>
                </div>
            </div>
            <div id="q-result" style="display: none;" class="text-center">
                <h2 id="quiz-score" class="fw-bold text-primary">0</h2>
                <p id="quiz-advice"></p>
                <button onclick="resetQuiz()" class="btn btn-primary rounded-pill px-4">Recommencer</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-quiz" class="nav-item" onclick="nav('page-quiz', this)"><i class="fa-solid fa-clipboard-check"></i>DIAG</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus"></i>AJOUTER</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-list-check"></i>LISTE</button>
        <button id="nav-centres" class="nav-item" onclick="nav('page-centres', this)"><i class="fa-solid fa-map-location-dot"></i>CENTRES</button>
    </nav>

    <script>
        // ==========================================
        // CONFIGURATION SUPABASE (Vérifiée)
        // ==========================================
        const SUPABASE_URL = 'https://khhktchihkyojiuewyva.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoaGt0Y2hpaGt5b2ppdWV3eXZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzE1OTksImV4cCI6MjA5MzQ0NzU5OX0._VN9xLLTpDJ_1y7qfagBi1Hw9oUhm4IcUR4jc-bQ28Q';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // ÉTAT ET CENTRES (FILTRÉS)
        // ==========================================
        let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];
        
        const centres = [
            { n: "La Roche-sur-Yon (Siège)", t: "0251370668", a: "Impasse Newton, 85000 La Roche-sur-Yon", g: "https://maps.google.com/?q=Impasse+Newton+85000+La+Roche-sur-Yon" },
            { n: "Montaigu-Vendée", t: "0251942014", a: "44 rue du 8 mai 1945, 85600 Montaigu-Vendée", g: "https://maps.google.com/?q=44+rue+du+8+mai+1945+85600+Montaigu-Vendée" },
            { n: "Les Essarts-en-Bocage", t: "0251080601", a: "Rue Louis Lumière, 85140 Les Essarts-en-Bocage", g: "https://maps.google.com/?q=Rue+Louis+Lumiere+85140+Les+Essarts-en-Bocage" },
            { n: "Les Herbiers", t: "0251671203", a: "18 rue Olivier de Serres, 85500 Les Herbiers", g: "https://maps.google.com/?q=18+rue+Olivier+de+Serres+85500+Les+Herbiers" }
        ];

        // ==========================================
        // SYNCHRONISATION SUPABASE
        // ==========================================
        async function syncToSupabase() {
            if (inventory.length === 0) return alert("Inventaire vide.");

            const btn = document.getElementById('btn-cloud-sync');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ENVOI...';
            btn.disabled = true;

            try {
                const { error } = await supabaseClient
                    .from('produits')
                    .upsert(inventory.map(item => ({
                        id_local: item.id.toString(),
                        nom: item.name,
                        code: item.code
                    })));

                if (error) throw error;
                alert("✅ Synchronisation réussie !");
            } catch (err) {
                alert("❌ Erreur : " + err.message + "\nAssurez-vous que la table 'produits' existe sur votre Supabase.");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> SYNC CLOUD';
                btn.disabled = false;
            }
        }

        // ==========================================
        // CORE LOGIC
        // ==========================================
        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(el) el.classList.add('active');
            if(id === 'page-list') renderInventory();
            if(id === 'page-centres') renderCentres();
            window.scrollTo(0,0);
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = inventory.length ? '' : '<p class="text-center text-muted mt-4">Aucun produit enregistré.</p>';
            inventory.forEach(item => {
                container.innerHTML += `
                <div class="card-custom d-flex justify-content-between align-items-center">
                    <div><b>${item.name}</b><br><small class="text-muted">${item.code || 'Saisie manuelle'}</small></div>
                    <button onclick="deleteItem(${item.id})" class="btn text-danger"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
            updateStats();
        }

        function saveProduct() {
            const name = document.getElementById('prod-name').value;
            const code = document.getElementById('prod-code').value;
            if(!name) return alert("Veuillez saisir un nom.");
            inventory.push({ id: Date.now(), name, code });
            localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-code').value = '';
            nav('page-list', document.getElementById('nav-list'));
        }

        function deleteItem(id) {
            if(confirm("Supprimer ?")) {
                inventory = inventory.filter(i => i.id !== id);
                localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
                renderInventory();
            }
        }

        function renderCentres() {
            document.getElementById('centres-list').innerHTML = centres.map(c => `
                <div class="card-custom">
                    <b>${c.n}</b><br><small class="text-muted">${c.a}</small>
                    <div class="d-flex gap-2 mt-2">
                        <a href="tel:${c.t}" class="btn btn-sm btn-primary flex-grow-1"><i class="fa-solid fa-phone me-1"></i> Appeler</a>
                        <a href="${c.g}" target="_blank" class="btn btn-sm btn-outline-secondary flex-grow-1">Carte</a>
                    </div>
                </div>`).join('');
        }

        function startScanner() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('prod-code').value = text;
                scanner.stop();
            }).catch(() => alert("Accès caméra refusé."));
        }

        function updateStats() {
            document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) enregistré(s)`;
        }

        function exportToCSV() {
            let csv = "Nom;Code\n" + inventory.map(i => `${i.name};${i.code}`).join("\n");
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'inventaire_restev.csv'; a.click();
        }

        function quizAnswer(p) { 
            document.getElementById('q-box').style.display='none'; 
            document.getElementById('q-result').style.display='block'; 
            document.getElementById('quiz-score').innerText = p + "/3"; 
            document.getElementById('quiz-advice').innerText = p > 0 ? "Bon début !" : "Contactez RESTEV pour vous aider.";
        }
        function resetQuiz() { document.getElementById('q-box').style.display='block'; document.getElementById('q-result').style.display='none'; }
        function dismissSplash() { document.getElementById('splash').style.display = 'none'; }
        
        window.onload = updateStats;
    </script>
</body>
</html>
