<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV TEST</title>
<style>
body{font-family:Arial;max-width:400px;margin:auto;padding:20px}
.btn{width:100%;padding:15px;font-size:18px}
</style>
</head>

<body>

<div id="accueil">
  <h2>RESTEV</h2>
  <button class="btn" onclick="entrer()">Entrer</button>
</div>

<div id="activites" style="display:none;">
  <h3>Activités</h3>
  <p>BTP – Services – Logistique</p>
</div>

<script>
function entrer() {
  alert("La fonction entrer() fonctionne ✅");
  document.getElementById("accueil").style.display="none";
  document.getElementById("activites").style.display="block";
}
</script>

</body>
</html>
