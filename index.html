<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Prévention Mobile</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 450px;
      margin: auto;
      padding: 20px;
      background: #f3f4f6;
    }

    h1 {
      text-align: center;
      background: #2563eb;
      color: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .btn-job { background: #2563eb; color: white; }
    .btn-risk { background: #f97316; color: white; }
    .btn-back { background: #d1d5db; color: black; }
  </style>
</head>

<body>
<h1>Prévention Mobile</h1>

<!-- MÉTIERS -->
<div id="menu-metiers" class="card">
  <h2>Choisis ton métier :</h2>

  <!-- métiers de base -->
  <button class="btn btn-job" onclick="afficherRisques('maintenance')">Technicien maintenance</button>
  <button class="btn btn-job" onclick="afficherRisques('commercial')">Commercial itinérant</button>

  <!-- nouveaux métiers -->
  <button class="btn btn-job" onclick="afficherRisques('boucher')">Boucher</button>
  <button class="btn btn-job" onclick="afficherRisques('coiffeur')">Coiffeur / Coiffeuse</button>
  <button class="btn btn-job" onclick="afficherRisques('batiment')">Ouvrier du bâtiment</button>
  <button class="btn btn-job" onclick="afficherRisques('livreur')">Conducteur / Livreur</button>
  <button class="btn btn-job" onclick="afficherRisques('production')">Opérateur de production</button>
  <button class="btn btn-job" onclick="afficherRisques('entretien')">Agent d'entretien</button>
  <button class="btn btn-job" onclick="afficherRisques('commerce')">Employé de commerce</button>
</div>
