<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>RESTEV – Prévention</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --restev-vert: #2e8b7a;
      --restev-vert-clair: #e6f4f1;
      --restev-gris: #2c3e50;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--restev-vert-clair);
    }

    section {
      display: none;
      min-height: 100vh;
      padding: 30px;
      background: white;
    }

    section.active {
      display: block;
    }

    h1 {
      color: var(--restev-vert);
      margin-top: 0;
    }

    button {
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      background: var(--restev-vert);
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      margin-top: 100px;
      color: var(--restev-vert);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    .menu button {
      width: 100%;
      margin-top: 15px;
      background: var(--restev-vert-clair);
      color: var(--restev-gris);
      font-weight: bold;
    }

    .retour {
      background: transparent;
      color: var(--restev-vert);
      margin-top: 40px;
    }
  </style>
</head>

<body>

<!-- ACCUEIL -->
<section id="accueil" class="active">
  <div class="logo">RESTEV</div>
  <div style="text-align:center;">
    <button onclick="show('menu')">Entrer</button>
  </div>
</section>

<!-- MENU -->
<section id="menu">
  <h1>Menu principal</h1>

  <div class="menu">
    <button onclick="show('metiers')">Prévention par métier</button>
    <button onclick="show('cmr')">CMR – Analyse produit</button>
    <button onclick="show('pdp')">PDP</button>
    <button onclick="show('duerp')">DUERP</button>
  </div>

  <button class="retour" onclick="show('accueil')">← Accueil</button>
</section>

<!-- PREVENTION METIERS -->
<section id="metiers">
  <h1>Prévention par métier</h1>
  <p>Contenu à personnaliser par métier.</p>
  <button class="retour" onclick="show('menu')">← Menu</button>
</section>

<!-- CMR -->
<section id="cmr">
  <h1>CMR – Analyse produit</h1>
  <p>Analyse des produits chimiques, FDS, classement CMR.</p>
  <button class="retour" onclick="show('menu')">← Menu</button>
</section>

<!-- PDP -->
<section id="pdp">
  <h1>Plan de prévention (PDP)</h1>
  <p>Gestion des entreprises extérieures.</p>
  <button class="retour" onclick="show('menu')">← Menu</button>
</section>

<!-- DUERP -->
<section id="duerp">
  <h1>DUERP</h1>
  <p>Évaluation des risques professionnels.</p>
  <button class="retour" onclick="show('menu')">← Menu</button>
</section>

<script>
  function show(id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }
</script>

</body>
</html>
