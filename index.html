<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Splash Screen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --restev-blue: #3065a8;
            --restev-purple: #ae227d;
            --restev-teal: #75bba8;
            --bg-light: #ffffff;
            --text-muted: #8e8e93;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        /* --- CONTENEUR PRINCIPAL --- */
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 60px 20px 20px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* --- LOGO ET TITRES --- */
        .logo-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .main-logo {
            width: 80%;
            max-width: 300px;
            margin-bottom: 20px;
            /* On simule un léger flottement */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* --- SECTION CHARGEMENT --- */
        .loading-section {
            width: 100%;
            max-width: 280px;
            margin-bottom: 40px;
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #e5e5ea;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--restev-blue), var(--restev-purple));
            border-radius: 10px;
            animation: loadProgress 3s forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .btn-continue {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background-color: #c7c7cc; /* Gris par défaut comme sur la photo */
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .btn-continue.active {
            background-color: var(--restev-blue);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(48, 101, 168, 0.3);
        }

        /* --- BARRE DE NAVIGATION DU BAS --- */
        .bottom-nav {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #f2f2f7;
            background: white;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.65rem;
            text-decoration: none;
            gap: 4px;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item.active {
            color: var(--restev-blue);
        }

        .add-button {
            width: 45px;
            height: 45px;
            background-color: #d1d1d6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-top: -25px;
            border: 4px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <div class="splash-container">
        
        <div class="logo-section">
            <img src="logo_restev_carre.png" alt="Logo RESTEV" class="main-logo">
        </div>

        <div class="loading-section">
            <div class="loading-text" id="status-text">Loading...</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <button class="btn-continue" id="btn-continue">Continue</button>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-clock-history"></i>
                <span>Historique</span>
            </a>
            <div class="add-button">
                <i class="fa-solid fa-plus"></i>
            </div>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-heart"></i>
                <span>Favorite</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profil</span>
            </a>
        </nav>

    </div>

    <script>
        // Simulation du chargement
        const progress = document.getElementById('progress-fill');
        const btn = document.getElementById('btn-continue');
        const statusText = document.getElementById('status-text');

        // Une fois l'animation terminée (3s)
        setTimeout(() => {
            btn.classList.add('active');
            btn.style.cursor = "pointer";
            statusText.innerText = "Ready!";
            
            btn.addEventListener('click', () => {
                alert("Redirection vers l'application...");
                // Ici tu peux ajouter : window.location.href = "home.html";
            });
        }, 3000);
    </script>
</body>
</html>
