<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Auto‑évaluation prévention</title>

<style>
body{
  margin:0;
  font-family:'Nunito', Arial, sans-serif;
  background:linear-gradient(180deg,#f8fbff 0%, #eef4ff 80%);
}
.container{
  max-width:980px;
  margin:auto;
  padding:24px;
}

.header{
  display:flex;
  align-items:center;
  gap:16px;
  background:white;
  padding:20px;
  border-radius:24px;
  box-shadow:0 10px 26px rgba(0,0,0,0.08);
  margin-bottom:26px;
}
.header img{height:52px}
.header h1{
  font-family:'Poppins', Arial, sans-serif;
  font-size:22px;
  margin:0;
  color:#1e3a8a;
}

h2{
  font-family:'Poppins', Arial, sans-serif;
  color:#1e40af;
  margin-top:0;
}

select{
  width:100%;
  padding:14px;
  border-radius:18px;
  border:2px solid #c7d2fe;
  font-size:15px;
  margin-bottom:20px;
}

/* CARDS */
.card{
  border-radius:22px;
  padding:20px;
  margin-bottom:18px;
}
.info{background:#e0f2fe}
.warn{background:#fef3c7}

.checklist label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
}

/* INDICATOR */
.indicator{
  padding:18px;
  border-radius:20px;
  font-weight:700;
  margin-bottom:16px;
}
.green{background:#dcfce7;color:#065f46}
.yellow{background:#fef3c7;color:#92400e}
.red{background:#fee2e2;color:#7f1d1d}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    logo.png
    <h1>Auto‑évaluation de la prévention par métier</h1>
  </div>

  <div class="card info">
    Cette page permet à l’entreprise de se situer sur les mesures de prévention
    actuellement en place, sans jugement, dans une logique d’amélioration continue.
  </div>

  <h2>Choisir le métier concerné</h2>

  <select id="jobSelect" onchange="showJob()">
    <option value="">— Sélectionner —</option>

    <optgroup label="BTP">
      <option value="btp">Métiers du BTP</option>
    </optgroup>

    <optgroup label="Santé">
      <option value="sante">Santé / médico‑social</option>
    </optgroup>

    <optgroup label="Métiers de bouche">
      <option value="bouche">Métiers de bouche</option>
    </optgroup>

    <optgroup label="Vétérinaire">
      <option value="veto">Vétérinaire / auxiliaire vétérinaire</option>
    </optgroup>

    <optgroup label="Première nécessité & autres">
      <option value="divers">Commerce, logistique, propreté, livraison…</option>
    </optgroup>
  </select>

  <div id="resultat"></div>

</div>

<script>
const mesuresBase = [
  "Organisation du travail définie",
  "Information ou formation à la sécurité",
  "Équipements de protection disponibles",
  "Matériel entretenu",
  "Rangement et circulation sécurisés",
  "Gestion des situations d’urgence connue",
  "Temps de pause possibles",
  "Encadrement identifié",
  "Communication interne sur la prévention",
  "Aménagements ou adaptations possibles"
];

function showJob(){
  const res=document.getElementById("resultat");

  const checks = mesuresBase.map(m =>
    `<label><input type="checkbox" onchange="updateIndicator()"> ${m}</label>`
  ).join("");

  res.innerHTML = `
    <div id="indicator" class="indicator red">État de la prévention : à situer</div>

    <div class="card info">
      <strong>Mesures actuellement en place (à compléter par l’entreprise)</strong>
    </div>

    <div class="card checklist">
      ${checks}
    </div>

    <div class="card warn">
      <strong>Accompagnement RESTEV</strong><br>
      Le service de santé au travail RESTEV peut accompagner l’entreprise,
      à sa demande, dans l’analyse des situations de travail
      et la structuration de la prévention,
      sans jugement et en tenant compte des réalités du terrain.
    </div>
  `;
}

function updateIndicator(){
  const boxes=document.querySelectorAll('#resultat input[type="checkbox"]');
  const checked=[...boxes].filter(b=>b.checked).length;
  const ratio=checked/boxes.length;
  const ind=document.getElementById('indicator');

  if(ratio>=0.7){
    ind.className="indicator green";
    ind.textContent="Prévention globalement structurée";
  }else if(ratio>=0.4){
    ind.className="indicator yellow";
    ind.textContent="Prévention en cours de structuration";
  }else{
    ind.className="indicator red";
    ind.textContent="Prévention à structurer";
  }
}
</script>

</body>
</html>
