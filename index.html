<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --restev-blue: #3d7cc0; --restev-violet: #a74b9e; 
            --restev-green: #97c93e; --restev-bg: #f8fafc; 
        }
        body { background-color: var(--restev-bg); font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        
        /* Header & Nav */
        .header-restev { background: white; border-bottom: 5px solid var(--restev-blue); padding: 15px; }
        .logo-img { max-height: 60px; }
        .nav-tabs { background: white; border: none; }
        .nav-link { color: #666; font-weight: 600; border: none !important; }
        .nav-link.active { color: var(--restev-blue) !important; border-bottom: 4px solid var(--restev-blue) !important; }
        
        /* Scanner */
        #reader { border: 4px solid var(--restev-blue); border-radius: 20px; overflow: hidden; background: white; }
        
        /* Grille SGH */
        .picto-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .picto-item { background: white; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .picto-item:hover { transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .picto-img { width: 100%; max-width: 60px; height: auto; }
        
        /* Cartes */
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; }
        .btn-restev { background: var(--restev-blue); color: white; border-radius: 10px; font-weight: bold; }
        .badge-cmr { background-color: var(--restev-violet); color: white; }
        
        footer { font-size: 0.75rem; background: white; border-top: 1px solid #eee; z-index: 1000; }
    </style>
</head>
<body>

    <header class="header-restev text-center">
        <img src="1000009663.jpg" alt="RESTEV 85" class="logo-img" onerror="this.style.display='none'">
        <h6 class="mb-0 fw-bold" style="color: var(--restev-blue);">Prévention Risque Chimique</h6>
    </header>

    <ul class="nav nav-tabs sticky-top justify-content-center bg-white" id="mainTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#scan-content">🔍 Scanner</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#duerp-content">📋 Inventaire</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#prev-content">🛡️ Guides SGH</button></li>
    </ul>

    <div class="container tab-content mt-3">
        
        <div class="tab-pane fade show active" id="scan-content">
            <div id="reader"></div>
            <div id="result-container" class="d-none mt-3">
                <div id="product-info" class="card card-custom p-4"></div>
                <button class="btn btn-outline-secondary w-100 mt-2" onclick="resetScanner()">Scanner un autre produit</button>
            </div>
            
            <div class="card card-custom p-3 mt-4 text-center border-start border-4 border-warning" onclick="lancerDiag()">
                <h6 class="mb-1 text-warning">⚡ Diagnostic Rapide de Poste</h6>
                <p class="small mb-0 text-muted">Évaluer les conditions de manipulation</p>
            </div>
        </div>

        <div class="tab-pane fade" id="duerp-content">
            <div class="card card-custom p-3">
                <h6 class="text-primary mb-3 text-center">Produits à tracer (DUERP)</h6>
                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <tbody id="duerp-list"></tbody>
                    </table>
                </div>
                <div class="text-center mt-3">
                    <button class="btn btn-sm btn-outline-danger" onclick="viderTout()">Réinitialiser l'inventaire</button>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="prev-content">
            <div class="card card-custom p-3 mb-3">
                <h6 class="text-center mb-3">Signalétique de Danger SGH</h6>
                <div class="picto-grid">
                    <div class="picto-item text-center" onclick="infoPicto('GHS01 - Explosif', 'Danger d\'explosion suite à un choc, une friction ou une chaleur intense.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/GHS-pictogram-explos.svg/100px-GHS-pictogram-explos.svg.png" class="picto-img">
                    </div>
                    <div class="picto-item text-center" onclick="infoPicto('GHS02 - Inflammable', 'S\'enflamme facilement. Tenir à l\'écart des flammes et étincelles.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/GHS-pictogram-flamme.svg/100px-GHS-pictogram-flamme.svg.png" class="picto-img">
                    </div>
                    <div class="picto-item text-center" onclick="infoPicto('GHS05 - Corrosif', 'Provoque des brûlures graves. Attention aux yeux et aux mains.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/GHS-pictogram-acid.svg/100px-GHS-pictogram-acid.svg.png" class="picto-img">
                    </div>
                    <div class="picto-item text-center" onclick="infoPicto('GHS06 - Toxique', 'Danger de mort par inhalation ou contact. Usage très restreint.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/GHS-pictogram-skull.svg/100px-GHS-pictogram-skull.svg.png" class="picto-img">
                    </div>
                    <div class="picto-item text-center" onclick="infoPicto('GHS08 - Danger Santé', 'Effets CMR suspectés ou avérés. Suivi médical renforcé nécessaire.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/GHS-pictogram-silhouette.svg/100px-GHS-pictogram-silhouette.svg.png" class="picto-img">
                    </div>
                    <div class="picto-item text-center" onclick="infoPicto('GHS07 - Irritant', 'Peut causer des allergies cutanées ou des vertiges.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/GHS-pictogram-exclam.svg/100px-GHS-pictogram-exclam.svg.png" class="picto-img">
                    </div>
                </div>
            </div>
            
            <div class="card card-custom p-3 border-start border-4 border-info" onclick="ouvrirSOSFDS()">
                <h6>🆘 SOS FDS : Comment lire ?</h6>
                <p class="small text-muted mb-0">Les rubriques clés à surveiller.</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header" style="background: var(--restev-blue); color: white;">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <footer class="text-center p-3 fixed-bottom shadow-lg">
        <div class="container small"><strong>RESTEV 85</strong> | Santé au Travail en Vendée</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        let inventaireLocal = JSON.parse(localStorage.getItem('restev_duerp')) || [];
        let databaseProduits = [];
        const modal = new bootstrap.Modal(document.getElementById('mainModal'));

        fetch('produits.json').then(r => r.json()).then(d => { 
            databaseProduits = d.produits; 
            afficherInventaire(); 
        });

        function infoPicto(titre, texte) {
            document.getElementById('modalTitle').innerText = titre;
            document.getElementById('modalBody').innerHTML = `<p>${texte}</p>`;
            modal.show();
        }

        function ouvrirSOSFDS() {
            document.getElementById('modalTitle').innerText = "Guide de lecture FDS";
            document.getElementById('modalBody').innerHTML = `
                <div class="small">
                    <p><strong>Rubrique 2 :</strong> Classification du danger.</p>
                    <p><strong>Rubrique 8 :</strong> Protections (EPI) conseillées.</p>
                    <p><strong>Rubrique 11 :</strong> Effets toxiques potentiels.</p>
                </div>`;
            modal.show();
        }

        function lancerDiag() {
            document.getElementById('modalTitle').innerText = "Évaluation de poste";
            document.getElementById('modalBody').innerHTML = `
                <p class="small">Le produit est-il utilisé avec une ventilation (aspiration localisée ou extérieur) ?</p>
                <div class="d-grid gap-2">
                    <button class="btn btn-success btn-sm" onclick="diagRep('Ventilation confirmée. Veillez au maintien de la maintenance du système.')">Oui</button>
                    <button class="btn btn-warning btn-sm" onclick="diagRep('Alerte : Le RESTEV recommande une étude pour une captation à la source.')">Non / Inconnu</button>
                </div>`;
            modal.show();
        }
        function diagRep(m) { document.getElementById('modalBody').innerHTML = `<div class="alert alert-info small">${m}</div>`; }

        function onScanSuccess(decodedText) {
            const info = document.getElementById('product-info');
            document.getElementById('reader').classList.add('d-none');
            document.getElementById('result-container').classList.remove('d-none');
            const p = databaseProduits.find(x => x.code === decodedText);
            if(p) {
                info.innerHTML = `<h6 class="${p.cmr?'text-danger':''}">${p.nom}</h6>
                <p class="small text-muted italic">${p.conseil}</p>
                <button class="btn btn-restev btn-sm w-100" onclick="ajouter('${p.nom}',${p.cmr})">Ajouter à l'inventaire</button>`;
            } else {
                info.innerHTML = `<h6>Produit Inconnu</h6><p class="small">Code : ${decodedText}</p>`;
            }
        }

        function ajouter(nom, cmr) {
            inventaireLocal.push({nom, cmr});
            localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal));
            afficherInventaire();
            resetScanner();
        }

        function afficherInventaire() {
            const list = document.getElementById('duerp-list');
            list.innerHTML = inventaireLocal.length ? "" : "<tr><td class='text-center p-3 small'>Aucun produit listé.</td></tr>";
            inventaireLocal.forEach((p, i) => {
                list.innerHTML += `<tr><td><strong>${p.nom}</strong></td><td><span class="badge ${p.cmr?'badge-cmr':'bg-success'}">${p.cmr?'CMR':'OK'}</span></td><td class="text-end"><button class="btn btn-sm text-muted" onclick="suppr(${i})">🗑️</button></td></tr>`;
            });
        }

        function suppr(i) { inventaireLocal.splice(i,1); localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal)); afficherInventaire(); }
        function viderTout() { if(confirm("Vider l'inventaire ?")) { localStorage.removeItem('restev_duerp'); inventaireLocal = []; afficherInventaire(); } }
        function resetScanner() { document.getElementById('result-container').classList.add('d-none'); document.getElementById('reader').classList.remove('d-none'); }
        
        new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }).render(onScanSuccess);
    </script>
</body>
</html>
