<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --restev-blue: #2c5da7; 
            --restev-green: #8ec641; 
            --restev-violet: #a74b9e; 
            --restev-yellow: #f9b233;
            --dark: #1e293b; 
            --bg: #f8fafc;
        }

        body { background-color: var(--bg); font-family: 'Segoe UI', system-ui; color: var(--dark); margin-bottom: 80px; overflow-x: hidden; }
        
        /* --- NOUVELLE PAGE DE GARDE DYNAMIQUE --- */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, var(--restev-blue) 0%, var(--restev-violet) 100%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; color: white; padding: 20px;
        }
        .splash-logo { 
            width: 250px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            animation: floating 3s infinite ease-in-out; margin-bottom: 2rem;
        }
        .splash-text h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .splash-text p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; font-weight: 300; }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* --- HEADER --- */
        .app-header { 
            background: white; padding: 12px; text-align: center; 
            border-bottom: 4px solid var(--restev-yellow); position: sticky; 
            top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
        }
        .header-logo { height: 45px; object-fit: contain; }

        /* --- NAVIGATION --- */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.75rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; text-decoration: none; transition: 0.3s; }
        .nav-item.active { color: var(--restev-blue); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        /* --- CARDS & SCAN --- */
        .card-custom { 
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); border-left: 6px solid var(--restev-blue);
        }
        .vlep-badge { background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; float: right; }
        
        .picto-container { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .ghs-picto { width: 55px; height: 55px; border: 1px solid #f1f5f9; border-radius: 8px; padding: 2px; background: white; }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .app-page { display: none; padding: 20px; animation: slideIn 0.4s ease-out; }
        .active-page { display: block !important; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- MODAL MÉTIER --- */
        #job-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; display: none; 
            overflow-y: auto; padding: 20px; animation: modalIn 0.3s forwards;
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash">
        <img src="logo-restev.png" class="splash-logo" alt="Logo RESTEV">
        <div class="splash-text">
            <h1>RESTEV 85</h1>
            <p>VOTRE ALLIÉ PRÉVENTION ACTIVE</p>
            <div class="small opacity-75 mb-4">
                SANTÉ AU TRAVAIL VENDÉE<br>
                <i class="fa-solid fa-location-dot"></i> La Roche-sur-Yon • Montaigu • Les Herbiers
            </div>
        </div>
        <button class="btn btn-light btn-lg rounded-pill px-5 fw-bold text-primary shadow" onclick="startApp()">
            DÉMARRER L'EXPERTISE
        </button>
    </div>

    <div class="app-header">
        <img src="logo-restev.png" class="header-logo" alt="RESTEV 85">
    </div>

    <div id="page-home" class="app-page active-page">
        <div class="d-flex align-items:center mb-3">
            <h5 class="fw-bold m-0"><i class="fa-solid fa-barcode text-primary me-2"></i>Scanner un produit</h5>
        </div>
        
        <div id="reader" style="display:none"></div>
        
        <button id="btn-scan" class="btn btn-primary w-100 py-3 rounded-4 mb-4 fw-bold shadow-sm" onclick="toggleCamera()">
            <i class="fa-solid fa-camera me-2"></i> ACTIVER LE SCANNER
        </button>
        
        <div class="input-group mb-4 shadow-sm border-0">
            <input type="text" id="manualInput" class="form-control border-0 px-4 py-3 rounded-start-4" placeholder="Code-barres ou nom..." onkeyup="searchProduct(this.value)">
            <button class="btn btn-primary px-4 rounded-end-4" onclick="searchProduct(document.getElementById('manualInput').value)">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="res-area" class="d-none">
            <div class="card-custom">
                <div id="picto-list" class="picto-container"></div>
                <h4 id="res-n" class="fw-bold text-dark mb-1"></h4>
                <p id="res-d" class="small text-muted mb-3"></p>
                <div class="p-3 rounded-4" style="background: #f0f7ff; border-left: 4px solid var(--restev-blue);">
                    <b class="text-primary small"><i class="fa-solid fa-shield-halved me-1"></i> CONSEILS RESTEV 85 :</b>
                    <p id="res-p" class="small mb-0 mt-2" style="white-space: pre-line;"></p>
                </div>
                <div id="google-btn" class="mt-3"></div>
            </div>
        </div>
    </div>

    <div id="page-metiers" class="app-page">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-briefcase text-primary me-2"></i>Fiches Risques Métiers</h5>
        <input type="text" class="form-control mb-4 rounded-pill shadow-sm border-0 px-4 py-3" placeholder="Rechercher un métier (ex: Soudeur)..." onkeyup="renderMetiers(this.value)">
        <div id="metiers-list"></div>
    </div>

    <div id="page-diag" class="app-page text-center">
        <h5 class="fw-bold mb-4">Auto-Diagnostic Prévention</h5>
        <div id="diag-container" class="card-custom text-start">
            <p id="q-text" class="fw-bold fs-5"></p>
            <div class="d-grid gap-2 mt-4">
                <button class="btn btn-outline-primary py-3 rounded-4 fw-bold" onclick="answer(1)">OUI / CONFORME</button>
                <button class="btn btn-outline-secondary py-3 rounded-4" onclick="answer(0)">NON / À AMÉLIORER</button>
            </div>
            <div class="text-center mt-4 small text-muted">Question <span id="q-idx">1</span> / 10</div>
        </div>
        <div id="diag-result" class="d-none">
            <div class="display-1 fw-bold text-primary mb-2" id="final-score"></div>
            <h4 class="fw-bold mb-3">Score Global</h4>
            <p id="diag-advice" class="mb-4 text-muted"></p>
            <button class="btn btn-primary rounded-pill px-5 py-2 fw-bold" onclick="resetDiag()">RECOMMENCER</button>
        </div>
    </div>

    <div id="job-modal">
        <button class="btn btn-light shadow-sm rounded-pill mb-4 px-4" onclick="closeJob()">
            <i class="fa-solid fa-arrow-left me-2"></i>Retour à la liste
        </button>
        <div id="job-content"></div>
    </div>

    <div class="nav-bottom">
        <button class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-qrcode"></i>SCANNER</button>
        <button class="nav-item" onclick="nav('page-metiers', this)"><i class="fa-solid fa-user-doctor"></i>MÉTIERS</button>
        <button class="nav-item" onclick="nav('page-diag', this)"><i class="fa-solid fa-clipboard-check"></i>DIAG</button>
    </div>

    <script>
        const ghsMap = {
            "explosif": "SGH01_BombeExplosant.jpg",
            "flamme": "SGH02_Flamme.jpg",
            "comburant": "SGH03_FlammeSurCercle.jpg",
            "gaz": "SGH04_BouteilleGaz.jpg",
            "corrosion": "SGH05_Corrosion.jpg",
            "toxique": "SGH06_TeteDeMort.jpg",
            "attention": "SGH07_PointExclamation.jpg",
            "sante": "SGH08_DangerSante.jpg",
            "environnement": "SGH09_Environnement.jpg"
        };

        const db = {
            "3077316291191": { 
                n: "White Spirit", 
                pictos: ["flamme", "sante", "environnement"],
                d: "Solvant hydrocarboné. Risque d'incendie et d'inhalation.", 
                p: "• VLEP : 1000 mg/m³.\n• GANTS : Nitrile épaisseur > 0.4mm.\n• PROTECTION : Aspiration à la source.\n• CONSEIL : Ne jamais nettoyer la peau avec ce produit." 
            }
        };

        const metiersData = [
            {
                m: "Menuisier Ébéniste", vlep: "Bois: 1 mg/m³", r: "Poussières de bois (Cancérogène), coupures, bruit.",
                p: "• Aspiration centralisée obligatoire.\n• Masque FFP3 pour le ponçage manuel.\n• Pas de soufflette (utiliser un aspirateur M).", source: "INRS ED 6345"
            },
            {
                m: "Maçon / Façadier", vlep: "Silice: 0.1 mg/m³", r: "Silicose, TMS, dermatoses au ciment.",
                p: "• Découpe à l'eau systématique.\n• Gants étanches pour le béton.\n• Utilisation de lève-matériaux.", source: "OPPBTP"
            }
        ];

        const questions = ["Le DUERP est-il à jour ?", "Les FDS sont-elles accessibles ?", "Les EPI sont-ils portés ?", "Aspiration contrôlée annuellement ?", "Formations sécurité à jour ?", "Aides au levage disponibles ?", "Rétention produits chimiques ?", "SST présents sur site ?", "Arrêts d'urgence fonctionnels ?", "Postes ergonomiques ?"];
        let qIdx = 0, score = 0;

        function startApp() { document.getElementById('splash').style.display='none'; resetDiag(); }
        
        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
            if(id === 'page-metiers') renderMetiers();
        }

        function searchProduct(v) {
            const res = document.getElementById('res-area');
            const k = v.trim();
            const pList = document.getElementById('picto-list');
            const gBtn = document.getElementById('google-btn');
            pList.innerHTML = "";
            res.classList.remove('d-none');
            
            if(db[k]) {
                document.getElementById('res-n').innerText = db[k].n;
                document.getElementById('res-d').innerText = db[k].d;
                document.getElementById('res-p').innerText = db[k].p;
                db[k].pictos.forEach(p => pList.innerHTML += `<img src="${ghsMap[p]}" class="ghs-picto">`);
                const link = "https://www.google.com/search?q="+encodeURIComponent(db[k].n + " FDS PDF");
                gBtn.innerHTML = `<a href="${link}" target="_blank" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm">VOIR FDS COMPLÈTE</a>`;
            } else if(v.length > 5) {
                document.getElementById('res-n').innerText = "Produit : " + v;
                document.getElementById('res-d').innerText = "Inconnu dans notre base locale.";
                document.getElementById('res-p').innerText = "Attention : Référez-vous aux pictogrammes présents sur l'étiquette réelle.";
                const link = "https://www.google.com/search?q="+encodeURIComponent(v + " FDS PDF");
                gBtn.innerHTML = `<a href="${link}" target="_blank" class="btn btn-warning w-100 text-white rounded-pill fw-bold">LIEN FDS (GOOGLE)</a>`;
            }
        }

        function renderMetiers(filter = "") {
            const list = document.getElementById('metiers-list');
            list.innerHTML = "";
            metiersData.filter(m => m.m.toLowerCase().includes(filter.toLowerCase())).forEach((m, idx) => {
                list.innerHTML += `
                    <div class="card-custom" onclick="openJob(${idx})">
                        <span class="vlep-badge">${m.vlep}</span>
                        <b class="fs-5">${m.m}</b><br>
                        <small class="text-muted">Analyse des risques & préconisations...</small>
                    </div>`;
            });
        }

        function openJob(idx) {
            const m = metiersData[idx];
            document.getElementById('job-content').innerHTML = `
                <div class="card-custom" style="border-left-width: 10px;">
                    <h2 class="fw-bold text-primary">${m.m}</h2>
                    <span class="badge bg-danger mb-3 p-2">VLEP RÉGLEMENTAIRE : ${m.vlep}</span>
                    <hr>
                    <h6 class="fw-bold text-danger"><i class="fa-solid fa-triangle-exclamation me-2"></i>RISQUES IDENTIFIÉS</h6>
                    <p class="small text-muted mb-4">${m.r}</p>
                    <div class="bg-light p-4 rounded-4 border-start border-success border-4">
                        <h6 class="fw-bold text-success"><i class="fa-solid fa-check-shield me-2"></i>MESURES DE PRÉVENTION</h6>
                        <p class="small mb-0 mt-2" style="white-space:pre-line">${m.p}</p>
                    </div>
                    <p class="text-center mt-4 small opacity-50 italic">Source : ${m.source}</p>
                </div>`;
            document.getElementById('job-modal').style.display = 'block';
        }
        function closeJob() { document.getElementById('job-modal').style.display = 'none'; }

        function answer(v) {
            score += v;
            if(qIdx < 9) { qIdx++; updateQ(); }
            else {
                document.getElementById('diag-container').classList.add('d-none');
                document.getElementById('diag-result').classList.remove('d-none');
                document.getElementById('final-score').innerText = score + "/10";
                document.getElementById('diag-advice').innerText = score > 7 ? "Excellent ! Votre niveau de prévention est conforme aux standards RESTEV 85." : "Attention : Des axes d'amélioration majeurs sont identifiés. Contactez-nous.";
            }
        }
        function updateQ() { document.getElementById('q-text').innerText = questions[qIdx]; document.getElementById('q-idx').innerText = qIdx + 1; }
        function resetDiag() { qIdx = 0; score = 0; document.getElementById('diag-container').classList.remove('d-none'); document.getElementById('diag-result').classList.add('d-none'); updateQ(); }

        let scanner;
        function toggleCamera() {
            const r = document.getElementById('reader');
            if(r.style.display === 'none') {
                r.style.display = 'block';
                scanner = new Html5Qrcode("reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                    searchProduct(txt);
                    scanner.stop();
                    r.style.display = 'none';
                });
            } else {
                scanner.stop();
                r.style.display = 'none';
            }
        }
    </script>
</body>
</html>
