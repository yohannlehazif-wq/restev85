<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --r-blue: #3065a8; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', sans-serif; margin-bottom: 100px; }
        
        .app-header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top:0; z-index:100; }
        
        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: white; display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.7rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }

        .app-page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: black; }
        .cloud-info { background: #e0f2fe; color: #0369a1; padding: 10px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 15px; display: none; border: 1px solid #bae6fd; }
    </style>
</head>
<body>

    <div class="app-header">
        <h5 class="fw-bold mb-0" style="color: var(--r-blue)">RESTEV 85 <span style="color: var(--r-yellow)">CLOUD</span></h5>
    </div>

    <div id="page-scan" class="app-page active-page">
        <h5 class="fw-bold mb-3">Scanner un produit</h5>
        <div class="card-custom">
            <div id="reader"></div>
            <button class="btn btn-dark w-100 mt-3 mb-4 py-2" onclick="startScanner()">
                <i class="fa-solid fa-camera me-2"></i>ACTIVER LE SCANNER
            </button>
            
            <div id="cloud-status" class="cloud-info">
                <i class="fa-solid fa-cloud-check me-2"></i> <b>Produit connu !</b> Le lien FDS a été récupéré automatiquement.
            </div>

            <label class="small fw-bold">Nom du produit</label>
            <input type="text" id="prod-name" class="form-control mb-2" placeholder="Ex: Nettoyant Freins">
            
            <label class="small fw-bold">Code-barres</label>
            <input type="text" id="prod-code" class="form-control mb-2" placeholder="Scannez ou saisissez">
            
            <label class="small fw-bold text-primary">URL de la FDS (Lien direct fabriquant)</label>
            <input type="url" id="prod-fds" class="form-control mb-4" placeholder="https://www.site.com/fds.pdf" style="border: 2px solid var(--r-blue)">

            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">
                ENREGISTRER & PARTAGER LE LIEN
            </button>
        </div>
    </div>

    <div id="page-list" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Inventaire Local</h5>
            <button class="btn btn-sm btn-outline-danger" onclick="clearLocal()">Vider</button>
        </div>
        <div id="inventory-container"></div>
    </div>

    <nav class="nav-bottom">
        <button id="btn-nav-scan" onclick="nav('page-scan')" class="nav-item active"><i class="fa-solid fa-barcode fa-lg"></i>SCAN</button>
        <button id="btn-nav-list" onclick="nav('page-list')" class="nav-item"><i class="fa-solid fa-list-ul fa-lg"></i>LISTE</button>
    </nav>

    <script>
        const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rbGFyYnphbWZmaGl3YXN4b3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MzI5MzQsImV4cCI6MjA5MzQwODkzNH0.Tjy3Z9Yf9FOn47yKqlqQNC9Xfmy_tMMLkfa4UUFdf6k';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

        function nav(id) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            
            if(id === 'page-scan') document.getElementById('btn-nav-scan').classList.add('active');
            if(id === 'page-list') {
                document.getElementById('btn-nav-list').classList.add('active');
                renderInventory();
            }
        }

        // --- SCANNER ET VERIFICATION CLOUD ---
        function startScanner() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('prod-code').value = text;
                checkCloudProduct(text);
                scanner.stop();
            }).catch(err => alert("Erreur caméra"));
        }

        async function checkCloudProduct(code) {
            const statusDiv = document.getElementById('cloud-status');
            // On cherche si quelqu'un a déjà mis un lien pour ce code
            const { data, error } = await sb.from('produits_partages').select('*').eq('code', code).single();
            
            if (data) {
                document.getElementById('prod-name').value = data.nom;
                document.getElementById('prod-fds').value = data.url_fds || '';
                statusDiv.style.display = 'block';
            } else {
                statusDiv.style.display = 'none';
            }
        }

        // --- SAUVEGARDE ET PARTAGE ---
        async function saveProduct() {
            const name = document.getElementById('prod-name').value;
            const code = document.getElementById('prod-code').value;
            const fdsUrl = document.getElementById('prod-fds').value;

            if(!name) return alert("Veuillez saisir au moins le nom du produit.");

            // 1. Sauvegarde locale pour l'utilisateur
            const newProd = { id: Date.now(), name, code, url_fds: fdsUrl };
            inventory.push(newProd);
            localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));

            // 2. Partage sur le Cloud RESTEV (si code-barres présent)
            // Comme ça, si un collègue scanne le même produit, il a l'URL direct
            if(code) {
                await sb.from('produits_partages').upsert({ 
                    code: code, 
                    nom: name, 
                    url_fds: fdsUrl 
                });
            }

            // Nettoyage et redirection
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-code').value = "";
            document.getElementById('prod-fds').value = "";
            document.getElementById('cloud-status').style.display = 'none';
            
            alert("Produit enregistré et lien partagé !");
            nav('page-list');
        }

        // --- AFFICHAGE LISTE ---
        function renderInventory() {
            const container = document.getElementById('inventory-container');
            if(inventory.length === 0) {
                container.innerHTML = '<div class="text-center text-muted mt-5">Aucun produit dans votre liste.</div>';
                return;
            }

            container.innerHTML = inventory.map(item => `
                <div class="card-custom">
                    <div class="d-flex justify-content-between">
                        <div>
                            <b class="text-uppercase">${item.name}</b><br>
                            <small class="text-muted">Code: ${item.code || 'Saisie manuelle'}</small>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="btn btn-link text-danger p-0"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="mt-3">
                        ${item.url_fds 
                            ? `<a href="${item.url_fds}" target="_blank" class="btn btn-success w-100 fw-bold">
                                <i class="fa-solid fa-file-pdf me-2"></i>DERNIÈRE VERSION FDS
                               </a>` 
                            : `<a href="https://www.google.com/search?q=FDS+${encodeURIComponent(item.name)}" target="_blank" class="btn btn-outline-primary w-100 btn-sm">
                                <i class="fa-solid fa-magnifying-glass me-2"></i>RECHERCHER LA FDS
                               </a>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            if(confirm("Supprimer ce produit de votre liste ?")) {
                inventory = inventory.filter(i => i.id !== id);
                localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
                renderInventory();
            }
        }

        function clearLocal() {
            if(confirm("Vider tout votre inventaire local ?")) {
                inventory = [];
                localStorage.removeItem('restev_inventory_v3');
                renderInventory();
            }
        }
    </script>
</body>
</html>
