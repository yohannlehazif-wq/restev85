<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3065a8">
    <link rel="icon" type="image/png" href="logo_restev_carre.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: 100px; overflow-x: hidden; user-select: none; }
        
        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; font-size: 1.2rem; margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: breathing 2.5s ease-in-out infinite; }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; }
        
        .info-banner { background: #e6a00f; color: #fff; padding: 6px 0; overflow: hidden; white-space: nowrap; font-weight: 700; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.55rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; outline: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s ease-out; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-excel { background-color: #1d6f42; color: white; border: none; border-radius: 12px; width: 100%; padding: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        
        /* Style pour les produits trouvés dans le Cloud */
        .cloud-badge { background: #dcfce7; color: #166534; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-center text-white">
            <img src="logo_restev_carre.png" alt="Logo" style="width: 120px; border-radius: 25px; background: white;">
            <h2 class="fw-bold mt-3">RESTEV 85</h2>
            <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
        </div>
    </div>

    <div class="app-header">
        <img src="logo_restev_long.png" alt="RESTEV 85" class="logo-header">
    </div>

    <div class="info-banner">
        <div class="ticker">
            <span><i class="fa-solid fa-bullhorn me-1"></i> Base de données partagée activée : Scannez, partagez, protégez !</span>
        </div>
    </div>

    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0 mb-3" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
            <h5 class="fw-bold mb-1">Mon Espace Prévention</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Calcul des produits...</p>
        </div>
        
        <div class="row g-2">
            <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e3f2fd;"><i class="fa-solid fa-barcode fa-2x mb-2" style="color: #1e88e5;"></i><br><small class="fw-bold">SCANNER FDS</small></div>
            </div>
            <div class="col-6" onclick="nav('page-list', 'nav-list')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e8f5e9;"><i class="fa-solid fa-boxes-stacked fa-2x mb-2" style="color: #43a047;"></i><br><small class="fw-bold">INVENTAIRE</small></div>
            </div>
            </div>
    </div>

    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Mon Parc Chimique</h5>
        <div class="d-flex gap-2 mb-3">
            <button class="btn-excel flex-grow-1 mb-0" onclick="exportToCSV()"><i class="fa-solid fa-file-csv"></i> EXPORT</button>
            <button class="btn btn-danger flex-grow-1 fw-bold text-white shadow-sm mb-0" onclick="generatePDFProof()" style="border-radius: 12px;"><i class="fa-solid fa-file-pdf"></i> ATTESTATION</button>
        </div>
        <div id="inventory-container"></div>
    </div>

    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3">Ajouter un produit</h5>
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 250px;"></div>
            <button class="btn btn-dark w-100 mt-3 mb-4 py-2" onclick="startScanner()"><i class="fa-solid fa-camera me-2"></i>ACTIVER LA CAMERA</button>
            
            <div id="scan-feedback" class="mb-3 text-center d-none">
                <span class="cloud-badge"><i class="fa-solid fa-cloud"></i> Produit déjà connu dans la base RESTEV</span>
            </div>

            <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
            <input type="text" id="prod-code" class="form-control mb-2" placeholder="Code-barres">
            <input type="text" id="prod-fds" class="form-control mb-3" placeholder="Lien URL de la FDS (optionnel)">
            
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">ENREGISTRER & PARTAGER</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus"></i>AJOUTER</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-list-check"></i>LISTE</button>
    </nav>

    <script>
        const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rbGFyYnphbWZmaGl3YXN4b3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MzI5MzQsImV4cCI6MjA5MzQwODkzNH0.Tjy3Z9Yf9FOn47yKqlqQNC9Xfmy_tMMLkfa4UUFdf6k';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(typeof el === 'string') document.getElementById(el).classList.add('active'); else el.classList.add('active');
            if(id === 'page-list') renderInventory();
        }

        // 1. VERIFIER DANS LE CLOUD LORS DU SCAN
        async function checkCloudProduct(code) {
            const feedback = document.getElementById('scan-feedback');
            const { data, error } = await sb.from('produits_partages').select('*').eq('code', code).single();
            
            if (data) {
                document.getElementById('prod-name').value = data.nom;
                document.getElementById('prod-fds').value = data.url_fds || '';
                feedback.classList.remove('d-none');
            } else {
                feedback.classList.add('d-none');
            }
        }

        function startScanner() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('prod-code').value = text;
                checkCloudProduct(text); // On vérifie si RESTEV connait déjà ce produit
                scanner.stop();
            }).catch(e => console.error(e));
        }

        // 2. ENREGISTRER LOCALEMENT + PARTAGER DANS LE CLOUD
        async function saveProduct() {
            const name = document.getElementById('prod-name').value;
            const code = document.getElementById('prod-code').value;
            const fdsUrl = document.getElementById('prod-fds').value;

            if(!name) return alert("Saisir un nom.");

            // Sauvegarde locale
            const newProd = { id: Date.now(), name, code, url_fds: fdsUrl };
            inventory.push(newProd);
            localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));

            // Partage Cloud (si code présent)
            if(code) {
                await sb.from('produits_partages').upsert({ 
                    code: code, 
                    nom: name, 
                    url_fds: fdsUrl 
                });
            }

            // Reset et Navigation
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-code').value = '';
            document.getElementById('prod-fds').value = '';
            updateStats();
            nav('page-list', 'nav-list');
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = inventory.length ? '' : '<p class="text-center text-muted mt-4">Aucun produit.</p>';
            inventory.forEach(item => {
                container.innerHTML += `
                    <div class="card-custom">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <b>${item.name}</b><br>
                                <small class="text-muted">${item.code || 'Saisie manuelle'}</small>
                            </div>
                            ${item.url_fds ? '<span class="cloud-badge">FDS DISPO</span>' : ''}
                        </div>
                        <div class="mt-2 pt-2 border-top d-flex gap-2">
                            ${item.url_fds ? `<a href="${item.url_fds}" target="_blank" class="btn btn-sm btn-success flex-grow-1"><i class="fa-solid fa-file-pdf"></i> VOIR FDS</a>` : `<a href="https://www.google.com/search?q=FDS+${encodeURIComponent(item.name)}" target="_blank" class="btn btn-sm btn-outline-primary flex-grow-1"><i class="fa-solid fa-magnifying-glass"></i> CHERCHER</a>`}
                            <button onclick="deleteItem(${item.id})" class="btn btn-sm btn-light text-danger"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        function deleteItem(id) {
            inventory = inventory.filter(i => i.id !== id);
            localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
            renderInventory();
            updateStats();
        }

        function updateStats() { document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) enregistrés`; }
        function dismissSplash() { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }
        window.onload = () => { updateStats(); };
    </script>
</body>
</html>
