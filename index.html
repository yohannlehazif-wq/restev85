<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Prévention Maçon</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: #f3f4f6;
  display: flex;
  justify-content: center;
}

.app {
  max-width: 430px;
  width: 100%;
  padding: 16px;
}

/* Carte principale */
.card {
  background: #ffffff;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

/* Titres */
h2 {
  text-align: center;
  margin-top: 0;
  color: #1e3a8a;
}

/* Infos */
.info {
  background: #eef2ff;
  border-radius: 14px;
  padding: 14px;
  font-size: 14px;
  margin-bottom: 20px;
}

/* Bloc risque */
.risque {
  margin-bottom: 28px;
}

.risque-title {
  font-weight: 700;
  margin-bottom: 12px;
  color: #111827;
}

/* Boutons actions */
.action-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 2px solid #c7d2fe;
  background: #f8fafc;
  font-size: 15px;
  margin-bottom: 10px;
  cursor: pointer;
  text-align: left;
}

.action-btn.active {
  background: #dcfce7;
  border-color: #22c55e;
  font-weight: 600;
}

/* Bouton synthèse */
.main-btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

/* Résultat */
.result {
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
  font-weight: 700;
  text-align: center;
}

.good { background:#dcfce7; color:#166534; }
.medium { background:#fef9c3; color:#854d0e; }
.bad { background:#fee2e2; color:#991b1b; }
</style>
</head>

<body>

<div class="app">
  <div class="card">

    <h2>Métier : Maçon</h2>

    <div class="info">
      Appuyez sur les boutons correspondant à ce qui est
      <strong>déjà en place</strong> dans votre entreprise.
    </div>

    <!-- RISQUE -->
    <div class="risque">
      <div class="risque-title">🟠 Chute de hauteur</div>

      <button class="action-btn">Échafaudages conformes</button>
      <button class="action-btn">Garde-corps installés</button>
      <button class="action-btn">Accès sécurisés</button>
      <button class="action-btn">Formation travail en hauteur</button>
      <button class="action-btn">EPI antichute utilisés</button>
    </div>

    <button class="main-btn" onclick="evaluer()">Voir l’état de la prévention</button>

    <div id="result"></div>

  </div>
</div>

<script>
document.querySelectorAll('.action-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
  });
});

function evaluer() {
  const total = document.querySelectorAll('.action-btn').length;
  const actifs = document.querySelectorAll('.action-btn.active').length;
  const ratio = actifs / total;
  const result = document.getElementById('result');

  if (ratio >= 0.7) {
    result.innerHTML = `<div class="result good">
      ✅ Prévention globalement en place
    </div>`;
  } else if (ratio >= 0.4) {
    result.innerHTML = `<div class="result medium">
      🟡 Prévention partiellement en place
    </div>`;
  } else {
    result.innerHTML = `<div class="result bad">
      🔴 Prévention à renforcer
    </div>`;
  }
}
</script>

</body>
</html>
