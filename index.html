<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Prévention Santé au Travail</title>

<style>
/* === THEME RESTEV === */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #edf4ff 75%);
}
.app{
  max-width:640px;
  margin:auto;
  padding:14px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.header img{height:52px;}
.header-title{
  font-size:18px;
  font-weight:700;
  color:#2563eb;
}

/* PAGE */
.page{
  background:#ffffff;
  border-radius:26px;
  box-shadow:0 16px 36px rgba(37,99,235,0.18);
  display:flex;
  flex-direction:column;
  min-height:85vh;
}
.page h2{
  margin:0;
  padding:20px 26px 8px;
  color:#1e3a8a;
}
.page-content{
  padding:0 26px 20px;
  flex:1;
}
.page-actions{
  padding:16px 26px;
  border-top:1px solid #e5e7eb;
}

/* UI */
.info{
  background:#f1f5ff;
  color:#1e3a8a;
  padding:16px;
  border-radius:20px;
  margin-bottom:18px;
  font-size:14px;
}

select,input{
  width:100%;
  padding:14px 16px;
  border-radius:18px;
  border:2px solid #c7d2fe;
  margin-bottom:16px;
  font-size:15px;
}

/* CARTES RISQUES */
.card{
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}

.card h3{
  margin-top:0;
  font-size:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.card-risk{
  background:#eff6ff;
  border-left:6px solid #2563eb;
}
.card-cmr{
  background:#fff1f2;
  border-left:6px solid #dc2626;
}
.card-rps{
  background:#fefce8;
  border-left:6px solid #ca8a04;
}
.card-prev{
  background:#ecfdf5;
  border-left:6px solid #16a34a;
}

ul{
  margin:0;
  padding-left:18px;
}
li{margin-bottom:6px;}

.btn-back{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  font-weight:700;
  background:#e5e7eb;
}
</style>
</head>

<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <img src="logo.png" alt="RESTEV">
  <div class="header-title">Prévention santé au travail</div>
</div>

<!-- PAGE PREVENTION -->
<div class="page">
<h2>Analyse des risques par métier</h2>

<div class="page-content">

<div class="info">
Sélectionnez un métier pour identifier les <strong>risques professionnels</strong>,
les <strong>expositions CMR</strong>, les facteurs de pénibilité
et les <strong>mesures de prévention prioritaires</strong>.<br><br>
⚠️ Outil d’aide à l’évaluation – ne remplace pas le DUERP réglementaire.
</div>

<select id="jobSelect" onchange="showAnalysis()">
  <option value="">— Choisir un métier —</option>
  <option value="macon">Maçon</option>
  <option value="menuisier">Menuisier</option>
  <option value="infirmier">Infirmier</option>
</select>

<div id="analysis"></div>

</div>

<div class="page-actions">
  <button class="btn-back" onclick="location.reload()">← Retour</button>
</div>

</div>
</div>

<script>
/* BASE METIERS – NIVEAU RICHE */
const jobs = {
  macon:{
    risques:[
      "Chutes de hauteur (échafaudages, accès)",
      "Manutentions manuelles lourdes",
      "Bruit et vibrations d’outils"
    ],
    cmr:[
      "Silice cristalline lors des découpes de béton et carrelage"
    ],
    rps:[
      "Fatigue physique importante",
      "Contraintes liées à la météo",
      "Cadence de chantier"
    ],
    prevention:[
      "Protections collectives (garde-corps, échafaudages conformes)",
      "Organisation des postes et des flux",
      "Aspiration des poussières",
      "EPI respiratoires en dernier recours"
    ]
  },

  menuisier:{
    risques:[
      "Machines coupantes (scies, toupies, raboteuses)",
      "Bruit",
      "Manutentions répétées"
    ],
    cmr:[
      "Poussières de bois (CMR reconnu)"
    ],
    rps:[
      "Gestes répétitifs",
      "Pression sur les délais"
    ],
    prevention:[
      "Capotage et carters machines",
      "Aspiration à la source",
      "Formation à l’utilisation des machines",
      "Protection respiratoire si nécessaire"
    ]
  },

  infirmier:{
    risques:[
      "Accidents d’exposition au sang (AES)",
      "Manutention de patients",
      "Horaires décalés"
    ],
    cmr:[
      "Médicaments cytotoxiques",
      "Produits de désinfection"
    ],
    rps:[
      "Charge émotionnelle",
      "Stress professionnel",
      "Fatigue liée aux rythmes"
    ],
    prevention:[
      "Protocoles de soins sécurisés",
      "Aides techniques à la manutention",
      "Organisation des plannings",
      "EPI adaptés (gants, surblouses)"
    ]
  }
};

function showAnalysis(){
  const key = jobSelect.value;
  if(!jobs[key]) return;

  const m = jobs[key];

  analysis.innerHTML = `
    <div class="card card-risk">
      <h3>⚠️ Risques professionnels</h3>
      <ul>${m.risques.map(r=>`<li>${r}</li>`).join("")}</ul>
    </div>

    <div class="card card-cmr">
      <h3>🔴 Expositions CMR</h3>
      <ul>${m.cmr.map(c=>`<li>${c}</li>`).join("")}</ul>
    </div>

    <div class="card card-rps">
      <h3>🧠 Organisation & pénibilité</h3>
      <ul>${m.rps.map(r=>`<li>${r}</li>`).join("")}</ul>
    </div>

    <div class="card card-prev">
      <h3>🛡️ Prévention prioritaire</h3>
      <ul>${m.prevention.map(p=>`<li>${p}</li>`).join("")}</ul>
    </div>
  `;
}
</script>

</body>
</html>
``
