<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 450px;
  margin: auto;
  padding: 20px;
  background: #f3f4f6;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

.btn-main { background:#2563eb; color:white; }
.btn-back { background:#d1d5db; }
</style>
</head>

<body>

<!-- ✅ ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p>Application d’aide à la prévention</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ✅ ACTIVITÉS -->
<div id="activites" class="card" style="display:none;">
  <h2>Votre activité :</h2>

  <button class="btn btn-main" onclick="alerte('BTP')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="alerte('Services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="alerte('Logistique')">Logistique / Transport</button>

  <button class="btn btn-back" onclick="retour()">← Retour</button>
</div>

<script>
function entrer() {
  document.getElementById("accueil").style.display = "none";
  document.getElementById("activites").style.display = "block";
}

function retour() {
  document.getElementById("activites").style.display = "none";
  document.getElementById("accueil").style.display = "block";
}

function alerte(txt) {
  alert("Activité sélectionnée : " + txt);
}
</script>

</body>
</html>
``
