<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV - Prévention Santé au Travail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* COULEURS OFFICIELLES EXTRAITES DU SITE RESTEV.FR */
        :root { 
            --restev-navy: #1a365d;   /* Bleu Marine (Header/Titres) */
            --restev-green: #97c93e;  /* Vert (Boutons/Validation/Vitalité) */
            --restev-bg: #f8fafc;     /* Fond de page neutre */
            --restev-white: #ffffff;
        }

        body { 
            background-color: var(--restev-bg); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #2d3748;
        }

        /* Barre supérieure - Style Institutionnel */
        .navbar { 
            background-color: var(--restev-navy) !important;
            padding: 1rem 0;
            border-bottom: 4px solid var(--restev-green);
        }
        .navbar-brand { font-weight: 700; color: white !important; letter-spacing: 1px; }

        /* Style du Scanner */
        #reader { 
            border: 3px solid var(--restev-navy);
            border-radius: 15px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Cartes de résultats */
        .card-result {
            border: none;
            border-left: 8px solid var(--restev-green);
            background: white;
            border-radius: 12px;
        }
        .card-cmr { border-left-color: #e53e3e; }

        /* Boutons personnalisés */
        .btn-restev-green {
            background-color: var(--restev-green);
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 20px;
            border: none;
            transition: transform 0.2s;
        }
        .btn-restev-green:hover {
            background-color: #82af35;
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-navy {
            border: 2px solid var(--restev-navy);
            color: var(--restev-navy);
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-outline-navy:hover {
            background-color: var(--restev-navy);
            color: white;
        }

        /* Icônes de modules */
        .module-icon { color: var(--restev-green); font-size: 1.5rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

    <nav class="navbar mb-4 shadow">
        <div class="container text-center">
            <span class="navbar-brand mx-auto">RESTEV VENDÉE</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h3 class="mb-4" style="color: var(--restev-navy);">Gestion des Risques Chimiques</h3>
                
                <div id="reader" class="mb-4"></div>

                <div id="result-container" class="d-none animate__animated animate__fadeIn">
                    <div id="product-info" class="card card-result shadow-sm p-4 text-start">
                        </div>
                    <button class="btn btn-outline-navy mt-4 w-100" onclick="resetScanner()">Scanner un nouveau produit</button>
                </div>

                <div class="row g-3 mt-4" id="quick-menu">
                    <div class="col-4">
                        <div class="p-2 bg-white rounded shadow-sm border-top border-4 border-success">
                            <div class="module-icon">📋</div>
                            <small class="fw-bold">DUERP</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 bg-white rounded shadow-sm border-top border-4 border-primary">
                            <div class="module-icon">🛡️</div>
                            <small class="fw-bold">Conseil</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-2 bg-white rounded shadow-sm border-top border-4 border-warning">
                            <div class="module-icon">📞</div>
                            <small class="fw-bold">Urgence</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 p-4 text-muted border-top bg-white">
        <small>Service de Santé au Travail - Réseau Est Vendéen</small><br>
        <strong>restev.fr</strong>
    </footer>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        let databaseProduits = [];
        fetch('produits.json').then(r=>r.json()).then(d=>databaseProduits = d.produits);

        function onScanSuccess(decodedText) {
            const container = document.getElementById('result-container');
            const info = document.getElementById('product-info');
            const menu = document.getElementById('quick-menu');
            
            container.classList.remove('d-none');
            document.getElementById('reader').classList.add('d-none');
            menu.classList.add('d-none');

            const produit = databaseProduits.find(p => p.code === decodedText);

            if (produit) {
                if (produit.cmr) {
                    info.classList.add('card-cmr');
                    info.innerHTML = `
                        <h4 class="text-danger">⚠️ RISQUE CMR</h4>
                        <p class="mb-1"><strong>Nom :</strong> ${produit.nom}</p>
                        <p class="mb-3"><strong>Danger :</strong> ${produit.classement}</p>
                        <div class="p-2 bg-light rounded small mb-3"><strong>Action :</strong> ${produit.conseil}</div>
                        <button class="btn btn-restev-green w-100">Intégrer au Document Unique</button>
                    `;
                } else {
                    info.classList.remove('card-cmr');
                    info.innerHTML = `
                        <h4 style="color: var(--restev-green)">✅ PRODUIT CONFORME</h4>
                        <p class="mb-1"><strong>Nom :</strong> ${produit.nom}</p>
                        <p class="small text-muted">Aucune substance CMR répertoriée dans ce produit.</p>
                    `;
                }
            } else {
                info.innerHTML = `
                    <h4 class="text-muted">PRODUIT NON RÉFÉRENCÉ</h4>
                    <p>Code : ${decodedText}</p>
                    <button class="btn btn-restev-green w-100">Envoyer la FDS au RESTEV</button>
                `;
            }
        }

        function resetScanner() {
            document.getElementById('result-container').classList.add('d-none');
            document.getElementById('reader').classList.remove('d-none');
            document.getElementById('quick-menu').classList.remove('d-none');
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
