<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:480px;
  margin:auto;
  padding:20px;
  background:#f3f4f6;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
h1,h2{text-align:center;color:#2563eb}
.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.btn-main{background:#2563eb;color:white}
.btn-risk{background:#f97316;color:white}
.btn-back{background:#d1d5db}
.info{
  background:#e0f2fe;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  margin:15px 0;
}
.block{margin-top:10px}
.block strong{display:block;margin-bottom:4px}
.priority{
  padding:10px;
  border-radius:8px;
  margin:12px 0;
  font-weight:bold;
  text-align:center;
}
.low{background:#dcfce7;color:#166534}
.mid{background:#fef9c3;color:#854d0e}
.high{background:#ffedd5;color:#9a3412}
.critical{background:#fee2e2;color:#991b1b}
.step{
  background:#f8fafc;
  border-left:4px solid #2563eb;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center">Prévention des risques professionnels</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<div id="activites" class="card" style="display:none">
  <h2>Votre activité</h2>
  <div class="info">
    La priorité aide à savoir par quoi commencer, sans tout faire d’un coup.
  </div>
  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="afficherMetiers('logistique')">Logistique / Transport</button>
  <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

<div id="metiers" class="card" style="display:none"></div>
<div id="risques" class="card" style="display:none"></div>
<div id="detail" class="card" style="display:none"></div>

<script>
const data = {
  btp:{
    "Ouvrier du bâtiment":{
      chute:{
        titre:"Chute de hauteur",
        description:"Travaux sur échafaudages ou en toiture.",
        gravite:4,
        probabilite:3,
        obligations:{
          employeur:"Évaluer le risque et mettre en place des protections collectives.",
          salarie:"Respecter les consignes et utiliser les équipements."
        },
        prevention:{
          suppression:"Éviter le travail en hauteur.",
          substitution:"Méthodes limitant l’accès.",
          collectif:"Garde-corps, échafaudages.",
          organisation:"Formation, planification.",
          epi:"Harnais si nécessaire."
        },
        restev:"RESTEV aide à prioriser et planifier les actions."
      }
    }
  },

  services:{
    "Employé administratif":{
      rps:{
        titre:"Risque psychosocial",
        description:"Charge mentale et stress.",
        gravite:3,
        probabilite:2,
        obligations:{
          employeur:"Évaluer les RPS et adapter l’organisation.",
          salarie:"Exprimer les difficultés."
        },
        prevention:{
          suppression:"Supprimer les surcharges inutiles.",
          substitution:"Réorganisation.",
          collectif:"Temps d’échange.",
          organisation:"Charge équilibrée.",
          epi:"Non applicable."
        },
        restev:"RESTEV accompagne la démarche RPS."
      }
    }
  },

  logistique:{
    "Conducteur / Livreur":{
      routier:{
        titre:"Risque routier",
        description:"Déplacements professionnels fréquents.",
        gravite:4,
        probabilite:2,
        obligations:{
          employeur:"Organiser les tournées.",
          salarie:"Respecter le code de la route."
        },
        prevention:{
          suppression:"Supprimer trajets inutiles.",
          substitution:"Visio si possible.",
          collectif:"Véhicules entretenus.",
          organisation:"Pauses.",
          epi:"Gilet HV."
        },
        restev:"RESTEV structure la prévention du risque routier."
      }
    }
  }
};

function priorite(gravite,prob){
  const score=gravite*prob;
  if(score>=10) return {txt:"🔴 Priorité ÉLEVÉE",cls:"critical"};
  if(score>=7) return {txt:"🟠 Priorité SIGNIFICATIVE",cls:"high"};
  if(score>=4) return {txt:"🟡 Priorité MODÉRÉE",cls:"mid"};
  return {txt:"🟢 Priorité FAIBLE",cls:"low"};
}

function cacherTout(){
  ["accueil","activites","metiers","risques","detail"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function entrer(){cacherTout();activites.style.display="block";}
function retourAccueil(){cacherTout();accueil.style.display="block";}

function afficherMetiers(secteur){
  cacherTout();metiers.style.display="block";
  let html="<h2>Métiers</h2>";
  for(const m in data[secteur]){
    html+=`<button class="btn btn-main" onclick="afficherRisques('${secteur}','${m}')">${m}</button>`;
  }
  html+=`<button class="btn btn-back" onclick="entrer()">← Retour</button>`;
  metiers.innerHTML=html;
}

function afficherRisques(secteur,metier){
  cacherTout();risques.style.display="block";
  let html=`<h2>Risques – ${metier}</h2>`;
  for(const r in data[secteur][metier]){
    html+=`<button class="btn btn-risk" onclick="afficherDetail('${secteur}','${metier}','${r}')">
      ${data[secteur][metier][r].titre}</button>`;
  }
  html+=`<button class="btn btn-back" onclick="afficherMetiers('${secteur}')">← Retour</button>`;
  risques.innerHTML=html;
}

function afficherDetail(secteur,metier,risque){
  cacherTout();detail.style.display="block";
  const d=data[secteur][metier][risque];
  const p=priorite(d.gravite,d.probabilite);

  detail.innerHTML=`
    <h2>${d.titre}</h2>
    <div class="block"><strong>Description</strong>${d.description}</div>

    <div class="priority ${p.cls}">${p.txt}</div>

    <div class="block"><strong>Obligations employeur</strong>${d.obligations.employeur}</div>
    <div class="block"><strong>Obligations salarié</strong>${d.obligations.salarie}</div>

    <div class="block"><strong>Prévention hiérarchisée</strong>
      <div class="step">1️⃣ ${d.prevention.suppression}</div>
      <div class="step">2️⃣ ${d.prevention.substitution}</div>
      <div class="step">3️⃣ ${d.prevention.collectif}</div>
      <div class="step">4️⃣ ${d.prevention.organisation}</div>
      <div class="step">5️⃣ ${d.prevention.epi}</div>
    </div>

    <div class="info"><strong>RESTEV</strong><br>${d.restev}</div>

    <button class="btn btn-back" onclick="afficherRisques('${secteur}','${metier}')">← Retour</button>
  `;
}
</script>

</body>
</html>
