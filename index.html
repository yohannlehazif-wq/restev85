<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin-bottom: 85px; }
        
        /* SPLASH SCREEN */
        #splash { 
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, var(--r-blue), var(--r-teal), var(--r-purple), var(--r-yellow));
            background-size: 400% 400%; animation: gradient 8s ease infinite;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        /* LOGO DYNAMIQUE SI IMAGE ABSENTE */
        .header-brand { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .logo-box { background: var(--r-blue); color: white; padding: 2px 8px; border-radius: 5px; font-weight: 900; }

        .app-header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.65rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }

        .app-page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-custom { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--r-blue); box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        
        /* SGH STYLE */
        .sgh-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sgh-card { background: white; border: 2px solid #eee; border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; }
        .sgh-card i { font-size: 2.5rem; color: #e11d48; margin-bottom: 10px; display: block; }
        .sgh-card b { font-size: 0.8rem; color: #334155; }

        .btn-restev { border-radius: 50px; font-weight: bold; padding: 12px; width: 100%; border: none; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-center bg-white p-5 rounded-5 shadow">
            <div class="header-brand h2 mb-3">
                <span class="logo-box">R</span><span style="color: var(--r-blue); font-weight: 800;">ESTEV 85</span>
            </div>
            <button class="btn btn-primary rounded-pill px-5 fw-bold" onclick="startApp()">LANCER</button>
        </div>
    </div>

    <div class="app-header">
        <div class="header-brand">
            <img src="logo-restev_2.png" height="30" alt="" onerror="this.style.display='none'">
            <span class="logo-box">R</span><span style="color: var(--r-blue); font-weight: 800;">ESTEV</span><span style="color: var(--r-yellow); font-weight: 800;">85</span>
        </div>
    </div>

    <!-- ACCUEIL -->
    <div id="page-home" class="app-page active-page">
        <div class="card-custom" style="background: var(--r-blue); color: white; border: none;">
            <h5>Espace Prévention</h5>
            <p class="small mb-0">Sélectionnez un outil ci-dessous :</p>
        </div>
        
        <div class="row g-2">
            <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-4"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><b>SCAN FDS</b></div>
            </div>
            <div class="col-6" onclick="nav('page-sgh', 'nav-sgh')">
                <div class="card-custom text-center py-4"><i class="fa-solid fa-biohazard fa-2x mb-2 text-danger"></i><br><b>SGH / DANGER</b></div>
            </div>
            <div class="col-12" onclick="nav('page-metiers', 'nav-metiers')">
                <div class="card-custom text-center py-3"><i class="fa-solid fa-helmet-safety fa-xl mb-2 text-success"></i><br><b>GUIDE MÉTIERS (20+)</b></div>
            </div>
        </div>
    </div>

    <!-- PAGE SGH -->
    <div id="page-sgh" class="app-page">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-triangle-exclamation me-2"></i>Symboles de Danger</h5>
        <div class="sgh-container">
            <div class="sgh-card"><i class="fa-solid fa-fire"></i><b>Inflammable</b></div>
            <div class="sgh-card"><i class="fa-solid fa-skull-crossbones"></i><b>Toxique</b></div>
            <div class="sgh-card"><i class="fa-solid fa-burst"></i><b>Explosif</b></div>
            <div class="sgh-card"><i class="fa-solid fa-vial"></i><b>Corrosif</b></div>
            <div class="sgh-card"><i class="fa-solid fa-lungs"></i><b>Danger Santé</b></div>
            <div class="sgh-card"><i class="fa-solid fa-fish"></i><b>Polluant</b></div>
            <div class="sgh-card"><i class="fa-solid fa-circle-exclamation"></i><b>Nocif / Irritant</b></div>
            <div class="sgh-card"><i class="fa-solid fa-wind"></i><b>Gaz sous pression</b></div>
        </div>
    </div>

    <!-- PAGE SCAN -->
    <div id="page-scan" class="app-page">
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 10px;"></div>
            <button class="btn-restev bg-dark text-white mt-3" onclick="startScanner()">SCANNER UN CODE</button>
        </div>
        <div id="res-area" class="d-none">
            <div class="card-custom" style="border-left-color: var(--r-teal);">
                <p>Produit : <b id="res-code"></b></p>
                <a id="fds-link" target="_blank" class="btn-restev bg-danger text-white">VOIR LA FDS (PDF)</a>
            </div>
        </div>
    </div>

    <!-- PAGE METIERS -->
    <div id="page-metiers" class="app-page">
        <h5 class="fw-bold mb-3">Prévention par Métier</h5>
        <div id="metiers-list"></div>
    </div>

    <!-- NAVIGATION -->
    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-barcode"></i>SCAN</button>
        <button id="nav-sgh" class="nav-item" onclick="nav('page-sgh', this)"><i class="fa-solid fa-biohazard"></i>DANGERS</button>
        <button id="nav-metiers" class="nav-item" onclick="nav('page-metiers', this)"><i class="fa-solid fa-helmet-safety"></i>MÉTIERS</button>
    </nav>

    <script>
        const metiers = [
            {m: "Agent d'entretien", r: "Chimique, Chutes", p: "Gants, chaussures sécu"},
            {m: "Boulanger", r: "Farine, Brûlures", p: "Aspiration, gants chaleur"},
            {m: "Carrossier", r: "Solvants, Poussières", p: "Masque A2P3, lunettes"},
            {m: "Coiffeur", r: "Allergies, Postures", p: "Gants, tabouret ergonomique"},
            {m: "Maçon", r: "Manutention, Silice", p: "Casque, gants, genouillères"},
            {m: "Mécanicien", r: "Huiles, Bruit", p: "Fontaine de lavage, bouchons"},
            {m: "Peintre", r: "Chutes, Solvants", p: "Masque, échafaudage conforme"},
            {m: "Soudeur", r: "Fumées, Rayons", p: "Cagoule LCD, aspiration"},
            {m: "Menuisier", r: "Bruit, Coupures", p: "Protections lames, casque"},
            {m: "Infirmier", r: "Bio, TMS", p: "Aide au levage, protocole DASRI"}
            // ... (Liste extensible facilement)
        ];

        function startApp() { document.getElementById('splash').style.display='none'; renderMetiers(); }
        
        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(typeof el === 'string') document.getElementById(el).classList.add('active'); else el.classList.add('active');
        }

        function renderMetiers() {
            document.getElementById('metiers-list').innerHTML = metiers.map(x => `
                <div class="card-custom">
                    <b class="text-primary">${x.m}</b><br>
                    <small>Risques : ${x.r} | Prévention : ${x.p}</small>
                </div>`).join('');
        }

        let sc;
        function startScanner() {
            if(!sc) sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
                document.getElementById('res-code').innerText = t;
                document.getElementById('fds-link').href = `https://www.google.com/search?q=FDS+PDF+${t}`;
                document.getElementById('res-area').classList.remove('d-none');
                sc.stop();
            });
        }
    </script>
</body>
</html>
