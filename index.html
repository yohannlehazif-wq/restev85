<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Prévention Mobile</title>
</head>
<body>

<h1>Prévention Mobile</h1>

<button onclick="afficherRisques()">Technicien maintenance</button>

<div id="resultat"></div>

<script>
  const risksByJob = {
    "Technicien maintenance": ["Chute de hauteur", "CMR", "Électrique", "TMS"],
    "Commercial itinérant": ["Risque routier", "Stress"],
    "Boucher": ["Coupures", "Manutention", "CMR nettoyants"],
    "Coiffeur / Coiffeuse": ["Produits chimiques", "Postures prolongées"]
  };

  const riskDetails = {
    "CMR": "Substances cancérogènes, mutagènes ou toxiques pour la reproduction. Priorité à la substitution, port d’EPI et suivi médical.",
    "Chute de hauteur": "Utiliser protections collectives, harnais et respecter les procédures.",
    "Électrique": "Consignation, habilitation électrique et EPI adaptés.",
    "TMS": "Adapter le poste, limiter les gestes répétitifs et faire des pauses.",
    "Risque routier": "Fatigue, téléphone, vitesse : principale cause d’accident du travail.",
    "Stress": "Charge de travail, organisation et prévention des RPS.",
    "Coupures": "Utilisation de couteaux bien entretenus et gants anti‑coupure.",
    "Manutention": "Gestes et postures, aides mécaniques.",
    "Produits chimiques": "Lire les FDS, ventilation, gants et protections adaptées."
  };

  function showRisks(job) {
    document.getElementById("menu-jobs").style.display = "none";
    const menu = document.getElementById("menu-risks");
    menu.style.display = "block";

    let html = `
      <button class="btn-back" onclick="goBack()">← Retour</button>
      <h2>Risques – ${job}</h2>
    `;

    risksByJob[job].forEach(risk => {
      html += `<button class="btn-risk" onclick="showRiskDetail('${risk}')">${risk}</button>`;
    });

    menu.innerHTML = html;
  }

  function showRiskDetail(risk) {
    const menu = document.getElementById("menu-risks");
    menu.innerHTML = `
      <button class="btn-back" onclick="goBack()">← Retour</button>
      <h2>${risk}</h2>
      <p>${riskDetails[risk] || "Fiche prévention à compléter."}</p>
    `;
  }

  function goBack() {
    document.getElementById("menu-risks").style.display = "none";
    document.getElementById("menu-jobs").style.display = "block";
  }
</script>
