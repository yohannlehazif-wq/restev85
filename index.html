<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RESTEV 85 - Expert Prévention</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3065a8">

<link rel="icon" href="logo_restev_carre.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f6f8fb; margin-bottom:90px; }
.app-page { display:none; padding:15px; }
.active-page { display:block; }
.card { background:white; padding:15px; border-radius:15px; margin-bottom:10px; }
.nav { position:fixed; bottom:10px; left:10px; right:10px; display:flex; gap:5px; background:white; padding:10px; border-radius:20px; }
.nav button { flex:1; border:none; background:none; }
</style>
</head>

<body>

<!-- HOME -->
<div id="page-home" class="app-page active-page">
<div class="card">
<h3>RESTEV 85</h3>
<p id="stats"></p>
</div>

<button onclick="nav('page-scan')">Scanner</button>
<button onclick="nav('page-list')">Inventaire</button>
<button onclick="nav('page-quiz')">Auto diag</button>
<button onclick="nav('page-sgh')">SGH</button>
</div>

<!-- SCAN -->
<div id="page-scan" class="app-page">
<div class="card">
<div id="reader"></div>

<input id="name" placeholder="Nom produit">
<input id="code" placeholder="Code-barres">
<input id="url" placeholder="URL FDS">

<button onclick="saveProduct()">Enregistrer</button>
</div>
</div>

<!-- LIST -->
<div id="page-list" class="app-page">
<div id="list"></div>
<button onclick="generatePDF()">PDF</button>
</div>

<!-- SGH -->
<div id="page-sgh" class="app-page">
<div id="sgh"></div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="nav('page-home')">Accueil</button>
<button onclick="nav('page-scan')">Scan</button>
<button onclick="nav('page-list')">Liste</button>
<button onclick="nav('page-sgh')">SGH</button>
</div>

<script>
// ================= SUPABASE =================
const sb = supabase.createClient(
"https://nklarbzamffhiwasxoph.supabase.co",
"TON_ANON_KEY"
);

// ================= DATA =================
let inventory = JSON.parse(localStorage.getItem("inv")) || [];

// ================= NAV =================
function nav(p){
document.querySelectorAll(".app-page").forEach(e=>e.classList.remove("active-page"));
document.getElementById(p).classList.add("active-page");
if(p==="page-list") renderList();
if(p==="page-sgh") renderSGH();
}

// ================= SAVE =================
function saveProduct(){
const item = {
id:Date.now(),
name:document.getElementById("name").value,
code:document.getElementById("code").value,
url:document.getElementById("url").value
};

inventory.push(item);
localStorage.setItem("inv", JSON.stringify(inventory));

sb.from("inventaire_utilisateurs").insert([item]);

alert("Ajouté");
}

// ================= LIST =================
function renderList(){
document.getElementById("list").innerHTML =
inventory.map(i=>`
<div class="card">
<b>${i.name}</b><br>
<small>${i.code}</small><br>
<a href="${i.url}" target="_blank">FDS</a>
</div>
`).join("");
}

// ================= DELETE =================
function del(id){
inventory = inventory.filter(i=>i.id!==id);
localStorage.setItem("inv", JSON.stringify(inventory));
renderList();
}

// ================= PDF =================
async function generatePDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("Inventaire RESTEV", 10, 10);

doc.autoTable({
startY:20,
head:[["Nom","Code"]],
body:inventory.map(i=>[i.name,i.code])
});

doc.save("inventaire.pdf");
}

// ================= SGH =================
function renderSGH(){
const data=[
{t:"Flamme",d:"Inflammable"},
{t:"Toxique",d:"Danger santé"}
];

document.getElementById("sgh").innerHTML =
data.map(x=>`
<div class="card">
<b>${x.t}</b><br>${x.d}
</div>
`).join("");
}

// ================= SCANNER =================
function startScanner(){
const qr = new Html5Qrcode("reader");

qr.start(
{ facingMode:"environment" },
{ fps:10 },
(text)=>{
document.getElementById("code").value=text;
qr.stop();
}
);
}

// ================= INIT =================
function updateStats(){
document.getElementById("stats").innerText =
inventory.length+" produits";
}

updateStats();
renderList();
</script>

</body>
</html>
