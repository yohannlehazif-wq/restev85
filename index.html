<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body{
  font-family: Arial, sans-serif;
  max-width: 480px;
  margin:auto;
  padding:20px;
  background:#f3f4f6;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
h1,h2{color:#2563eb;text-align:center}
.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.btn-main{background:#2563eb;color:white}
.btn-risk{background:#f97316;color:white}
.btn-back{background:#d1d5db}
.info{
  background:#e0f2fe;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  margin:15px 0;
}
.block{margin-top:10px}
.block strong{display:block;margin-bottom:4px}
.step{
  background:#f8fafc;
  border-left:4px solid #2563eb;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center">Prévention des risques professionnels</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ACTIVITÉS -->
<div id="activites" class="card" style="display:none">
  <h2>Votre activité</h2>
  <div class="info">
    Identifier les risques permet d’agir progressivement, sans jugement.
  </div>
  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="afficherMetiers('logistique')">Logistique / Transport</button>
  <button class="btn btn-back" onclick="retourAccueil()">← Retour</button>
</div>

<!-- METIERS -->
<div id="metiers" class="card" style="display:none"></div>

<!-- RISQUES -->
<div id="risques" class="card" style="display:none"></div>

<!-- DETAIL -->
<div id="detail" class="card" style="display:none"></div>

<script>
// ================= DONNÉES =================
const data = {

  btp: {
    "Ouvrier du bâtiment": {
      chute: {
        titre: "Chute de hauteur",
        description: "Travaux sur échafaudages, toitures ou plateformes.",
        obligations:{
          employeur:"Évaluer le risque et mettre en place des protections collectives.",
          salarie:"Respecter les consignes et utiliser les équipements."
        },
        prevention:{
          suppression:"Éviter le travail en hauteur si possible.",
          substitution:"Méthodes réduisant l’accès en hauteur.",
          collectif:"Garde‑corps, échafaudages conformes.",
          organisation:"Formation et planification.",
          epi:"Harnais si nécessaire."
        },
        restev:"RESTEV accompagne l’analyse et la priorisation des actions."
      }
    },

    "Maçon": {
      silice: {
        titre: "Silice cristalline",
        description: "Poussières lors des découpes de béton ou matériaux.",
        obligations:{
          employeur:"Limiter l’exposition et fournir des protections adaptées.",
          salarie:"Porter les protections respiratoires."
        },
        prevention:{
          suppression:"Éviter les découpes à sec.",
          substitution:"Matériaux moins émissifs.",
          collectif:"Aspiration à la source.",
          organisation:"Limitation du temps d’exposition.",
          epi:"Masques FFP3."
        },
        restev:"RESTEV aide à structurer la prévention du risque chimique."
      }
    }
  },

  services: {
    "Employé administratif": {
      rps: {
        titre: "Risque psychosocial",
        description: "Charge mentale, stress, pression des délais.",
        obligations:{
          employeur:"Évaluer les RPS et adapter l’organisation.",
          salarie:"Signaler les situations de difficulté."
        },
        prevention:{
          suppression:"Supprimer les sources inutiles de pression.",
          substitution:"Réorganisation des tâches.",
          collectif:"Temps d’échange.",
          organisation:"Répartition équilibrée de la charge.",
          epi:"Non applicable."
        },
        restev:"RESTEV accompagne la prévention des RPS."
      }
    }
  },

  logistique: {
    "Conducteur / Livreur": {
      routier: {
        titre: "Risque routier",
        description: "Conduite prolongée et contraintes de livraison.",
        obligations:{
          employeur:"Organiser les tournées et limiter la fatigue.",
          salarie:"Respecter le code de la route."
        },
        prevention:{
          suppression:"Éviter les déplacements inutiles.",
          substitution:"Choisir des véhicules adaptés.",
          collectif:"Entretien régulier.",
          organisation:"Temps de pause.",
          epi:"Gilet haute visibilité."
        },
        restev:"RESTEV structure la prévention du risque routier."
      }
    }
  }
};

// ================= NAVIGATION =================
function cacherTout(){
  ["accueil","activites","metiers","risques","detail"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function entrer(){
  cacherTout();
  document.getElementById("activites").style.display="block";
}

function retourAccueil(){
  cacherTout();
  document.getElementById("accueil").style.display="block";
}

function afficherMetiers(secteur){
  cacherTout();
  const zone=document.getElementById("metiers");
  zone.style.display="block";

  let html="<h2>Métiers</h2>";
  for(const m in data[secteur]){
    html+=`<button class="btn btn-main" onclick="afficherRisques('${secteur}','${m}')">${m}</button>`;
  }
  html+=`<button class="btn btn-back" onclick="entrer()">← Retour activités</button>`;
  zone.innerHTML=html;
}

function afficherRisques(secteur,metier){
  cacherTout();
  const zone=document.getElementById("risques");
  zone.style.display="block";

  let html=`<h2>Risques – ${metier}</h2>`;
  for(const r in data[secteur][metier]){
    html+=`<button class="btn btn-risk" onclick="afficherDetail('${secteur}','${metier}','${r}')">${data[secteur][metier][r].titre}</button>`;
  }
  html+=`<button class="btn btn-back" onclick="afficherMetiers('${secteur}')">← Retour métiers</button>`;
  zone.innerHTML=html;
}

function afficherDetail(secteur,metier,risque){
  cacherTout();
  const d=data[secteur][metier][risque];
  const zone=document.getElementById("detail");
  zone.style.display="block";

  zone.innerHTML=`
    <h2>${d.titre}</h2>

    <div class="block"><strong>Description</strong>${d.description}</div>
    <div class="block"><strong>Obligations employeur</strong>${d.obligations.employeur}</div>
    <div class="block"><strong>Obligations salarié</strong>${d.obligations.salarie}</div>

    <div class="block"><strong>Prévention hiérarchisée</strong>
      <div class="step"><strong>1. Suppression</strong>${d.prevention.suppression}</div>
      <div class="step"><strong>2. Substitution</strong>${d.prevention.substitution}</div>
      <div class="step"><strong>3. Protection collective</strong>${d.prevention.collectif}</div>
      <div class="step"><strong>4. Organisation</strong>${d.prevention.organisation}</div>
      <div class="step"><strong>5. EPI</strong>${d.prevention.epi}</div>
    </div>

    <div class="info"><strong>RESTEV</strong><br>${d.restev}</div>

    <button class="btn btn-back" onclick="afficherRisques('${secteur}','${metier}')">← Retour risques</button>
  `;
}
</script>

</body>
</html>
``
