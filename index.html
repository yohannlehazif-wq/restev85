<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV – Identification CMR</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #edf4ff 75%);
}
.app{
  max-width:620px;
  margin:auto;
  padding:14px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.header img{height:52px;}
.header-title{
  font-size:18px;
  font-weight:700;
  color:#dc2626;
}

/* PAGE */
.page{
  background:#ffffff;
  border-radius:26px;
  box-shadow:0 16px 36px rgba(220,38,38,.18);
  display:flex;
  flex-direction:column;
  min-height:85vh;
}
.page h2{
  margin:0;
  padding:20px 26px 8px;
  color:#991b1b;
}
.page-content{
  padding:0 26px 20px;
  flex:1;
}
.page-actions{
  padding:16px 26px;
  border-top:1px solid #e5e7eb;
}

/* UI */
.info{
  background:#fff1f2;
  color:#991b1b;
  padding:16px;
  border-radius:20px;
  margin-bottom:18px;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  font-weight:700;
  margin-bottom:10px;
}
.btn-scan{background:#dc2626;color:#fff;}
.btn-search{background:#2563eb;color:#fff;}
.btn-back{background:#e5e7eb;}

input{
  width:100%;
  padding:14px 16px;
  border-radius:18px;
  border:2px solid #fecaca;
  margin-bottom:16px;
  font-size:15px;
}

/* CARTES CMR */
.card{
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}
.card-cmr{
  background:#fee2e2;
  border-left:6px solid #dc2626;
}
.card-prev{
  background:#ecfdf5;
  border-left:6px solid #16a34a;
}
.card h3{
  margin-top:0;
  display:flex;
  gap:8px;
}

ul{margin:0;padding-left:18px;}
li{margin-bottom:6px;}

video{
  width:100%;
  border-radius:16px;
  margin-bottom:12px;
}

.hidden{display:none;}
</style>
</head>

<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <img src="logo.png" alt="RESTEV">
  <div class="header-title">Identification des risques CMR</div>
</div>

<div class="page">
<h2>Substances & produits CMR</h2>

<div class="page-content">

<div class="info">
Cette page permet d’identifier <strong>les risques Cancérogènes, Mutagènes
ou Reprotoxiques (CMR)</strong> présents en milieu professionnel.<br><br>
⚠️ Outil d’orientation EPST – ne remplace pas l’évaluation réglementaire.
</div>

<!-- SCAN CODE-BARRES -->
<button class="btn-scan" onclick="startScan()">📷 Scanner un code‑barres</button>
<video id="video" class="hidden"></video>

<!-- RECHERCHE -->
<input id="cmrInput" placeholder="Ex : silice, toluène, white-spirit, formol">
<button class="btn-search" onclick="searchCMR()">Identifier la substance</button>

<div id="cmrResult"></div>

</div>

<div class="page-actions">
<button class="btn-back" onclick="history.back()">← Retour</button>
</div>
</div>

</div>

<script>
/* BASE CMR RICHE */
const cmrDB = {
  "silice":{
    nom:"Silice cristalline",
    type:"Cancérogène avéré",
    usages:"Découpe béton, pierre, carrelage",
    effets:"Silicose, cancers pulmonaires",
    exposition:"Inhalation",
    prevention:[
      "Substitution ou travail humide",
      "Aspiration à la source",
      "Organisation du chantier",
      "Masque FFP3 (dernier recours)"
    ]
  },
  "toluene":{
    nom:"Toluène",
    type:"Reprotoxique suspecté",
    usages:"Peintures, colles, solvants",
    effets:"Atteintes neurologiques, reproduction",
    exposition:"Inhalation",
    prevention:[
      "Substitution si possible",
      "Ventilation renforcée",
      "Limitation des durées",
      "Masque A2P3"
    ]
  },
  "white-spirit":{
    nom:"White‑Spirit",
    type:"Toxique chronique",
    usages:"Peinture, dégraissage",
    effets:"Troubles neurologiques",
    exposition:"Inhalation / contact",
    prevention:[
      "Utilisation peintures à l’eau",
      "Ventilation",
      "Gants",
      "Masque A2P3"
    ]
  },
  "formol":{
    nom:"Formaldéhyde",
    type:"Cancérogène avéré",
    usages:"Laboratoires, désinfection",
    effets:"Cancers ORL",
    exposition:"Inhalation",
    prevention:[
      "Confinement / hotte",
      "Substitution",
      "Procédures strictes",
      "Gants et masque"
    ]
  }
};

function searchCMR(){
  const key = cmrInput.value.toLowerCase();
  const c = cmrDB[key];
  if(!c){
    cmrResult.innerHTML="<div class='card card-cmr'><strong>⚠️ Substance non référencée</strong><br>Analyse EPST recommandée.</div>";
    return;
  }

  cmrResult.innerHTML=`
    <div class="card card-cmr">
      <h3>🔴 ${c.nom}</h3>
      <ul>
        <li><strong>Type :</strong> ${c.type}</li>
        <li><strong>Usages :</strong> ${c.usages}</li>
        <li><strong>Effets :</strong> ${c.effets}</li>
        <li><strong>Exposition :</strong> ${c.exposition}</li>
      </ul>
    </div>

    <div class="card card-prev">
      <h3>🛡️ Prévention prioritaire</h3>
      <ul>${c.prevention.map(p=>`<li>${p}</li>`).join("")}</ul>
    </div>
  `;
}

/* SCAN CODE-BARRES */
async function startScan(){
  if(!("BarcodeDetector" in window)){
    alert("Scan non disponible sur cet appareil");
    return;
  }
  const video = document.getElementById("video");
  video.classList.remove("hidden");

  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  video.srcObject=stream;
  video.play();

  const detector = new BarcodeDetector({formats:["ean_13","ean_8"]});
  const interval=setInterval(async()=>{
    const codes=await detector.detect(video);
    if(codes.length){
      clearInterval(interval);
      stream.getTracks().forEach(t=>t.stop());
      video.classList.add("hidden");
      cmrInput.value=codes[0].rawValue;
      searchCMR();
    }
  },600);
}
</script>

</body>
</html>
``
