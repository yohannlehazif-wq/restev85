<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV</title>

<style>
/* Réinitialisation */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* Page blanche */
body{
  height:100vh;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
}

/* Conteneur logo */
.logo-container{
  text-align:center;
  animation:fadeZoom 2.2s ease-out forwards;
}

/* Logo */
.logo-container img{
  width:180px;        /* ajuste si besoin */
  max-width:60vw;
  animation:pulse 3.5s ease-in-out infinite;
}

/* Animation apparition */
@keyframes fadeZoom{
  0%{
    opacity:0;
    transform:scale(0.92);
  }
  100%{
    opacity:1;
    transform:scale(1);
  }
}

/* Animation respiration légère */
@keyframes pulse{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.04);
  }
  100%{
    transform:scale(1);
  }
}
</style>
</head>

<body>

<div class="logo-container">
  <img src="logo.png" alt="RESTEV">
</div>

</body>
</html>
