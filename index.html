<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3065a8">
    <link rel="icon" type="image/png" href="logo_restev_carre.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RESTEV 85">
    <link rel="apple-touch-icon" href="logo_restev_carre.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --r-blue: #3065a8; 
            --r-teal: #75bba8; 
            --r-purple: #ae227d; 
            --r-yellow: #e6a00f; 
            --r-light: #f8fafc; 
        }

        body { 
            background-color: var(--r-light); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin-bottom: 100px; 
            overflow-x: hidden; 
            user-select: none; 
        }

        /* --- SPLASH SCREEN & ANIMATIONS --- */
        #splash { 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); 
            background-size: 400% 400%; 
            animation: gradientBG 10s ease infinite; 
            transition: 0.8s; 
        }

        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .logo-container {
            position: relative;
            perspective: 1000px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .unique-logo-anim {
            width: 140px;
            height: 140px;
            background: white;
            padding: 12px;
            border-radius: 35px;
            position: relative;
            z-index: 5;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: magneticFloat 6s ease-in-out infinite;
        }

        .logo-container::before, .logo-container::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 140px; height: 140px;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 40px;
            transform: translate(-50%, -50%);
            z-index: 1;
            opacity: 0;
            animation: bioPulse 3s linear infinite;
        }
        .logo-container::after { animation-delay: 1.5s; }

        .laser-scan {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 20%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.8), transparent);
            z-index: 6;
            pointer-events: none;
            animation: scanning 4s linear infinite;
            border-radius: 35px;
        }

        @keyframes magneticFloat {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg) translateY(0); }
            25% { transform: rotateY(15deg) rotateX(10deg) translateY(-10px); }
            50% { transform: rotateY(0deg) rotateX(20deg) translateY(-5px); }
            75% { transform: rotateY(-15deg) rotateX(10deg) translateY(-12px); }
        }

        @keyframes bioPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
        }

        @keyframes scanning { 0% { top: -20%; } 100% { top: 120%; } }

        .btn-enter { 
            background: white; 
            color: var(--r-blue); 
            border: none; 
            padding: 15px 50px; 
            border-radius: 50px; 
            font-weight: 800; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            animation: breathing 2.5s ease-in-out infinite; 
        }

        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .ecg-line { fill: none; stroke: white; stroke-width: 3; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawECG 4s linear infinite; }
        @keyframes drawECG { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }

        /* --- INTERFACE APP --- */
        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; }

        .info-banner { background: #dbeafe; color: #1e3a5f; padding: 3px 0; overflow: hidden; white-space: nowrap; font-weight: 600; font-size: 0.72rem; border-bottom: 1px solid #bfdbfe; }
        .ticker { display: inline-block; animation: ticker 60s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.55rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; outline: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s ease-out; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-excel { background-color: #1d6f42; color: white; border: none; border-radius: 12px; width: 100%; padding: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .score-badge { font-size: 2.5rem; font-weight: 900; color: var(--r-blue); }
        .badge-service { background-color: var(--r-teal); color: white; padding: 4px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>

<div id="splash">
    <div class="splash-content text-center text-white">
        <div class="logo-container">
            <div class="laser-scan"></div>
            <img src="logo_restev_carre.png" alt="RESTEV 85" class="unique-logo-anim" onerror="this.src='https://placehold.co/150x150/ffffff/3065a8?text=RESTEV'">
        </div>
        <h2 class="fw-bold mb-1" style="letter-spacing: 2px;">RESTEV 85</h2>
        <p class="splash-subtitle opacity-75 mb-3">Expert Prévention des Risques</p>
        <div class="ecg-container mb-4">
            <svg viewBox="0 0 200 40" style="width: 150px;">
                <path class="ecg-line" d="M0,20 L40,20 L50,5 L60,35 L70,20 L110,20 L120,5 L130,35 L140,20 L200,20" />
            </svg>
        </div>
        <button class="btn-enter" onclick="dismissSplash()">DÉMARRER</button>
    </div>
</div>

<div class="app-header">
    <img src="logo_restev_long.png" alt="RESTEV 85" class="logo-header" onerror="this.src='https://placehold.co/180x40?text=RESTEV+85'">
</div>

<div class="info-banner">
    <div class="ticker">
        <span>📝 Mise à jour du DUERP  |  💰 Aides CARSAT disponibles  |  🔍 Risque Chimique : Consultez l'INRS  |  🏗️ BTP : Conseils OPPBTP</span>
    </div>
</div>

<div id="page-home" class="app-page active-page">
    <div class="card-custom text-white border-0 mb-3" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
        <h5 class="fw-bold mb-1">RESTEV 85</h5>
        <p id="inv-stats" class="small opacity-75 mb-0">Chargement...</p>
    </div>
    <div class="row g-2">
        <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
            <div class="card-custom text-center py-3 mb-0" style="background-color: #e3f2fd;"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><small class="fw-bold">SCANNER FDS</small></div>
        </div>
        <div class="col-6" onclick="nav('page-quiz', 'nav-quiz')">
            <div class="card-custom text-center py-3 mb-0" style="background-color: #ffebee;"><i class="fa-solid fa-clipboard-question fa-2x mb-2 text-danger"></i><br><small class="fw-bold">AUTO-DIAG</small></div>
        </div>
        <div class="col-6" onclick="nav('page-sgh')">
            <div class="card-custom text-center py-3 mb-0" style="background-color: #fff9c4;"><i class="fa-solid fa-triangle-exclamation fa-2x mb-2 text-warning"></i><br><small class="fw-bold">LEXIQUE SGH</small></div>
        </div>
        <div class="col-6" onclick="nav('page-list', 'nav-list')">
            <div class="card-custom text-center py-3 mb-0" style="background-color: #e8f5e9;"><i class="fa-solid fa-boxes-stacked fa-2x mb-2 text-success"></i><br><small class="fw-bold">INVENTAIRE</small></div>
        </div>
    </div>
</div>

<div id="page-scan" class="app-page">
    <h5 class="fw-bold mb-3">Ajouter un produit</h5>
    <div class="card-custom">
        <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 250px;"></div>
        <button class="btn btn-dark w-100 mt-3 mb-4 py-2" onclick="startScanner()"><i class="fa-solid fa-camera me-2"></i>ACTIVER LA CAMÉRA</button>
        <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
        <input type="text" id="prod-code" class="form-control mb-2" placeholder="Code-barres">
        <input type="url" id="prod-url" class="form-control mb-3" placeholder="Lien PDF FDS">
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow" onclick="saveProduct()">ENREGISTRER</button>
    </div>
</div>

<div id="page-list" class="app-page">
    <h5 class="fw-bold mb-3">Mon Parc Chimique</h5>
    <div class="d-flex gap-2 mb-3">
        <button class="btn-excel flex-grow-1" onclick="exportToCSV()"><i class="fa-solid fa-file-csv"></i> CSV</button>
        <button class="btn btn-danger flex-grow-1 fw-bold text-white" onclick="generatePDFProof()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
    </div>
    <div id="inventory-container"></div>
</div>

<nav class="nav-bottom">
    <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
    <button id="nav-quiz" class="nav-item" onclick="nav('page-quiz', this)"><i class="fa-solid fa-clipboard-check"></i>DIAG</button>
    <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus"></i>AJOUTER</button>
    <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-list-check"></i>LISTE</button>
</nav>

<script>
    const SUPABASE_URL = 'https://nklarbzamffhiwasxoph.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rbGFyYnphbWZmaGl3YXN4b3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MzI5MzQsImV4cCI6MjA5MzQwODkzNH0.Tjy3Z9Yf9FOn47yKqlqQNC9Xfmy_tMMLkfa4UUFdf6k'; 
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];

    function dismissSplash() {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display = 'none'; }, 800);
    }

    function nav(id, el) {
        document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        if(el) el.classList.add('active');
        if(id === 'page-list') renderInventory();
    }

    function renderInventory() {
        const container = document.getElementById('inventory-container');
        container.innerHTML = inventory.length ? '' : '<p class="text-center text-muted mt-4">Inventaire vide.</p>';
        inventory.forEach(item => {
            container.innerHTML += `
            <div class="card-custom">
                <b>${item.name}</b><br><small>${item.code || 'Sans code'}</small>
                <button onclick="deleteItem(${item.id})" class="btn btn-sm text-danger float-end"><i class="fa-solid fa-trash"></i></button>
            </div>`;
        });
    }

    async function saveProduct() {
        const name = document.getElementById('prod-name').value;
        const code = document.getElementById('prod-code').value;
        const fdsUrl = document.getElementById('prod-url').value;
        if(!name) return alert("Nom requis");
        const prod = { id: Date.now(), name, code, fdsUrl };
        inventory.push(prod);
        localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
        await sb.from('inventaire_utilisateurs').insert([{ nom_produit: name, code_barres: code, url_fds: fdsUrl }]);
        nav('page-list', document.getElementById('nav-list'));
    }

    function updateStats() {
        document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) enregistré(s)`;
    }

    window.onload = () => { updateStats(); setTimeout(dismissSplash, 3000); };
</script>

</body>
</html>
