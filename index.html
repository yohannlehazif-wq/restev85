<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>
    
    <!-- Scripts & Bibliothèques -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: 100px; user-select: none; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        /* Header & Nav */
        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; }
        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.6rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }

        /* Pages & Cards */
        .app-page { display: none; padding: 20px 15px; }
        .active-page { display: block !important; }
        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="splash">
    <div class="text-center text-white">
        <h2 class="fw-bold">RESTEV 85</h2>
        <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
    </div>
</div>

<div class="app-header">
    <h5 class="mb-0 fw-bold" style="color: var(--r-blue)">RESTEV 85</h5>
</div>

<!-- PAGE ACCUEIL -->
<div id="page-home" class="app-page active-page">
    <div class="card-custom text-white border-0" style="background: var(--r-blue);">
        <h5 class="fw-bold">Mon Assistant Prévention</h5>
        <p id="inv-stats" class="small opacity-75">Chargement...</p>
    </div>
    <div class="row g-2 mt-2">
        <div class="col-6" onclick="nav('page-scan')"><div class="card-custom text-center"><i class="fa-solid fa-camera fa-2x mb-2 text-primary"></i><br>SCANNER</div></div>
        <div class="col-6" onclick="nav('page-list')"><div class="card-custom text-center"><i class="fa-solid fa-list fa-2x mb-2 text-success"></i><br>INVENTAIRE</div></div>
    </div>
</div>

<!-- PAGE SCAN / AJOUT -->
<div id="page-scan" class="app-page">
    <h5 class="fw-bold mb-3">Ajouter un produit & FDS</h5>
    <div class="card-custom">
        <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
        <label class="small fw-bold mb-1">Document FDS (PDF)</label>
        <input type="file" id="prod-fds" class="form-control mb-3" accept="application/pdf">
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="uploadProduct()">ENREGISTRER SUR LE CLOUD</button>
    </div>
</div>

<!-- PAGE LISTE -->
<div id="page-list" class="app-page">
    <h5 class="fw-bold mb-3">Inventaire Centralisé</h5>
    <div id="inventory-container"></div>
</div>

<!-- NAVIGATION BASSE -->
<nav class="nav-bottom">
    <button class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
    <button class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus"></i>AJOUTER</button>
    <button class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-database"></i>LISTE</button>
</nav>

<script>
    // CONFIGURATION SUPABASE
    const SUPABASE_URL = 'VOTRE_URL_ICI';
    const SUPABASE_KEY = 'VOTRE_CLE_ANON_ICI';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function nav(id, el) {
        document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(id === 'page-list') loadProducts();
    }

    function dismissSplash() {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }

    // FONCTION : ENREGISTRER PRODUIT ET PDF
    async function uploadProduct() {
        const name = document.getElementById('prod-name').value;
        const file = document.getElementById('prod-fds').files[0];

        if (!name || !file) return alert("Nom et PDF obligatoires !");

        try {
            // 1. Upload du PDF dans le Storage
            const fileName = `${Date.now()}_${file.name}`;
            const { data: storageData, error: storageError } = await supabase.storage
                .from('fds_files')
                .upload(fileName, file);

            if (storageError) throw storageError;

            // 2. Récupérer l'URL publique
            const { data: urlData } = supabase.storage.from('fds_files').getPublicUrl(fileName);

            // 3. Enregistrer en base de données
            const { error: dbError } = await supabase
                .from('produits_partages')
                .insert([{ nom: name, fds_url: urlData.publicUrl }]);

            if (dbError) throw dbError;

            alert("Produit et FDS enregistrés !");
            nav('page-list');
        } catch (err) {
            console.error(err);
            alert("Erreur lors de l'enregistrement.");
        }
    }

    // FONCTION : CHARGER LA LISTE
    async function loadProducts() {
        const container = document.getElementById('inventory-container');
        container.innerHTML = "Chargement...";

        const { data, error } = await supabase.from('produits_partages').select('*');

        if (error) return container.innerHTML = "Erreur de chargement.";

        container.innerHTML = data.map(item => `
            <div class="card-custom">
                <div class="d-flex justify-content-between">
                    <b>${item.nom}</b>
                    <a href="${item.fds_url}" target="_blank" class="btn btn-sm btn-outline-primary">
                        <i class="fa-solid fa-file-pdf"></i> Voir FDS
                    </a>
                </div>
            </div>
        `).join('');
    }

    window.onload = () => { if(SUPABASE_URL !== 'VOTRE_URL_ICI') loadProducts(); };
</script>

</body>
</html>
