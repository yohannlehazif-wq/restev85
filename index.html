<!DOCTYPE html>
<html lang="fr">
</title><head>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f3f6fb;
  margin:0;
  padding:30px;
}

h1{
  color:#1e3a8a;
}

.card{
  background:#ffffff;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
  padding:14px 32px;
  font-size:16px;
  font-weight:600;
  border:none;
  border-radius:20px;
  background:#1e3a8a;
  color:#ffffff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Prévention par métier</h1>

<div class="card">
  <label for="metier"><strong>Métier</strong></label><br><br>
  <select id="metier" onchange="changerMesures()">
    <option value="">— Sélectionner —</option>
    <option value="btp">BTP</option>
    <option value="bouche">Métiers de bouche</option>
    <option value="sante">Santé</option>
  </select>
</div>

<div class="card">
  <strong>Mesures actuellement en place</strong>
  <ul id="liste-mesures">
    <li>Sélectionnez un métier pour afficher les mesures</li>
  </ul>
</div>

<div class="card">
  Le RESTEV peut accompagner l’entreprise, à sa demande, dans
  la structuration de sa démarche de prévention.
</div>

<button onclick="alert('BOUTON OK')">
  Bouton visible
</button>

<script>
function changerMesures(){
  var metier = document.getElementById("metier").value;
  var liste = document.getElementById("liste-mesures");

  liste.innerHTML = "";

  if(metier === "btp"){
    liste.innerHTML += "<li>Organisation du chantier</li>";
    liste.innerHTML += "<li>Utilisation des EPI</li>";
  }
  else if(metier === "bouche"){
    liste.innerHTML += "<li>Hygiène alimentaire</li>";
    liste.innerHTML += "<li>Prévention des coupures</li>";
  }
  else if(metier === "sante"){
    liste.innerHTML += "<li>Gestes et postures</li>";
    liste.innerHTML += "<li>Protocoles connus</li>";
  }
  else{
    liste.innerHTML = "<li>Sélectionnez un métier</li>";
  }
}
</script>

</body>
</html>
<meta charset="UTF-8">

</body>
</html>
