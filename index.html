<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#ffffff 0%, #eef7ff 80%);
}
.app{max-width:620px;margin:auto;padding:16px}

.header{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
.header img{height:48px;}
.header-title{font-size:18px;font-weight:bold;color:#3b82f6}

.page{
  display:none;
  background:white;
  border-radius:26px;
  padding:24px;
  box-shadow:0 14px 34px rgba(59,130,246,0.15);
}
.page.active{display:block;}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:14px;
}

.prevention{background:#e0f2fe;color:#1e3a8a}
.cmr{background:#fee2e2;color:#7f1d1d}
.pdp{background:#d1fae5;color:#065f46}
.duerp{background:#ede9fe;color:#4c1d95}
.contact{background:#dcfce7;color:#14532d}
.back{background:#e5e7eb;color:#111}

input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:14px;
  border:2px solid #c7d2fe;
}

.card{
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.card.cmr{background:#fee2e2}
.card.prev{background:#dcfce7}

video{
  width:100%;
  border-radius:14px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  logo.png
  <div class="header-title">Prévention santé au travail</div>
</div>

<div id="home" class="page active">
<h2>Bienvenue sur RESTEV</h2>
<button class="prevention" onclick="openPage('metier')">Prévention par métier</button>
<button class="cmr" onclick="openPage('cmr')">Identification CMR</button>
<button class="pdp" onclick="openPage('pdp')">PDP</button>
<button class="duerp" onclick="openPage('duerp')">DUERP</button>
<button class="contact" onclick="openPage('contact')">Contact</button>
</div>

<div id="metier" class="page">
<h2>Prévention par métier</h2>
<button class="back" onclick="openPage('home')">← Retour</button>
</div>

<div id="cmr" class="page">
<h2>Identification des risques CMR</h2>

<button class="cmr" onclick="startScan()">Scanner un produit (code‑barres)</button>
<video id="video" style="display:none"></video>

<input id="cmrInput" placeholder="Ex : silice, formol, toluène">
<button class="prevention" onclick="searchCMR()">Identifier</button>

<div id="cmrResult"></div>

<button class="back" onclick="openPage('home')">← Retour</button>
</div>

<div id="pdp" class="page"><h2>PDP</h2><button class="back" onclick="openPage('home')">← Retour</button></div>
<div id="duerp" class="page"><h2>DUERP</h2><button class="back" onclick="openPage('home')">← Retour</button></div>
<div id="contact" class="page"><h2>Contact</h2><button class="back" onclick="openPage('home')">← Retour</button></div>

</div>

<script>
function openPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===== BASE CMR ÉTENDUE ===== */
const cmrDB = {
  silice:{nom:"Silice cristalline",effets:"Cancer pulmonaire",prevention:["Aspiration","FFP3","Travail humide"]},
  formol:{nom:"Formaldéhyde",effets:"Cancers ORL",prevention:["Hotte","Substitution","Protection respiratoire"]},
  toluene:{nom:"Toluène",effets:"Atteintes neurologiques",prevention:["Ventilation","Substitution","Masque A2P3"]},
  white_spirit:{nom:"White‑Spirit",effets:"Troubles neurologiques",prevention:["Ventilation","Gants","Masque A2P3"]},
  diesel:{nom:"Gaz d’échappement diesel",effets:"Cancer pulmonaire",prevention:["Réduction source","Ventilation","Organisation circulations"]}
};

function normalize(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function searchCMR(){
  const key=normalize(cmrInput.value);
  const entry=Object.values(cmrDB).find(c=>normalize(c.nom).includes(key));
  if(!entry){
    cmrResult.innerHTML="<div class='card cmr'>Substance non référencée – avis RESTEV recommandé</div>";
    return;
  }
  cmrResult.innerHTML=`
  <div class="card cmr"><strong>${entry.nom}</strong><br>${entry.effets}</div>
  <div class="card prev"><strong>Prévention :</strong><ul>${entry.prevention.map(p=>`<li>${p}</li>`).join("")}</ul></div>`;
}

async function startScan(){
  if(!("BarcodeDetector" in window)){alert("Scan non disponible");return;}
  const v=document.getElementById("video");
  v.style.display="block";
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  v.srcObject=stream;await v.play();
  const detector=new BarcodeDetector();
  const loop=setInterval(async()=>{
    const codes=await detector.detect(v);
    if(codes.length){
      clearInterval(loop);
      stream.getTracks().forEach(t=>t.stop());
      v.style.display="none";
      cmrInput.value=codes[0].rawValue;
      searchCMR();
    }
  },800);
}
</script>

</body>
</html>
