<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Assistant Prévention Connecté</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --restev-blue: #3d7cc0; --restev-violet: #a74b9e; --restev-green: #97c93e; --restev-bg: #f8fafc; }
        body { background-color: var(--restev-bg); font-family: 'Segoe UI', sans-serif; padding-bottom: 100px; }
        .header-restev { background: white; border-bottom: 5px solid var(--restev-blue); padding: 15px; }
        .logo-img { max-height: 60px; }
        .nav-link { color: #666; font-weight: 600; border: none !important; }
        .nav-link.active { color: var(--restev-blue) !important; border-bottom: 4px solid var(--restev-blue) !important; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; margin-bottom: 15px; }
        .btn-restev { background: var(--restev-blue); color: white; border-radius: 10px; font-weight: bold; }
        .btn-iprp { background-color: var(--restev-violet); color: white; font-weight: bold; border-radius: 10px; border: none; }
        .btn-iprp:hover { background-color: #8e3e86; color: white; }
        .metier-card { cursor: pointer; border-left: 5px solid var(--restev-green) !important; transition: 0.2s; }
        footer { font-size: 0.75rem; background: white; border-top: 1px solid #eee; z-index: 1000; }
    </style>
</head>
<body>

    <header class="header-restev text-center">
        <img src="1000009663.jpg" alt="RESTEV 85" class="logo-img" onerror="this.style.display='none'">
        <h6 class="mb-0 fw-bold" style="color: var(--restev-blue);">Assistant Prévention Connecté</h6>
    </header>

    <ul class="nav nav-tabs sticky-top justify-content-center bg-white" id="mainTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#scan-content">🔍 Scan</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#duerp-content">📋 DUERP</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#metier-content">👷 Métiers</button></li>
    </ul>

    <div class="container tab-content mt-3">
        
        <div class="tab-pane fade show active" id="scan-content">
            <div id="reader"></div>
            <div id="result-container" class="d-none mt-3">
                <div id="product-info" class="card card-custom p-4"></div>
                <button class="btn btn-outline-secondary w-100 mt-2" onclick="resetScanner()">Nouvelle analyse</button>
            </div>
            <div class="mt-4 p-3 card-custom text-center border-start border-4 border-primary">
                <h6 class="text-primary fw-bold">Un doute sur un risque ?</h6>
                <p class="small text-muted">Sollicitez l'appui d'un expert IPRP du RESTEV 85.</p>
                <button class="btn btn-iprp w-100 py-2" onclick="contacterIPRP()">🤝 Demander un conseil IPRP</button>
            </div>
        </div>

        <div class="tab-pane fade" id="duerp-content">
            <div class="card card-custom p-3">
                <h6 class="text-primary border-bottom pb-2">Inventaire & Actions</h6>
                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <thead class="table-light small">
                            <tr><th>Produit</th><th>UT</th><th>État</th><th></th></tr>
                        </thead>
                        <tbody id="duerp-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="metier-content">
            <div class="card card-custom p-3 metier-card mb-2" onclick="ouvrirFicheMetier('BTP', 'Poussières, Silice, Bruit.', 'Aspiration, protections auditives.')">🏗️ BTP</div>
            <div class="card card-custom p-3 metier-card mb-2" onclick="ouvrirFicheMetier('Garage', 'Huiles, Gaz, Solvants.', 'Gants Nitrile, Ventilation.')">🚗 Automobile</div>
            <div class="card card-custom p-3 metier-card mb-2" onclick="ouvrirFicheMetier('Menuiserie', 'Poussières de bois (CMR), Colles.', 'Aspiration à la source (ED6344).')">🪵 Menuiserie</div>
        </div>
    </div>

    <div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header" style="background: var(--restev-blue); color: white;">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <footer class="text-center p-3 fixed-bottom">
        <strong>RESTEV 85</strong> | <small>Votre service de santé au travail</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        let inventaireLocal = JSON.parse(localStorage.getItem('restev_duerp')) || [];
        let databaseProduits = [];
        const modal = new bootstrap.Modal(document.getElementById('mainModal'));

        fetch('produits.json').then(r => r.json()).then(d => { databaseProduits = d.produits; afficherInventaire(); });

        // FONCTION DE CONTACT IPRP
        function contacterIPRP() {
            const email = "prevention@restev.fr"; // À adapter
            const sujet = encodeURIComponent("Demande de conseil prévention - Application mobile");
            const corps = encodeURIComponent("Bonjour,\n\nSouhaitant approfondir l'évaluation de mes risques professionnels, je sollicite un contact avec un préventeur IPRP.\n\nDerniers produits scannés :\n" + 
                inventaireLocal.map(p => `- ${p.nom} (UT: ${p.ut})`).join("\n") + 
                "\n\nCordialement.");
            
            window.location.href = `mailto:${email}?subject=${sujet}&body=${corps}`;
        }

        function ouvrirFicheMetier(titre, risques, prev) {
            document.getElementById('modalTitle').innerText = titre;
            document.getElementById('modalBody').innerHTML = `<h6>Risques :</h6><p class="small">${risques}</p><h6>Prévention :</h6><p class="small text-success">${prev}</p>`;
            modal.show();
        }

        function onScanSuccess(decodedText) {
            const info = document.getElementById('product-info');
            document.getElementById('reader').classList.add('d-none');
            document.getElementById('result-container').classList.remove('d-none');
            const p = databaseProduits.find(x => x.code === decodedText);
            if(p) {
                info.innerHTML = `<h6>${p.nom}</h6><p class="small text-muted italic">${p.conseil}</p>
                <button class="btn btn-restev btn-sm w-100" onclick="ajouter('${p.nom}',${p.cmr})">Ajouter au DUERP</button>`;
            } else { info.innerHTML = `<p>Produit inconnu</p>`; }
        }

        function ajouter(nom, cmr) {
            const ut = prompt("Unité de Travail :") || "Non défini";
            inventaireLocal.push({nom, cmr, ut, action: "À évaluer"});
            localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal));
            afficherInventaire();
            resetScanner();
        }

        function afficherInventaire() {
            const list = document.getElementById('duerp-list');
            list.innerHTML = inventaireLocal.length ? "" : "<tr><td colspan='4' class='text-center p-3'>Aucune donnée.</td></tr>";
            inventaireLocal.forEach((p, i) => {
                list.innerHTML += `<tr class="small">
                    <td><strong>${p.nom}</strong><br><span class="badge ${p.cmr?'bg-danger':'bg-success'}">${p.cmr?'CMR':'OK'}</span></td>
                    <td>${p.ut}</td>
                    <td><select class="form-select form-select-sm" onchange="updateAction(${i}, this.value)">
                        <option ${p.action==='À évaluer'?'selected':''}>À évaluer</option>
                        <option ${p.action==='En cours'?'selected':''}>En cours</option>
                        <option ${p.action==='Maîtrisé'?'selected':''}>Maîtrisé</option>
                    </select></td>
                    <td><button class="btn btn-sm text-muted" onclick="suppr(${i})">🗑️</button></td>
                </tr>`;
            });
        }

        function updateAction(i, val) { inventaireLocal[i].action = val; localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal)); }
        function suppr(i) { inventaireLocal.splice(i,1); localStorage.setItem('restev_duerp', JSON.stringify(inventaireLocal)); afficherInventaire(); }
        function resetScanner() { document.getElementById('result-container').classList.add('d-none'); document.getElementById('reader').classList.remove('d-none'); }
        
        new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }).render(onScanSuccess);
    </script>
</body>
</html>
