<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Prévention Active</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue-restev: #2c5da7; --green-restev: #8ec641; --bg-light: #f4f7f9; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; color: #333; margin: 0; }
        
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .app-header { background: white; padding: 10px; text-align: center; border-bottom: 3px solid var(--blue-restev); position: sticky; top: 0; z-index: 1000; display: none; }
        .app-page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active-page { display: block !important; }

        .menu-card {
            background: white; border: none; border-radius: 20px; padding: 25px;
            display: flex; align-items: center; text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; margin-bottom: 15px;
        }
        
        .card-expert { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-left: 6px solid var(--blue-restev); }
        .btn-back { background: #e2e8f0; border: none; border-radius: 12px; padding: 10px 20px; margin-bottom: 20px; }
        
        /* Style du scanner */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 20px; }
        .search-box { border-radius: 15px; padding: 15px; border: 2px solid #e2e8f0; width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="landing-page">
        <img src="logo.png" style="width:250px;" alt="RESTEV 85" onerror="this.src='https://via.placeholder.com/200?text=RESTEV+85'">
        <h4 class="fw-bold mt-3">Santé au Travail</h4>
        <p class="text-muted">La Roche-sur-Yon | Les Essarts | Montaigu | Les Herbiers</p>
        <button class="btn btn-primary px-5 py-3 rounded-pill fw-bold mt-4" onclick="startApp()">ACCÉDER</button>
    </div>

    <div class="app-header" id="app-header">
        <img src="logo.png" style="height: 45px;" alt="RESTEV">
    </div>

    <div id="page-menu" class="app-page">
        <h5 class="fw-bold mb-4">Votre Assistant Prévention</h5>
        <button class="menu-card" onclick="showPage('page-scan')">
            <div style="font-size: 1.6rem; margin-right: 15px;">🔍</div>
            <div><b>Scanner un Produit</b><span>Appareil photo ou recherche</span></div>
        </button>
        <button class="menu-card" onclick="showPage('page-metiers')">
            <div style="font-size: 1.6rem; margin-right: 15px;">👷</div>
            <div><b>Référentiel Métiers</b><span>Fiches INRS & CARSAT</span></div>
        </button>
    </div>

    <div id="page-scan" class="app-page">
        <button class="btn-back" onclick="stopScannerAndBack()">← Retour</button>
        <h5 class="fw-bold mb-3">Identifier un risque</h5>
        
        <div id="reader"></div>
        
        <input type="text" id="searchInput" class="search-box" placeholder="Ou tapez le nom (ex: Acetone, Ciment...)" onkeyup="chercherProduit(this.value)">
        
        <div id="resultat-produit" class="animate__animated animate__fadeIn d-none">
            <div class="card-expert" style="border-color: #dc2626;">
                <h6 class="fw-bold" id="p-title">Produit</h6>
                <p class="small"><b>⚠️ Risques :</b> <span id="p-risques"></span></p>
                <div class="p-3 bg-light rounded-3 small border-start border-3 border-success">
                    <b class="text-success">✅ Prévention :</b> <span id="p-prevention"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="page-metiers" class="app-page">
        <button class="btn-back" onclick="showPage('page-menu')">← Retour</button>
        <h5 class="fw-bold mb-4">Prévention par Branche</h5>
        <div class="card-expert">
            <h6 class="fw-bold">Menuiserie & Travail du bois</h6>
            <p class="small">Poussières de bois (CMR), coupures, bruit.</p>
            <div class="p-2 bg-light rounded small"><b>INRS (ED 6348) :</b> Captage à la source.</div>
        </div>
    </div>

    <script>
        let html5QrCode;

        // Base de données simplifiée
        const db_prevention = {
            "acetone": { nom: "Acétone", risques: "Inflammable, vapeurs irritantes.", prevention: "Ventilation, gants Butyle, masque type A." },
            "ciment": { nom: "Ciment / Béton", risques: "Brûlures (Chrome VI), Silice.", prevention: "Gants étanches, lunettes, travail à l'humide." },
            "javel": { nom: "Eau de Javel", risques: "Corrosif, Gaz toxique avec acide.", prevention: "Ne pas mélanger, gants PVC, lunettes." }
        };

        function startApp() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('app-header').style.display = 'block';
            showPage('page-menu');
        }

        function showPage(p) {
            document.querySelectorAll('.app-page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            if(p === 'page-scan') startScanner();
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Si on scanne un texte/code, on cherche dans la base
                chercherProduit(decodedText);
            }).catch((err) => {
                console.error("Erreur caméra : ", err);
            });
        }

        function stopScannerAndBack() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => { showPage('page-menu'); }).catch(() => { showPage('page-menu'); });
            } else { showPage('page-menu'); }
        }

        function chercherProduit(val) {
            let key = val.toLowerCase().trim();
            let resDiv = document.getElementById('resultat-produit');
            
            if (db_prevention[key]) {
                let p = db_prevention[key];
                document.getElementById('p-title').innerText = p.nom;
                document.getElementById('p-risques').innerText = p.risques;
                document.getElementById('p-prevention').innerText = p.prevention;
                resDiv.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
