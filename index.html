<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Prévention</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:480px;
  margin:auto;
  padding:20px;
  background:#f3f4f6;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
h1,h2{text-align:center;color:#2563eb}
.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.btn-main{background:#2563eb;color:white}
.btn-risk{background:#f97316;color:white}
.btn-back{background:#d1d5db}
.info{
  background:#e0f2fe;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  margin:15px 0;
}
.block{margin-top:10px}
.block strong{display:block;margin-bottom:4px}
.priority{
  padding:10px;
  border-radius:8px;
  margin:12px 0;
  font-weight:bold;
  text-align:center;
}
.low{background:#dcfce7;color:#166534}
.mid{background:#fef9c3;color:#854d0e}
.high{background:#ffedd5;color:#9a3412}
.critical{background:#fee2e2;color:#991b1b}
.step{
  background:#f8fafc;
  border-left:4px solid #2563eb;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
}
ul{padding-left:20px}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div id="accueil" class="card">
  <h1>RESTEV</h1>
  <p style="text-align:center">Prévention des risques professionnels</p>
  <button class="btn btn-main" onclick="entrer()">🚀 Entrer</button>
</div>

<!-- ACTIVITÉS -->
<div id="activites" class="card" style="display:none">
  <h2>Votre activité</h2>
  <div class="info">
    Cette application aide à prioriser les actions de prévention.
    Il n’est pas nécessaire de tout faire en même temps.
  </div>
  <button class="btn btn-main" onclick="afficherMetiers('btp')">BTP / Chantier</button>
  <button class="btn btn-main" onclick="afficherMetiers('services')">Commerce & Services</button>
  <button class="btn btn-main" onclick="afficherMetiers('logistique')">Logistique / Transport</button>
</div>

<div id="metiers" class="card" style="display:none"></div>
<div id="risques" class="card" style="display:none"></div>
<div id="detail" class="card" style="display:none"></div>

<script>
// ---------------- DONNÉES ----------------
const data = {
  btp:{
    "Maçon":{
      chute:{
        titre:"Chute de hauteur",
        description:"Travaux sur échafaudages, planchers ou zones en élévation.",
        gravite:4,
        probabilite:3,
        obligations:{
          employeur:"Sécuriser les accès et les protections collectives.",
          salarie:"Respecter les consignes et utiliser les équipements."
        },
        prevention:{
          suppression:"Éviter le travail en hauteur lorsque c’est possible.",
          substitution:"Méthodes limitant l’élévation.",
          collectif:"Garde‑corps, échafaudages conformes.",
          organisation:"Formation et planification.",
          epi:"Harnais si nécessaire."
        },
        restev:"RESTEV accompagne la hiérarchisation et le suivi."
      },

      silice:{
        titre:"Silice cristalline",
        description:"Poussières générées lors des découpes de béton.",
        gravite:4,
        probabilite:4,
        obligations:{
          employeur:"Limiter l’exposition et fournir des protections adaptées.",
          salarie:"Porter les protections respiratoires."
        },
        prevention:{
          suppression:"Supprimer les découpes à sec.",
          substitution:"Matériaux moins émissifs.",
          collectif:"Aspiration à la source.",
          organisation:"Limitation du temps d’exposition.",
          epi:"Masques FFP3."
        },
        restev:"RESTEV aide à structurer la prévention du risque chimique."
      }
    }
  },

  services:{
    "Employé administratif":{
      rps:{
        titre:"Risque psychosocial",
        description:"Charge mentale, stress, pression organisationnelle.",
        gravite:3,
        probabilite:2,
        obligations:{
          employeur:"Évaluer les RPS et adapter l’organisation.",
          salarie:"Signaler les difficultés."
        },
        prevention:{
          suppression:"Supprimer les surcharges inutiles.",
          substitution:"Réorganisation des tâches.",
          collectif:"Temps d’échange.",
          organisation:"Charge de travail équilibrée.",
          epi:"Non applicable."
        },
        restev:"RESTEV accompagne la prévention des RPS."
      }
    }
  },

  logistique:{
    "Conducteur / Livreur":{
      routier:{
        titre:"Risque routier",
        description:"Déplacements professionnels fréquents.",
        gravite:4,
        probabilite:2,
        obligations:{
          employeur:"Organiser les tournées.",
          salarie:"Respecter le code de la route."
        },
        prevention:{
          suppression:"Éviter les déplacements inutiles.",
          substitution:"Choisir des véhicules adaptés.",
          collectif:"Entretien des véhicules.",
          organisation:"Temps de pause.",
          epi:"Gilet haute visibilité."
        },
        restev:"RESTEV structure la prévention du risque routier."
      }
    }
  }
};

// ---------------- LOGIQUE ----------------
function priorite(g,p){
  const s=g*p;
  if(s>=10) return {t:"🔴 Priorité ÉLEVÉE",c:"critical"};
  if(s>=7) return {t:"🟠 Priorité SIGNIFICATIVE",c:"high"};
  if(s>=4) return {t:"🟡 Priorité MODÉRÉE",c:"mid"};
  return {t:"🟢 Priorité FAIBLE",c:"low"};
}

function cacherTout(){
  ["accueil","activites","metiers","risques","detail"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function entrer(){cacherTout();activites.style.display="block";}

function afficherMetiers(sec){
  cacherTout();metiers.style.display="block";
  let h="<h2>Métiers</h2>";
  for(const m in data[sec]){
    h+=`<button class="btn btn-main" onclick="afficherRisques('${sec}','${m}')">${m}</button>`;
  }
  metiers.innerHTML=h;
}

function afficherRisques(sec,m){
  cacherTout();risques.style.display="block";
  let h=`<h2>Risques – ${m}</h2>
    <button class="btn btn-main" onclick="afficherRisquesPrioritaires('${sec}','${m}')">🎯 Risques prioritaires</button>
    <button class="btn btn-main" onclick="afficherPlanActions('${sec}','${m}')">✅ Plan d’actions prioritaires</button>`;
  for(const r in data[sec][m]){
    h+=`<button class="btn btn-risk" onclick="afficherDetail('${sec}','${m}','${r}')">${data[sec][m][r].titre}</button>`;
  }
  risques.innerHTML=h;
}

function afficherRisquesPrioritaires(sec,m){
  cacherTout();risques.style.display="block";
  let h=`<h2>Risques prioritaires – ${m}</h2>`;
  let ok=false;
  for(const r in data[sec][m]){
    const d=data[sec][m][r];
    if(d.gravite*d.probabilite>=7){
      ok=true;
      h+=`<button class="btn btn-risk" onclick="afficherDetail('${sec}','${m}','${r}')">${d.titre}</button>`;
    }
  }
  if(!ok) h+=`<div class="info">Aucun risque prioritaire identifié.</div>`;
  risques.innerHTML=h;
}

function afficherPlanActions(sec,m){
  cacherTout();detail.style.display="block";
  let h=`<h2>Plan d’actions prioritaires</h2><div class="info">Actions concrètes réalisables immédiatement.</div>`;
  for(const r in data[sec][m]){
    const d=data[sec][m][r];
    if(d.gravite*d.probabilite>=7){
      h+=`<div class="block"><strong>${d.titre}</strong>
      <ul>
        <li>${d.prevention.suppression}</li>
        <li>${d.prevention.substitution}</li>
        <li>${d.prevention.collectif}</li>
        <li>${d.prevention.organisation}</li>
        <li>${d.prevention.epi}</li>
      </ul></div>`;
    }
  }
  h+=`<div class="info"><strong>RESTEV</strong><br>Accompagnement possible pour le suivi DUERP.</div>`;
  detail.innerHTML=h;
}

function afficherDetail(sec,m,r){
  cacherTout();detail.style.display="block";
  const d=data[sec][m][r];
  const p=priorite(d.gravite,d.probabilite);
  detail.innerHTML=`
    <h2>${d.titre}</h2>
    <div class="block">${d.description}</div>
    <div class="priority ${p.c}">${p.t}</div>
    <div class="block"><strong>Employeur</strong>${d.obligations.employeur}</div>
    <div class="block"><strong>Salarié</strong>${d.obligations.salarie}</div>
    <div class="info">${d.restev}</div>`;
}
</script>

</body>
</html>
