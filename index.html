<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3065a8">
    <link rel="icon" type="image/png" href="logo_restev_carre.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RESTEV 85">
    <link rel="apple-touch-icon" href="logo_restev_carre.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: 100px; overflow-x: hidden; user-select: none; }
        
        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f); background-size: 400% 400%; animation: gradientBG 10s ease infinite; transition: 0.8s; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .btn-enter { background: white; color: var(--r-blue); border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; font-size: 1.2rem; margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: breathing 2.5s ease-in-out infinite; }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; }
        
        .info-banner { background: #e6a00f; color: #fff; padding: 6px 0; overflow: hidden; white-space: nowrap; font-weight: 700; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        .ticker span { padding-right: 50px; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.55rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; outline: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.3s ease-out; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="text-center text-white">
            <img src="logo_restev_carre.png" alt="Logo" style="width: 120px; border-radius: 25px; background: white;" onerror="this.src='https://placehold.co/120x120/ffffff/3065a8?text=RESTEV'">
            <h2 class="fw-bold mt-3">RESTEV 85</h2>
            <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
        </div>
    </div>

    <div class="app-header">
        <img src="logo_restev_long.png" alt="RESTEV 85" class="logo-header" onerror="this.src='https://placehold.co/180x40?text=RESTEV+85'">
    </div>

    <div class="info-banner">
        <div class="ticker">
            <span><i class="fa-solid fa-bullhorn me-1"></i> CARSAT : Subventions disponibles | <i class="fa-solid fa-circle-info me-1"></i> RESTEV : Pensez à votre DUERP !</span>
        </div>
    </div>

    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0 mb-3" style="background: linear-gradient(135deg, var(--r-blue), #1e40af);">
            <h5 class="fw-bold mb-1">Mon Tableau de Bord</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Chargement...</p>
        </div>
        <div class="row g-2">
            <div class="col-6" onclick="nav('page-scan', 'nav-scan')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e3f2fd;"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><small class="fw-bold">SCANNER FDS</small></div>
            </div>
            <div class="col-6" onclick="nav('page-list', 'nav-list')">
                <div class="card-custom text-center py-3 mb-0" style="background-color: #e8f5e9;"><i class="fa-solid fa-boxes-stacked fa-2x mb-2 text-success"></i><br><small class="fw-bold">INVENTAIRE</small></div>
            </div>
        </div>
    </div>

    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3">Ajouter un produit</h5>
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 250px;"></div>
            <div class="d-flex gap-2 mt-3 mb-4">
                <button id="btn-start-scan" class="btn btn-dark flex-grow-1 py-2" onclick="startScanner()"><i class="fa-solid fa-camera me-2"></i>OUVRIR CAMÉRA</button>
                <button id="btn-stop-scan" class="btn btn-outline-danger" onclick="stopScanner()" style="display:none;">FERMER</button>
            </div>
            <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
            <input type="text" id="prod-code" class="form-control mb-3" placeholder="Code détecté">
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">ENREGISTRER</button>
        </div>
    </div>

    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Mon Parc Chimique</h5>
        <div class="d-flex gap-2 mb-3">
            <button class="btn btn-success flex-grow-1" onclick="exportToCSV()"><i class="fa-solid fa-file-csv"></i> EXPORT</button>
            <button class="btn btn-danger flex-grow-1" onclick="generatePDFProof()">PDF</button>
        </div>
        <div id="inventory-container"></div>
    </div>

    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-plus"></i>AJOUTER</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-list-check"></i>LISTE</button>
    </nav>

    <script>
        let inventory = JSON.parse(localStorage.getItem('restev_inventory_v3')) || [];
        let html5QrCode = null;

        // Navigation
        function nav(id, el) {
            if (html5QrCode && html5QrCode.isScanning) stopScanner();
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(typeof el === 'string') document.getElementById(el).classList.add('active');
            else el.classList.add('active');
            if(id === 'page-list') renderInventory();
        }

        // Logique Scanner
        async function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
            
            document.getElementById('btn-start-scan').style.display = 'none';
            document.getElementById('btn-stop-scan').style.display = 'block';

            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                document.getElementById('prod-code').value = text;
                if (navigator.vibrate) navigator.vibrate(100);
                stopScanner();
            }).catch(err => {
                alert("Erreur Caméra : Vérifiez les autorisations du navigateur.");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('btn-start-scan').style.display = 'block';
                    document.getElementById('btn-stop-scan').style.display = 'none';
                }).catch(() => {
                    document.getElementById('btn-start-scan').style.display = 'block';
                    document.getElementById('btn-stop-scan').style.display = 'none';
                });
            }
        }

        // Inventaire
        function saveProduct() {
            const name = document.getElementById('prod-name').value;
            if(!name) return alert("Saisir un nom.");
            inventory.push({ id: Date.now(), name, code: document.getElementById('prod-code').value });
            localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
            document.getElementById('prod-name').value = ''; 
            document.getElementById('prod-code').value = '';
            updateStats(); nav('page-list', 'nav-list');
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = inventory.length ? '' : '<p class="text-center text-muted">Vide.</p>';
            inventory.forEach(item => {
                container.innerHTML += `<div class="card-custom d-flex justify-content-between">
                    <div><b>${item.name}</b><br><small>${item.code || '-'}</small></div>
                    <button onclick="deleteItem(${item.id})" class="btn btn-sm text-danger"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
        }

        function deleteItem(id) {
            if(confirm("Supprimer ?")) {
                inventory = inventory.filter(i => i.id !== id);
                localStorage.setItem('restev_inventory_v3', JSON.stringify(inventory));
                renderInventory(); updateStats();
            }
        }

        function updateStats() {
            document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) enregistrés`;
        }

        function dismissSplash() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
        }

        function exportToCSV() {
            let csv = "data:text/csv;charset=utf-8,\uFEFFNom;Code\r\n" + inventory.map(i => `${i.name};${i.code}`).join("\r\n");
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", "Inventaire.csv"); link.click();
        }

        function generatePDFProof() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Inventaire Produits Chimiques", 14, 20);
            doc.autoTable({ startY: 30, head: [['Nom', 'Code']], body: inventory.map(i => [i.name, i.code]) });
            doc.save("Inventaire.pdf");
        }

        window.onload = updateStats;
    </script>
</body>
</html>
