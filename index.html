<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --r-blue: #3065a8; --r-teal: #75bba8; --r-purple: #ae227d; --r-yellow: #e6a00f; --r-light: #f8fafc; }
        body { background-color: var(--r-light); font-family: 'Segoe UI', sans-serif; margin-bottom: 100px; overflow-x: hidden; }
        
        /* --- SPLASH SCREEN --- */
        #splash { 
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(-45deg, #3065a8, #ae227d, #75bba8, #e6a00f);
            background-size: 400% 400%; animation: gradientBG 8s ease infinite; transition: 0.8s;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .btn-enter {
            background: white; color: var(--r-blue); border: none; padding: 16px 55px; border-radius: 50px; 
            font-weight: 800; font-size: 1.3rem; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: breathing 3s ease-in-out infinite;
        }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        
        .ecg-line { fill: none; stroke: white; stroke-width: 3; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawECG 4s linear infinite; }
        @keyframes drawECG { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }

        /* --- UI COMPONENTS --- */
        .app-header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--r-yellow); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 45px; }
        .card-custom { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--r-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .map-box { height: 180px; width: 100%; border-radius: 20px; margin-bottom: 20px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        
        .sgh-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sgh-card { background: white; border-radius: 15px; padding: 10px; text-align: center; border: 1px solid #eee; cursor: pointer; }
        .sgh-card img { width: 45px; height: 45px; object-fit: contain; }

        .nav-bottom { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 2px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { border: none; background: none; color: #94a3b8; font-size: 0.55rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--r-blue); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }

        .app-page { display: none; padding: 20px 15px; animation: fadeIn 0.4s; }
        .active-page { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-call { background: var(--r-blue); color: white; border: none; border-radius: 12px; padding: 8px 15px; font-size: 0.8rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="text-center text-white">
            <img src="logo_restev_carre.png" style="width: 120px; border-radius: 25px; border: 4px solid white; background: white;" onerror="this.src='https://placehold.co/120x120/ffffff/3065a8?text=RESTEV'">
            <h2 class="fw-bold mt-3">RESTEV 85</h2>
            <button class="btn-enter" onclick="dismissSplash()">ENTRER</button>
            <div class="mt-4" style="width: 200px; margin: auto;">
                <svg viewBox="0 0 200 40"><path class="ecg-line" d="M0,20 L40,20 L50,5 L60,35 L70,20 L110,20 L120,5 L130,35 L140,20 L200,20" /></svg>
            </div>
        </div>
    </div>

    <div class="app-header">
        <img src="logo_restev_long.png" class="logo-header" onerror="this.src='https://placehold.co/180x40?text=RESTEV+85'">
    </div>

    <!-- ACCUEIL -->
    <div id="page-home" class="app-page active-page">
        <div class="card-custom text-white border-0" style="background: linear-gradient(135deg, var(--r-blue), var(--r-purple));">
            <h5 class="fw-bold mb-1">Expert Prévention</h5>
            <p id="inv-stats" class="small opacity-75 mb-0">Chargement des données...</p>
        </div>
        <div class="row g-2 mt-2">
            <div class="col-6" onclick="nav('page-scan', 'nav-scan')"><div class="card-custom text-center"><i class="fa-solid fa-barcode fa-2x mb-2 text-primary"></i><br><b>SCANNER</b></div></div>
            <div class="col-6" onclick="nav('page-list', 'nav-list')"><div class="card-custom text-center" style="border-left-color: var(--r-teal);"><i class="fa-solid fa-boxes-stacked fa-2x mb-2 text-success"></i><br><b>INVENTAIRE</b></div></div>
            <div class="col-12" onclick="nav('page-quiz', 'nav-quiz')"><div class="card-custom d-flex justify-content-between align-items-center" style="border-left-color: var(--r-yellow);"><span><i class="fa-solid fa-clipboard-check text-warning me-2"></i> <b>TEST PRÉVENTION</b></span><i class="fa-solid fa-chevron-right text-muted"></i></div></div>
        </div>
    </div>

    <!-- SCANNER -->
    <div id="page-scan" class="app-page">
        <h5 class="fw-bold mb-3">Ajouter un produit</h5>
        <div class="card-custom">
            <div id="reader" style="width:100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 200px;"></div>
            <button class="btn btn-dark w-100 mt-2 mb-3" onclick="startScanner()">ACTIVER LA CAMÉRA</button>
            <input type="text" id="prod-name" class="form-control mb-2" placeholder="Nom du produit">
            <input type="text" id="prod-code" class="form-control mb-3" placeholder="Code-barres">
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="saveProduct()">ENREGISTRER</button>
        </div>
    </div>

    <!-- INVENTAIRE -->
    <div id="page-list" class="app-page">
        <h5 class="fw-bold mb-3">Mon Parc Chimique</h5>
        <button class="btn btn-success w-100 mb-3 rounded-3 fw-bold" onclick="exportToExcel()"><i class="fa-solid fa-file-excel me-2"></i>EXPORTER CSV</button>
        <div id="inventory-container"></div>
    </div>

    <!-- QUIZ -->
    <div id="page-quiz" class="app-page">
        <h5 class="fw-bold mb-3">Auto-Évaluation</h5>
        <div id="quiz-container"><div class="card-custom text-center py-4"><h6 id="quiz-question" class="fw-bold mb-4">...</h6><div class="d-grid gap-2"><button class="btn btn-outline-primary py-2 fw-bold" onclick="nextQ(2)">OUI</button><button class="btn btn-outline-warning py-2 fw-bold" onclick="nextQ(1)">PARTIELLEMENT</button><button class="btn btn-outline-danger py-2 fw-bold" onclick="nextQ(0)">NON</button></div></div></div>
        <div id="quiz-result" class="d-none card-custom text-center py-4"><h3 id="result-score" class="fw-bold text-primary"></h3><button class="btn btn-primary w-100 rounded-pill mt-3" onclick="nav('page-centres', 'nav-centres')">VOIR LES CENTRES</button></div>
    </div>

    <!-- CENTRES + CARTE -->
    <div id="page-centres" class="app-page">
        <h5 class="fw-bold mb-3">Nos Centres</h5>
        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d87530.82485521404!2d-1.4646738988587635!3d46.67!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sRESTEV%2085!5e0!3m2!1sfr!2sfr!4v1714480000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
        <div id="centres-list"></div>
    </div>

    <!-- SGH + INFOS -->
    <div id="page-sgh" class="app-page">
        <h5 class="fw-bold mb-3">Pictogrammes de Danger</h5>
        <div id="sgh-list" class="sgh-container"></div>
    </div>

    <!-- NAV BASSE -->
    <nav class="nav-bottom">
        <button id="nav-home" class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i>ACCUEIL</button>
        <button id="nav-scan" class="nav-item" onclick="nav('page-scan', this)"><i class="fa-solid fa-circle-plus"></i>SCAN</button>
        <button id="nav-list" class="nav-item" onclick="nav('page-list', this)"><i class="fa-solid fa-boxes-stacked"></i>LISTE</button>
        <button id="nav-centres" class="nav-item" onclick="nav('page-centres', this)"><i class="fa-solid fa-location-dot"></i>CENTRES</button>
        <button id="nav-sgh" class="nav-item" onclick="nav('page-sgh', this)"><i class="fa-solid fa-biohazard"></i>SGH</button>
    </nav>

    <script>
        let inventory = JSON.parse(localStorage.getItem('restev_inventory_v2')) || [];
        let curQ = 0, score = 0;
        const quizQ = ["DUERP à jour ?", "Visites médicales OK ?", "FDS disponibles ?", "EPI portés ?", "Formations SST à jour ?"];
        
        const centres = [
            { n: "La Roche-sur-Yon", t: "0251370668", a: "Impasse Newton, 85000", m: "https://maps.app.goo.gl/uP9f6U6H9Z9TfXpA7" },
            { n: "Montaigu-Vendée", t: "0251942014", a: "44 rue du 8 mai 1945", m: "https://maps.app.goo.gl/3Hh2t7Z5K5m8Q5L18" },
            { n: "Les Herbiers", t: "0251671203", a: "18 rue Olivier de Serres", m: "https://maps.app.goo.gl/L8T6N9S4B2V3R5K16" }
        ];

        const sghData = [
            {t: "Inflammable", p: "Tenir à l'écart de la chaleur."},
            {t: "Toxique", p: "Ne pas ingérer ni respirer."},
            {t: "Corrosif", p: "Protéger la peau et les yeux."},
            {t: "Explosif", p: "Éviter les chocs et étincelles."},
            {t: "Comburant", p: "Ne pas mélanger aux combustibles."},
            {t: "Gaz Pression", p: "Ne pas exposer au soleil."},
            {t: "Irritant", p: "Laver les mains après usage."},
            {t: "Danger Santé", p: "Risques chroniques (cancer, etc)."},
            {t: "Environnement", p: "Ne pas jeter à l'égout."}
        ];

        function dismissSplash() {
            const s = document.getElementById('splash');
            s.style.opacity = '0'; s.style.transform = 'translateY(-100%)';
            setTimeout(() => s.style.display = 'none', 600);
        }

        function nav(id, el) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            if(typeof el === 'string') document.getElementById(el).classList.add('active'); else el.classList.add('active');
            if(id === 'page-list') renderInventory();
        }

        function renderInventory() {
            const c = document.getElementById('inventory-container');
            c.innerHTML = inventory.length ? '' : '<p class="text-center text-muted">Vide.</p>';
            inventory.forEach(i => {
                c.innerHTML += `<div class="card-custom d-flex justify-content-between align-items-center">
                    <div><b>${i.name}</b><br><small class="text-muted">Code: ${i.code}</small></div>
                    <div class="d-flex gap-2">
                        <a href="${i.fds}" target="_blank" class="btn btn-sm btn-primary">FDS</a>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${i.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }

        function saveProduct() {
            const n = document.getElementById('prod-name').value;
            const c = document.getElementById('prod-code').value;
            if(!n) return alert("Nom requis");
            inventory.push({ id: Date.now(), name: n, code: c, fds: `https://www.google.com/search?q=FDS+${n}`, date: new Date().toLocaleDateString() });
            localStorage.setItem('restev_inventory_v2', JSON.stringify(inventory));
            updateStats(); nav('page-list', 'nav-list');
        }

        function deleteItem(id) { inventory = inventory.filter(i => i.id !== id); localStorage.setItem('restev_inventory_v2', JSON.stringify(inventory)); renderInventory(); updateStats(); }
        function updateStats() { document.getElementById('inv-stats').innerText = `${inventory.length} produit(s) enregistré(s)`; }

        function showQ() { document.getElementById('quiz-question').innerText = quizQ[curQ]; }
        function nextQ(p) { score += p; curQ++; if(curQ < quizQ.length) showQ(); else { document.getElementById('quiz-container').classList.add('d-none'); document.getElementById('quiz-result').classList.remove('d-none'); document.getElementById('result-score').innerText = `Score : ${score} / 10`; } }

        function renderCentres() {
            document.getElementById('centres-list').innerHTML = centres.map(x => `
                <div class="card-custom">
                    <b class="text-primary">${x.n}</b><br><small>${x.a}</small>
                    <div class="d-flex gap-2 mt-2">
                        <a href="tel:${x.t}" class="btn-call flex-grow-1"><i class="fa-solid fa-phone me-2"></i>Appeler</a>
                        <a href="${x.m}" target="_blank" class="btn btn-sm btn-outline-info flex-grow-1 d-flex align-items-center justify-content-center">Itinéraire</a>
                    </div>
                </div>`).join('');
        }

        function renderSGH() {
            document.getElementById('sgh-list').innerHTML = sghData.map((x, i) => `
                <div class="sgh-card shadow-sm" onclick="alert('🛡️ ${x.t.toUpperCase()}\\n\\nConseil : ${x.p}')">
                    <img src="https://placehold.co/50x50/red/white?text=SGH${i+1}">
                    <b class="d-block mt-1" style="font-size: 0.5rem;">${x.t}</b>
                </div>`).join('');
        }

        let scanner;
        function startScanner() {
            if(!scanner) scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => { document.getElementById('prod-code').value = t; scanner.stop(); });
        }

        window.onload = () => { renderCentres(); renderSGH(); showQ(); updateStats(); };
    </script>
</body>
</html>
