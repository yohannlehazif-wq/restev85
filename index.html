<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Expert Prévention v5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --restev-blue: #3d7cc0; 
            --restev-violet: #a74b9e; 
            --restev-green: #97c93e; 
            --gradient: linear-gradient(135deg, #3d7cc0 0%, #a74b9e 100%);
        }
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 110px; }
        .header-premium { background: var(--gradient); color: white; padding: 25px 15px 50px 15px; border-radius: 0 0 30px 30px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .nav-pills { background: white; padding: 8px; border-radius: 20px; margin: -30px 15px 20px 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); position: sticky; top: 15px; z-index: 1000; }
        .nav-link { color: #64748b; font-weight: 600; border-radius: 15px; font-size: 0.8rem; border: none !important; }
        .nav-link.active { background: var(--restev-blue) !important; box-shadow: 0 4px 12px rgba(61,124,192,0.3); }
        .card-expert { border: none; border-radius: 20px; background: white; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        #reader { border-radius: 20px; overflow: hidden; background: #000; min-height: 250px; }
        .btn-main { background: var(--gradient); color: white; border: none; border-radius: 15px; padding: 15px; font-weight: 700; width: 100%; }
        .alert-storage { background: #fff5f5; border-left: 5px solid #ff4d4d; color: #852626; padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 0.9rem; }
        footer { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="header-premium">
        <h3 class="fw-bold mb-0">RESTEV 85</h3>
        <p class="small opacity-75">Système Expert de Sécurité Chimique</p>
    </div>

    <ul class="nav nav-pills nav-fill" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#p-scan">📸 SCAN</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#p-duerp">📂 INVENTAIRE</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#p-metiers">👷 MÉTIERS</button></li>
    </ul>

    <div class="container tab-content mt-3">
        
        <div class="tab-pane fade show active" id="p-scan">
            <div id="reader" class="mb-3"></div>
            
            <div id="scan-res" class="d-none card-expert text-center">
                <div id="res-name"></div>
                <div id="res-advice"></div>
                <button class="btn btn-main mt-3" onclick="processAddition()">VALIDER L'AJOUT</button>
                <button class="btn btn-link btn-sm text-muted" onclick="resetScan()">Annuler</button>
            </div>

            <div class="card-expert text-center">
                <h6 class="fw-bold text-primary mb-3">Sécurité de Stockage</h6>
                <p class="small text-muted">L'application vérifie automatiquement les incompatibilités (Acides/Bases/Inflammables) selon les normes INRS.</p>
            </div>
        </div>

        <div class="tab-pane fade" id="p-duerp">
            <div class="card-expert">
                <h6 class="fw-bold mb-3">Récapitulatif par Unité de Travail</h6>
                <div class="table-responsive">
                    <table class="table table-borderless align-middle small">
                        <tbody id="inventory-list"></tbody>
                    </table>
                </div>
            </div>
            <div class="card-expert">
                <canvas id="riskChart"></canvas>
            </div>
        </div>

        <div class="tab-pane fade" id="p-metiers">
            <input type="text" id="metSearch" class="form-control mb-3" placeholder="Rechercher un métier..." onkeyup="filterMetiers()" style="border-radius:15px; padding:12px;">
            <div id="metiers-list"></div>
        </div>
    </div>

    <div class="modal fade" id="storageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius:20px;">
                <div class="modal-header border-0 bg-danger text-white">
                    <h5 class="modal-title fw-bold">⚠️ DANGER STOCKAGE</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">Compris, je vais séparer les produits</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center p-3 fixed-bottom shadow-lg">
        <span class="fw-bold" style="color: var(--restev-blue)">RESTEV 85</span> | <small class="text-muted">Partenaire Prévention</small>
    </footer>

    <script>
        // --- DONNÉES ET LOGIQUE ---
        let inventory = JSON.parse(localStorage.getItem('restev_v5_db')) || [];
        const modal = new bootstrap.Modal(document.getElementById('storageModal'));
        let currentScan = null;

        // Base de données produits avec classes de stockage (SGH)
        const API_RESTEV = {
            "3152541000105": { nom: "White Spirit", cmr: false, classe: "INFLAMMABLE", advice: "H226 : Inflammable." },
            "3152541000303": { nom: "Acétone", cmr: false, classe: "INFLAMMABLE", advice: "H225 : Très inflammable." },
            "3152541001003": { nom: "Acide Chlorhydrique", cmr: false, classe: "ACIDE", advice: "H314 : Corrosif." },
            "3152541222222": { nom: "Soude Caustique", cmr: false, classe: "BASE", advice: "H314 : Corrosif." }
        };

        // Matrice des incompatibilités
        const INCOMPATIBILITES = {
            "ACIDE": ["BASE", "INFLAMMABLE"],
            "BASE": ["ACIDE"],
            "INFLAMMABLE": ["ACIDE"]
        };

        function onScanSuccess(t) {
            const p = API_RESTEV[t];
            document.getElementById('reader').classList.add('d-none');
            document.getElementById('scan-res').classList.remove('d-none');
            
            if (p) {
                currentScan = { ...p, id: t };
                document.getElementById('res-name').innerHTML = `<h4 class="fw-bold text-primary">${p.nom}</h4><span class="badge bg-light text-dark">${p.classe}</span>`;
                document.getElementById('res-advice').innerHTML = `<p class="mt-2 small text-muted">${p.advice}</p>`;
            } else {
                currentScan = { nom: "Inconnu ("+t+")", cmr: false, classe: "AUTRE", advice: "Non répertorié." };
                document.getElementById('res-name').innerHTML = `<h4>Inconnu</h4>`;
            }
        }

        function processAddition() {
            const ut = prompt("Dans quelle Unité de Travail (UT) rangez-vous ce produit ?", "Atelier");
            if (!ut) return;

            // Vérification de la matrice de stockage
            const conflits = inventory.filter(item => item.ut === ut && INCOMPATIBILITES[currentScan.classe]?.includes(item.classe));

            if (conflits.length > 0) {
                const nomsConflits = conflits.map(c => c.nom).join(', ');
                document.getElementById('modalBody').innerHTML = `
                    <p class="fw-bold">Risque de réaction chimique dangereuse !</p>
                    <div class="alert-storage">
                        Vous tentez de ranger du <b>${currentScan.nom}</b> (${currentScan.classe}) avec du <b>${nomsConflits}</b> dans l'unité <b>${ut}</b>.
                    </div>
                    <p class="small mt-3">Le mélange accidentel de ces produits peut générer des vapeurs toxiques ou un incendie. <b>Séparez-les immédiatement.</b></p>
                `;
                modal.show();
            }

            inventory.push({ ...currentScan, ut });
            localStorage.setItem('restev_v5_db', JSON.stringify(inventory));
            renderInventory();
            resetScan();
        }

        // --- MÉTIERS ---
        const metiers = [
            {m: "Agent d'entretien", r: "Chimie, Glissades", c: "Gants PVC, Doseurs"},
            {m: "Agriculteur", r: "Phyto, Poussières", c: "Masque P3, Gants Nitrile"},
            {m: "Boulanger", r: "Farine (Asthme)", c: "Aspiration localisée"},
            {m: "Carrossier", r: "Solvants, Isocyanates", c: "Cabine filtrée"},
            {m: "Peintre", r: "COV, Chutes", c: "Aération, Masque A1"}
        ];

        function renderMetiers(list) {
            const container = document.getElementById('metiers-list');
            container.innerHTML = '';
            list.forEach(item => {
                container.innerHTML += `<div class="card-expert" onclick="alert('Prévention : ${item.c}')"><b>${item.m}</b><br><small class="text-muted">${item.r}</small></div>`;
            });
        }

        function filterMetiers() {
            const val = document.getElementById('metSearch').value.toLowerCase();
            renderMetiers(metiers.filter(x => x.m.toLowerCase().includes(val)));
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = "";
            let cmr = 0;
            inventory.forEach((p, i) => {
                if(p.cmr) cmr++;
                list.innerHTML += `<tr class="border-bottom"><td><b>${p.nom}</b><br><small>${p.ut} (${p.classe})</small></td><td class="text-end"><button class="btn btn-sm" onclick="remove(${i})">🗑️</button></td></tr>`;
            });
        }

        function remove(i) { inventory.splice(i,1); localStorage.setItem('restev_v5_db', JSON.stringify(inventory)); renderInventory(); }
        function resetScan() { document.getElementById('scan-res').classList.add('d-none'); document.getElementById('reader').classList.remove('d-none'); }

        // Init
        new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 }).render(onScanSuccess);
        renderMetiers(metiers);
        renderInventory();
    </script>
</body>
</html>
