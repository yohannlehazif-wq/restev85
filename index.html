<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RESTEV – Auto‑évaluation métier</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --green:#2ecc71;
  --orange:#f39c12;
  --red:#e74c3c;
  --primary:#2e8b7a;
  --bg:#f2f5f4;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--bg);
}

header{
  background:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}

header img{height:50px}

main{
  padding:16px;
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

h2{color:var(--primary);margin-top:0}

.question{
  margin:14px 0;
}

.buttons{
  display:flex;
  gap:10px;
}

.buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:14px;
  font-size:15px;
}

.yes{background:var(--green);color:white}
.middle{background:var(--orange);color:white}
.no{background:var(--red);color:white}

.result{
  text-align:center;
  padding:20px;
  border-radius:18px;
  color:white;
}

.result.green{background:var(--green)}
.result.orange{background:var(--orange)}
.result.red{background:var(--red)}

ul{padding-left:18px}
button.main{
  width:100%;
  padding:14px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:16px;
  font-size:16px;
  margin-top:14px;
}
</style>
</head>

<body>

<header>
  logo-restev.png
  <strong>Auto‑évaluation prévention</strong>
</header>

<main>

<div class="card">
  <h2>🏗 Métier : BTP / Chantier</h2>
  <p>Répondez simplement selon votre pratique habituelle.</p>

  <div class="question">
    <strong>Les risques sont identifiés avant le chantier ?</strong>
    <div class="buttons">
      <button class="yes" onclick="addScore(2)">Oui</button>
      <button class="middle" onclick="addScore(1)">À améliorer</button>
      <button class="no" onclick="addScore(0)">Non</button>
    </div>
  </div>

  <div class="question">
    <strong>Les poussières sont‑elles maîtrisées ?</strong>
    <div class="buttons">
      <button class="yes" onclick="addScore(2)">Oui</button>
      <button class="middle" onclick="addScore(1)">À améliorer</button>
      <button class="no" onclick="addScore(0)">Non</button>
    </div>
  </div>

  <div class="question">
    <strong>Présence de substances type silice / sols pollués ?</strong>
    <div class="buttons">
      <button class="no" onclick="addCMR(true)">Oui</button>
      <button class="yes" onclick="addCMR(false)">Non</button>
    </div>
  </div>

  <button class="main" onclick="calcul()">Voir mon résultat</button>
</div>

<div id="resultat"></div>

</main>

<script>
let score=0;
let cmr=false;

function addScore(val){ score+=val; }
function addCMR(val){ cmr=val; }

function calcul(){
  let res=document.getElementById('resultat');
  let niveau="",classe="",msg="";

  if(score<=2){niveau="Prévention insuffisante";classe="red";}
  else if(score<=4){niveau="Prévention perfectible";classe="orange";}
  else{niveau="Prévention maîtrisée";classe="green";}

  msg = `
  <div class="card result ${classe}">
    <h2>${niveau}</h2>
    ${cmr ? "<p><strong>⚠️ Présence de risques CMR identifiée</strong></p>" : ""}
    <p>Une action ciblée permet de réduire durablement les risques.</p>
  </div>

  <div class="card">
    <h2>🛡️ Prévention prioritaire</h2>
    <ul>
      <li>Organisation du chantier</li>
      <li>Réduction des poussières à la source</li>
      <li>Protections collectives</li>
    </ul>
  </div>

  <div class="card">
    <h2>🤝 Accompagnement RESTEV</h2>
    <p>
      RESTEV peut vous accompagner pour analyser les expositions,
      structurer les actions CMR et sécuriser le DUERP.
    </p>
    <button class="main">Être accompagné</button>
  </div>
  `;

  res.innerHTML=msg;
}
</script>

</body>
</html>
``
